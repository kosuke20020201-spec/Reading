<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>読書ノート</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="読書ノート">
<meta name="theme-color" content="#f59e0b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #f59e0b; --orange: #f97316;
    --amber-light: #fef3c7; --amber-border: #fde68a;
    --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
    --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
    --stone-600: #57534e; --stone-800: #292524;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(135deg, #fdf8f0 0%, #fef9ef 50%, #fdfaf5 100%); min-height: 100vh; color: var(--stone-800); }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at 20% 20%, #fde68a22 0%, transparent 50%), radial-gradient(circle at 80% 80%, #fed7aa22 0%, transparent 50%); }
  .app-main-root-container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  /* HEADER */
  header { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: flex-end; gap: 0.75rem; }
  .header-left { align-self: stretch; }
  .header-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.25rem; }
  .header-title { font-family: 'Noto Serif JP', serif; font-size: 2rem; font-weight: 900; line-height: 1.2; }
  .header-meta { font-size: 0.8rem; color: var(--stone-400); margin-top: 0.25rem; }
  .header-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
  .header-btns-row { display: flex; gap: 0.4rem; }

  .btn-add { display: flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.1rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; font-weight: 600; border: none; cursor: pointer; font-size: 0.82rem; transition: filter 0.1s; }
  .btn-add:hover { filter: brightness(1.08); } .btn-add:active { transform: scale(0.97); }
  .btn-sub { display: flex; align-items: center; gap: 0.35rem; padding: 0.5rem 0.9rem; border-radius: 999px; background: white; border: 1px solid var(--stone-200); color: var(--stone-600); font-weight: 500; cursor: pointer; font-size: 0.77rem; transition: all 0.1s; }
  .btn-sub:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-icon { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; }
  .search-input { width: 100%; padding: 0.75rem 2.5rem 0.75rem 2.25rem; border-radius: 1rem; border: 1px solid var(--stone-200); background: white; box-shadow: 0 1px 4px #00000008; font-size: 0.85rem; font-family: inherit; transition: border-color 0.1s; }
  .search-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b22; }
  .search-input::placeholder { color: var(--stone-300); }
  .search-clear { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--stone-300); font-size: 1rem; line-height: 1; transition: color 0.1s; }

  /* FILTER */
  .filter-bar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tag-filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag-btn { font-size: 0.72rem; font-weight: 500; padding: 0.2rem 0.7rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tag-btn:hover { border-color: var(--stone-400); }
  .tag-btn.active { background: var(--stone-800) !important; color: white !important; border-color: var(--stone-800) !important; }
  .sort-select { font-size: 0.72rem; color: var(--stone-500); background: white; border: 1px solid var(--stone-200); border-radius: 999px; padding: 0.25rem 0.75rem; cursor: pointer; font-family: inherit; transition: all 0.1s; }
  .results-count { font-size: 0.75rem; color: var(--stone-400); margin-bottom: 0.75rem; }

  /* BOOK GROUP */
  .bk-grp-box { margin-bottom: 1.5rem; }
  .bk-grp-hdr { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; padding: 0.75rem 1rem; background: white; border-radius: 1rem; border: 1px solid var(--stone-200); box-shadow: 0 1px 4px #00000008; cursor: pointer; transition: box-shadow 0.2s; }
  .bk-grp-hdr:hover { box-shadow: 0 3px 12px #00000010; }
  .bk-grp-icon { font-size: 1.4rem; flex-shrink: 0; }
  .bk-grp-info { flex: 1; min-width: 0; }
  .bk-grp-title { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 0.95rem; }
  .bk-grp-author { font-size: 0.72rem; color: var(--stone-400); margin-top: 0.15rem; }
  .bk-grp-cnt { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--amber-light); color: #92400e; white-space: nowrap; }
  .bk-grp-tgl { color: var(--stone-300); font-size: 0.85rem; transition: transform 0.2s; flex-shrink: 0; }
  .bk-grp-box.collapsed .bk-grp-tgl { transform: rotate(-90deg); }
  .bk-grp-cards-wrap { display: flex; flex-direction: column; gap: 0.75rem; padding-left: 0.75rem; border-left: 2px solid var(--amber-border); margin-left: 0.5rem; }
  .bk-grp-box.collapsed .bk-grp-cards-wrap { display: none; }

  /* CARD */
  .item-journal-card { position: relative; background: white; border-radius: 1rem; border: 1px solid var(--stone-200); box-shadow: 0 1px 4px #00000008; overflow: hidden; transition: box-shadow 0.2s; }
  .item-journal-card:hover { box-shadow: 0 4px 16px #00000012; }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, var(--amber), var(--orange)); }
  .card-body { padding: 1rem 1rem 0.875rem 1.25rem; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
  .card-title-note { font-size: 0.88rem; font-weight: 700; color: var(--stone-700); margin-bottom: 0.1rem; }
  .card-page { font-size: 0.78rem; font-weight: 600; color: var(--stone-500); }
  .card-date { font-size: 0.7rem; color: var(--stone-300); margin-top: 0.1rem; }
  .card-actions { display: flex; gap: 0.2rem; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .item-journal-card:hover .card-actions, .card-actions:focus-within { opacity: 1; }
  .card-action-btn { padding: 0.3rem; border-radius: 0.4rem; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: var(--stone-400); transition: all 0.1s; }
  .card-action-btn:hover { background: var(--stone-100); color: var(--stone-600); }
  .card-action-btn.delete:hover { background: #fff1f2; color: #f43f5e; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
  .tag-pill { font-size: 0.68rem; font-weight: 500; padding: 0.15rem 0.55rem; border-radius: 999px; }
  .card-sections { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .section-block { border-radius: 0.6rem; padding: 0.6rem 0.75rem; }
  .section-label { font-size: 0.65rem; font-weight: 700; color: var(--stone-400); margin-bottom: 0.2rem; }
  .section-text { font-size: 0.82rem; line-height: 1.65; white-space: pre-wrap; }
  .content-bg { background: var(--stone-50); } .content-bg .section-text { color: var(--stone-600); }
  .lesson-bg { background: var(--amber-light); } .lesson-bg .section-text { color: #78350f; }
  .supplement-bg { background: var(--stone-50); } .supplement-bg .section-text { color: var(--stone-600); }
  .ai-area { margin-top: 0.75rem; }
  .btn-ai { font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.9rem; border-radius: 999px; border: none; cursor: pointer; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; transition: filter 0.1s; }
  .btn-ai:hover { filter: brightness(1.08); } .btn-ai:disabled { opacity: 0.6; cursor: not-allowed; }

  /* DRAWING GALLERY */
  .drawing-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
  .drawing-thumb { position: relative; width: 80px; height: 80px; border: 1px solid var(--stone-200); border-radius: 0.6rem; background: white; overflow: hidden; cursor: pointer; transition: all 0.1s; }
  .drawing-thumb:hover { border-color: var(--amber); box-shadow: 0 2px 8px #00000010; }
  .drawing-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .drawing-thumb-delete { position: absolute; top: 2px; right: 2px; display: none; background: rgba(244, 63, 94, 0.9); border: none; border-radius: 4px; color: white; font-size: 0.8rem; padding: 2px 4px; cursor: pointer; z-index: 10; }
  .drawing-thumb:hover .drawing-thumb-delete { display: block; }

  /* EMPTY */
  .empty { text-align: center; padding: 4rem 0; color: var(--stone-300); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty p { font-size: 0.85rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 1rem; background: rgba(28,22,15,0.5); backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 1.5rem; box-shadow: 0 20px 60px #00000022; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 1.25rem 1.5rem 0.875rem; border-bottom: 1px solid var(--stone-100); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-title { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 1.05rem; }
  .modal-close { background: none; border: none; cursor: pointer; padding: 0.4rem; border-radius: 999px; font-size: 1.1rem; color: var(--stone-400); transition: background 0.1s; line-height: 1; }
  .modal-close:hover { background: var(--stone-100); }
  .modal-body { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1rem; }
  .modal-footer { padding: 0.875rem 1.5rem 1.25rem; border-top: 1px solid var(--stone-100); display: flex; justify-content: flex-end; gap: 0.5rem; flex-shrink: 0; }
  .field label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--stone-500); margin-bottom: 0.3rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .field input, .field textarea { width: 100%; padding: 0.6rem 0.75rem; border-radius: 0.65rem; border: 1px solid var(--stone-200); background: var(--stone-50); font-size: 0.82rem; font-family: inherit; transition: border-color 0.1s; }
  .field input:focus, .field textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b1a; }
  .field input::placeholder, .field textarea::placeholder { color: var(--stone-300); }
  .lesson-field { background: var(--amber-light) !important; border-color: var(--amber-border) !important; }
  .lesson-field:focus { box-shadow: 0 0 0 3px #f59e0b22 !important; }
  .btn-cancel { padding: 0.5rem 1.1rem; border-radius: 999px; background: none; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--stone-500); transition: background 0.1s; }
  .btn-cancel:hover { background: var(--stone-100); }
  .btn-save { padding: 0.5rem 1.25rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: filter 0.1s; }
  .btn-save:hover { filter: brightness(1.08); }
  .ai-key-note { font-size: 0.75rem; color: var(--stone-400); line-height: 1.6; }
  .ai-key-note a { color: var(--amber); }

  /* SUGGEST */
  .suggest-wrap { position: relative; }
  .suggest-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--amber-border); border-radius: 0.75rem; box-shadow: 0 8px 24px #00000015; z-index: 200; overflow-y: auto; max-height: 200px; }
  .suggest-item { padding: 0.65rem 0.875rem; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--stone-100); }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover { background: var(--amber-light); }
  .suggest-title { font-size: 0.82rem; font-weight: 600; color: var(--stone-800); }
  .suggest-author { font-size: 0.7rem; color: var(--stone-400); margin-top: 0.1rem; }

  /* BOOKSHELF MODAL */
  .bookshelf-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .bookshelf-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--stone-200); cursor: pointer; transition: all 0.15s; background: white; }
  .bookshelf-item:hover { border-color: var(--amber); background: var(--amber-light); }
  .bookshelf-item-icon { font-size: 1.3rem; flex-shrink: 0; }
  .bookshelf-item-info { flex: 1; min-width: 0; }
  .bookshelf-item-title { font-weight: 700; font-size: 0.85rem; }
  .bookshelf-item-meta { font-size: 0.7rem; color: var(--stone-400); margin-top: 0.1rem; }
  .bookshelf-item-count { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.55rem; border-radius: 999px; background: var(--amber-light); color: #92400e; white-space: nowrap; }

  /* DRAWING MODAL */
  .drawing-canvas-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
  .drawing-tools { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
  .drawing-tool-btn { padding: 0.4rem 0.8rem; border-radius: 0.6rem; border: 1px solid var(--stone-200); background: white; cursor: pointer; font-size: 0.72rem; transition: all 0.1s; }
  .drawing-tool-btn:hover { border-color: var(--amber); background: var(--amber-light); }
  .drawing-tool-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
  .drawing-canvas { border: 2px solid var(--stone-200); border-radius: 0.8rem; background: white; cursor: crosshair; display: block; max-width: 100%; }
  #drawingCanvas { touch-action: none; }

  /* TOAST */
  .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #292524; color: white; font-size: 0.8rem; font-weight: 500; padding: 0.6rem 1.2rem; border-radius: 999px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; }

  /* TAG COLORS */
  .tc-0 { background: #fef3c7; color: #92400e; }
  .tc-1 { background: #e0f2fe; color: #0c4a6e; }
  .tc-2 { background: #d1fae5; color: #065f46; }
  .tc-3 { background: #ffe4e6; color: #9f1239; }
  .tc-4 { background: #ede9fe; color: #4c1d95; }
  .tc-5 { background: #ffedd5; color: #7c2d12; }

  @media (max-width: 480px) {
    .header-title { font-size: 1.6rem; }
    .field-row { grid-template-columns: 1fr; }
    .card-actions { opacity: 1; }
  }
</style>
</head>
<body>
<div class="bg-orbs"></div>

<div class="app-main-root-container" id="safe-rendering-root-wrapper-v2">
  </div>

<div id="modal-portal-isolated-zone">
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">新しい読書記録</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field suggest-wrap">
          <label>📚 本のタイトル</label>
          <input type="text" id="fBook" placeholder="例: 思考の整理学" oninput="onBookInput(this.value)" autocomplete="off">
          <div class="suggest-list" id="suggestList" style="display:none"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>著者</label><input type="text" id="fAuthor" placeholder="著者名"></div>
          <div class="field"><label>ページ</label><input type="text" id="fPage" placeholder="pp.42–55"></div>
        </div>
        <div class="field"><label>📝 記録タイトル</label><input type="text" id="fTitle" placeholder="例: グライダー型人間について"></div>
        <div class="field"><label>📖 内容</label><textarea id="fContent" rows="3" placeholder="書かれていた内容を記録…"></textarea></div>
        <div class="field"><label>💡 教訓</label><textarea id="fLesson" class="lesson-field" rows="3" placeholder="そこから得た学びや行動指針…"></textarea></div>
        <div class="field"><label>🔍 補足情報</label><textarea id="fSupplement" rows="2" placeholder="関連知識・参考資料・文脈など…"></textarea></div>
        <div class="field"><label>🏷 タグ（カンマ区切り）</label><input type="text" id="fTags" placeholder="思考法, 習慣, 認知バイアス"></div>
        <div class="field">
          <label>🎨 スケッチ・図解</label>
          <button class="btn-sub" onclick="openDrawingModal()" style="width:100%;justify-content:center">📐 スケッチを追加</button>
          <div class="drawing-gallery" id="drawingGallery"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-save" id="btnSave" onclick="saveEntry()">保存する</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="bookshelfOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">📚 本棚</h2>
        <button class="modal-close" onclick="closeBookshelf()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.8rem;color:var(--stone-400)">本を選ぶと、著者が自動入力された状態で記録追加できます</p>
        <div class="bookshelf-list" id="bookshelfList"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="aiKeyOverlay">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2 class="modal-title">✨ AI要約の設定</h2>
        <button class="modal-close" onclick="closeAiModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.82rem;color:var(--stone-600);line-height:1.7">AI要約にはAnthropic APIキーが必要です。<br>キーはこのブラウザにのみ保存されます。</p>
        <div class="field"><label>APIキー</label><input type="password" id="apiKeyInput" placeholder="sk-ant-..."></div>
        <p class="ai-key-note">※ <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a> で取得できます。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeAiModal()">キャンセル</button>
        <button class="btn-save" onclick="confirmApiKey()">保存して要約する</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="drawingOverlay">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <h2 class="modal-title">🎨 スケッチを描画</h2>
        <button class="modal-close" onclick="closeDrawingModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="drawing-canvas-wrap">
          <div class="drawing-tools">
            <button class="drawing-tool-btn active" id="toolDraw" onclick="setDrawingMode('draw')">✏️ 描画</button>
            <button class="drawing-tool-btn" id="toolErase" onclick="setDrawingMode('erase')">🧹 消す</button>
            <input type="color" id="brushColor" value="#292524" style="width:40px;height:32px;border:1px solid var(--stone-200);border-radius:0.4rem;cursor:pointer">
            <button class="drawing-tool-btn" onclick="clearDrawing()">🗑 クリア</button>
            <button class="drawing-tool-btn" onclick="undoDrawing()">↶ 戻す</button>
          </div>
          <canvas id="drawingCanvas" class="drawing-canvas" width="450" height="340"></canvas>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeDrawingModal()">キャンセル</button>
        <button class="btn-save" onclick="saveDrawing()">保存する</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script>
const STORAGE_KEY = 'reading_log_v1';
const API_KEY_KEY = 'reading_log_api_key';
let entries = [], searchQuery = '', activeTag = '', editingId = null, pendingAiId = null;
let drawingMode = 'draw', drawingHistory = [], currentDrawings = [];

let canvas = null, ctx = null, isDrawing = false;
let lastX = 0, lastY = 0;

const SAMPLE = [
  { id: 1, title: "グライダー型人間について", book: "思考の整理学", author: "外山滋比古", page: "pp.42–55",
    content: "グライダー型人間とエンジン型人間の違い。グライダーは自力で飛べないが、エンジン型は自ら考え飛び立つことができる。現代教育はグライダーを育てている。",
    lesson: "受け身で知識を受け取るだけでなく、自ら問いを立てて考える習慣を持つ必要がある。インプットした後に必ず「自分ならどう使うか」を考える。",
    supplement: "ソクラテスの産婆術も同様の思想。知識を与えるのではない。相手の中にある答えを引き出す教育法。",
    tags: ["思考法","教育","自律性"], drawings: [], createdAt: "2024-11-15" }
];

// 拡張機能によるDOM破壊に対抗するため、HTML構造自体をJavaScript側で完全に管理・復元可能にする
function rebuildShellHTML() {
  const root = document.getElementById('safe-rendering-root-wrapper-v2');
  if (!root) return;
  
  // 中身が消されている場合のみ再構築
  if (root.innerHTML.trim() === "") {
    root.innerHTML = `
      <header>
        <div class="header-left">
          <p class="header-eyebrow">Reading Journal</p>
          <h1 class="header-title">読書ノート</h1>
          <p class="header-meta" id="headerMeta"></p>
        </div>
        <div class="header-btns">
          <button class="btn-add" onclick="openModal()">＋ 記録を追加</button>
          <div class="header-btns-row">
            <button class="btn-sub" onclick="openBookshelf()">📚 本棚</button>
            <button class="btn-sub" onclick="exportData()">📤 エクスポート</button>
            <label class="btn-sub" style="cursor:pointer">📥 インポート<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
          </div>
        </div>
      </header>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="本・著者・内容・教訓・タグで検索…" oninput="onSearch(this.value)">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>

      <div class="filter-bar">
        <div class="tag-filters" id="tagFilters"></div>
        <select class="sort-select" id="sortSelect" onchange="render()">
          <option value="date">新しい順</option>
          <option value="book">書名順</option>
        </select>
      </div>

      <p class="results-count" id="resultsCount" style="display:none"></p>
      <div id="dynamic-secure-cards-bucket-v2"></div>
      <div class="empty" id="emptyState" style="display:none">
        <div class="empty-icon">📭</div>
        <p>記録が見つかりません</p>
      </div>
    `;
    // 検索語句が残っていれば復元
    const input = document.getElementById('searchInput');
    if (input && searchQuery) input.value = searchQuery;
  }
}

function load() { 
  try { 
    const r = localStorage.getItem(STORAGE_KEY); 
    entries = r ? JSON.parse(r) : SAMPLE;
  } catch(e) { 
    entries = SAMPLE; 
  } 
}

function persist() { 
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
}

function getApiKey() { return localStorage.getItem(API_KEY_KEY) || ''; }
function setApiKey(k) { localStorage.setItem(API_KEY_KEY, k); }

function tagClass(tag) { let h=0; for(let i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))%6; return `tc-${h}`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function allTags() { const s=new Set(); entries.forEach(e=>(e.tags||[]).forEach(t=>s.add(t))); return [...s]; }

function bookGroups() {
  const map = new Map();
  entries.forEach(e => {
    const key = (e.book||'').trim();
    if (!map.has(key)) map.set(key, { book: e.book||'', author: e.author||'', entries: [] });
    map.get(key).entries.push(e);
  });
  return map;
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  const sortSelect = document.getElementById('sortSelect');
  const sort = sortSelect ? sortSelect.value : 'date';
  return entries.filter(e => {
    if (activeTag && !(e.tags||[]).includes(activeTag)) return false;
    if (!q) return true;
    return [e.title,e.book,e.author,e.content,e.lesson,e.supplement,...(e.tags||[])].some(s=>(s||'').toLowerCase().includes(q));
  }).sort((a,b) => sort==='date' ? (b.createdAt||'').localeCompare(a.createdAt||'') : (a.book||'').localeCompare(b.book||'','ja'));
}

function render() {
  try {
    // 描画の直前に、枠組みが拡張機能に消されていないか100%確認・自動復元する
    rebuildShellHTML();

    const container = document.getElementById('dynamic-secure-cards-bucket-v2');
    if (!container) return;

    const tags = allTags();
    const metaEl = document.getElementById('headerMeta');
    if (metaEl) metaEl.textContent = `${entries.length}件の記録 · ${bookGroups().size}冊 · ${tags.length}個のタグ`;

    const wrap = document.getElementById('tagFilters');
    if (wrap) {
      wrap.innerHTML = `<button class="tag-btn${activeTag===''?' active':''}" onclick="setTag('')">すべて</button>`;
      tags.forEach(t => {
        const b = document.createElement('button');
        b.className = `tag-btn ${tagClass(t)}${activeTag===t?' active':''}`;
        b.textContent = t; b.onclick = () => setTag(t);
        wrap.appendChild(b);
      });
    }

    const list = getFiltered();
    const empty = document.getElementById('emptyState');
    const countEl = document.getElementById('resultsCount');

    if (countEl) {
      if (searchQuery || activeTag) { countEl.style.display='block'; countEl.textContent=`${list.length}件 ヒット`; }
      else { countEl.style.display='none'; }
    }

    if (!list.length) { container.innerHTML=''; if(empty) empty.style.display='block'; return; }
    if(empty) empty.style.display='none';

    const grouped = new Map();
    list.forEach(e => {
      const key = (e.book||'').trim() || '（タイトル未入力）';
      if (!grouped.has(key)) grouped.set(key, { book: e.book||'', author: e.author||'', entries: [] });
      grouped.get(key).entries.push(e);
    });

    let groupIdIdx = 0;
    container.innerHTML = [...grouped.entries()].map(([key, g]) => {
      groupIdIdx++;
      return `
  <div class="bk-grp-box" id="group-${groupIdIdx}">
    <div class="bk-grp-hdr" onclick="document.getElementById('group-${groupIdIdx}').classList.toggle('collapsed')">
      <span class="bk-grp-icon">📖</span>
      <div class="bk-grp-info">
        <div class="bk-grp-title">${esc(g.book||'（タイトル未入力）')}</div>
        ${g.author ? `<div class="bk-grp-author">${esc(g.author)}</div>` : ''}
      </div>
      <span class="bk-grp-cnt">${g.entries.length}件</span>
      <span class="bk-grp-tgl">▼</span>
    </div>
    <div class="bk-grp-cards-wrap">
      ${g.entries.map(e => cardHTML(e)).join('')}
    </div>
  </div>`;
    }).join('');
  } catch(e) { console.error("描画処理例外をキャッチ:", e); }
}

function cardHTML(e) {
  const tagPills = (e.tags||[]).map(t=>`<span class="tag-pill ${tagClass(t)}">${esc(t)}</span>`).join('');
  const sec = (cls,icon,label,txt) => txt ? `<div class="section-block ${cls}"><div class="section-label">${icon} ${label}</div><div class="section-text">${esc(txt)}</div></div>` : '';
  const drawingHTML = (e.drawings && e.drawings.length) ? `
    <div class="section-block" style="border-radius:0.6rem;padding:0.6rem 0.75rem;">
      <div class="section-label">🎨 スケッチ</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;margin-top:0.5rem;">
        ${e.drawings.map((d) => `<img src="${esc(d)}" style="width:100%;border-radius:0.4rem;border:1px solid var(--stone-200);cursor:pointer;" onclick="window.open('${esc(d)}')">`).join('')}
      </div>
    </div>` : '';

  return `
<div class="item-journal-card" id="card-${e.id}">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="card-header">
      <div>
        ${e.title ? `<div class="card-title-note">${esc(e.title)}</div>` : ''}
        ${e.page ? `<div class="card-page">${esc(e.page)}</div>` : ''}
        ${e.createdAt ? `<div class="card-date">${esc(e.createdAt)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="editEntry(${e.id})">✏️</button>
        <button class="card-action-btn delete" onclick="deleteEntry(${e.id})">🗑</button>
      </div>
    </div>
    <div class="card-tags">${tagPills}</div>
    <div class="card-sections">
      ${sec('content-bg', '📖', '内容', e.content)}
      ${sec('lesson-bg', '💡', '教訓', e.lesson)}
      ${sec('supplement-bg', '🔍', '補足情報', e.supplement)}
      ${drawingHTML}
      ${e.aiSummary ? `<div class="section-block lesson-bg" style="border: 1px dashed var(--orange)"><div class="section-label">✨ AI要約</div><div class="section-text">${esc(e.aiSummary)}</div></div>` : ''}
    </div>
    <div class="ai-area">
      <button class="btn-ai" id="btn-ai-${e.id}" onclick="triggerAiSummary(${e.id})">${e.aiSummary ? '✨ 再要約する' : '✨ AIで要約・整理'}</button>
    </div>
  </div>
</div>`;
}

function onSearch(v) { searchQuery = v; render(); }
function clearSearch() { const el = document.getElementById('searchInput'); if(el) el.value = ''; searchQuery = ''; render(); }
function setTag(t) { activeTag = t; render(); }

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalOverlay').classList.add('open');
  if (id) {
    document.getElementById('modalTitle').textContent = '読書記録を編集';
    const e = entries.find(x => x.id === id);
    document.getElementById('fBook').value = e.book || '';
    document.getElementById('fAuthor').value = e.author || '';
    document.getElementById('fPage').value = e.page || '';
    document.getElementById('fTitle').value = e.title || '';
    document.getElementById('fContent').value = e.content || '';
    document.getElementById('fLesson').value = e.lesson || '';
    document.getElementById('fSupplement').value = e.supplement || '';
    document.getElementById('fTags').value = (e.tags || []).join(', ');
    currentDrawings = [...(e.drawings || [])];
  } else {
    document.getElementById('modalTitle').textContent = '新しい読書記録';
    document.getElementById('fBook').value = '';
    document.getElementById('fAuthor').value = '';
    document.getElementById('fPage').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('fLesson').value = '';
    document.getElementById('fSupplement').value = '';
    document.getElementById('fTags').value = '';
    currentDrawings = [];
  }
  renderDrawingThumbs();
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveEntry() {
  const book = document.getElementById('fBook').value.trim();
  if (!book) { showToast('本のタイトルは必須です'); return; }
  const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(t => t);
  
  if (editingId) {
    const e = entries.find(x => x.id === editingId);
    if(e) {
      Object.assign(e, {
        book, author: document.getElementById('fAuthor').value.trim(),
        page: document.getElementById('fPage').value.trim(), title: document.getElementById('fTitle').value.trim(),
        content: document.getElementById('fContent').value.trim(), lesson: document.getElementById('fLesson').value.trim(),
        supplement: document.getElementById('fSupplement').value.trim(), tags, drawings: currentDrawings
      });
    }
  } else {
    entries.unshift({
      id: Date.now(), book, author: document.getElementById('fAuthor').value.trim(),
      page: document.getElementById('fPage').value.trim(), title: document.getElementById('fTitle').value.trim(),
      content: document.getElementById('fContent').value.trim(), lesson: document.getElementById('fLesson').value.trim(),
      supplement: document.getElementById('fSupplement').value.trim(), tags, drawings: currentDrawings,
      createdAt: new Date().toISOString().split('T')[0]
    });
  }
  persist();
  render();
  closeModal();
  showToast('保存しました');
}

function editEntry(id) { openModal(id); }
function deleteEntry(id) {
  if (confirm('本当にこの記録を削除しますか？')) {
    entries = entries.filter(x => x.id !== id);
    persist();
    render();
    showToast('削除しました');
  }
}

function onBookInput(v) {
  const list = document.getElementById('suggestList');
  if (!v.trim()) { list.style.display = 'none'; return; }
  const matches = Array.from(bookGroups().values()).filter(g => g.book.toLowerCase().includes(v.toLowerCase()));
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(g => `
    <div class="suggest-item" onclick="selectSuggest('${esc(g.book)}', '${esc(g.author)}')">
      <div class="suggest-title">${esc(g.book)}</div>
      <div class="suggest-author">${esc(g.author)}</div>
    </div>
  `).join('');
  list.style.display = 'block';
}
function selectSuggest(b, a) {
  document.getElementById('fBook').value = b;
  document.getElementById('fAuthor').value = a;
  document.getElementById('suggestList').style.display = 'none';
}

function openBookshelf() {
  const list = document.getElementById('bookshelfList');
  const groups = bookGroups();
  if(!groups.size) { list.innerHTML = '<p style="text-align:center;color:var(--stone-400);padding:2rem 0;">本棚はまだ空です</p>'; }
  else {
    list.innerHTML = [...groups.values()].map(g => `
      <div class="bookshelf-item" onclick="closeBookshelf(); openModal(); selectSuggest('${esc(g.book)}','${esc(g.author)}');">
        <span class="bookshelf-item-icon">📘</span>
        <div class="bookshelf-item-info">
          <div class="bookshelf-item-title">${esc(g.book)}</div>
          <div class="bookshelf-item-meta">${esc(g.author||'著者不明')}</div>
        </div>
        <span class="bookshelf-item-count">${g.entries.length}件</span>
      </div>
    `).join('');
  }
  document.getElementById('bookshelfOverlay').classList.add('open');
}
function closeBookshelf() { document.getElementById('bookshelfOverlay').classList.remove('open'); }

function openDrawingModal() {
  document.getElementById('drawingOverlay').classList.add('open');
  if (!canvas) {
    canvas = document.getElementById('drawingCanvas');
    ctx = canvas.getContext('2d');
    setupCanvasEvents();
  }
  clearDrawing();
}
function closeDrawingModal() { document.getElementById('drawingOverlay').classList.remove('open'); }

function setupCanvasEvents() {
  if (!canvas) return;
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const clientY = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  };
  const start = (e) => { isDrawing = true; pushHistory(); ctx.beginPath(); const p = getPos(e); lastX = p.x; lastY = p.y; ctx.moveTo(lastX, lastY); setDrawingMode(drawingMode); };
  const move = (e) => { if (!isDrawing) return; if (e.cancelable) e.preventDefault(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke(); lastX = p.x; lastY = p.y; };
  const stop = () => { isDrawing = false; };
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop);
}

function setDrawingMode(mode) {
  drawingMode = mode;
  const td = document.getElementById('toolDraw'), te = document.getElementById('toolErase');
  if(td) td.classList.toggle('active', mode === 'draw');
  if(te) te.classList.toggle('active', mode === 'erase');
  if (!ctx) return;
  ctx.strokeStyle = mode === 'erase' ? '#ffffff' : document.getElementById('brushColor').value;
  ctx.lineWidth = mode === 'erase' ? 20 : 3;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
function clearDrawing() { if (!ctx) return; ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); drawingHistory = []; setDrawingMode(drawingMode); }
function pushHistory() { if (canvas) drawingHistory.push(canvas.toDataURL()); }
function undoDrawing() { if (!drawingHistory.length || !ctx) return; const img = new Image(); img.src = drawingHistory.pop(); img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img, 0, 0); }; }
function saveDrawing() { if (canvas) { currentDrawings.push(canvas.toDataURL()); renderDrawingThumbs(); } closeModal(); closeDrawingModal(); }
function renderDrawingThumbs() { const gallery = document.getElementById('drawingGallery'); if(gallery) gallery.innerHTML = currentDrawings.map((d, i) => `<div class="drawing-thumb"><img src="${d}"><button class="drawing-thumb-delete" onclick="currentDrawings.splice(${i},1); renderDrawingThumbs();">✕</button></div>`).join(''); }

function triggerAiSummary(id) { pendingAiId = id; if (!getApiKey()) { document.getElementById('aiKeyOverlay').classList.add('open'); } else { runAiSummary(); } }
function closeAiModal() { document.getElementById('aiKeyOverlay').classList.remove('open'); }
function confirmApiKey() { const k = document.getElementById('apiKeyInput').value.trim(); if(k) { setApiKey(k); closeAiModal(); runAiSummary(); } }

async function runAiSummary() {
  const id = pendingAiId; const e = entries.find(x => x.id === id); const btn = document.getElementById(`btn-ai-${id}`);
  if (!btn || !e) return; btn.disabled = true; btn.textContent = '⏳ 要約生成中…';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': getApiKey(), 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'dangerously-allow-the-browser': 'true' },
      body: JSON.stringify({ model: 'claude-3-haiku-20240307', max_tokens: 300, messages: [{ role: 'user', content: `要約して:\n本: ${e.book}\n内容: ${e.content}\n教訓: ${e.lesson}` }] })
    });
    const data = await response.json();
    if (data.content && data.content[0]) { e.aiSummary = data.content[0].text; persist(); render(); showToast('AI要約を生成しました'); } else { throw new Error(); }
  } catch(err) { showToast('AI要約に失敗しました。'); btn.disabled = false; btn.textContent = '✨ AIで要約・整理'; }
}

function exportData() { const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `reading_notes_${new Date().toISOString().split('T')[0]}.json`; a.click(); }
function importData(evt) { const file = evt.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { try { const parsed = JSON.parse(e.target.result); if (Array.isArray(parsed)) { entries = parsed; persist(); render(); showToast('インポート完了'); } } catch { showToast('不適切なファイル形式です'); } }; reader.readAsText(file); }
function showToast(msg) { const t = document.getElementById('toast'); if (!t) return; t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

// 常時生存監視（拡張機能によってHTML要素が物理消去されても、0.5秒ごとに検知して強制復活させる）
function secureHeartbeatWatcher() {
  const root = document.getElementById('safe-rendering-root-wrapper-v2');
  const target = document.getElementById('dynamic-secure-cards-bucket-v2');
  
  // 外枠か中身のどちらかが消されていた場合、即座にリビルドして再描画
  if (!root || root.innerHTML.trim() === "" || !target) {
    load();
    render();
  }
}

// 起動シーケンス
load();
render();

// 0.5秒おきに超高速で死活監視を実行
setInterval(secureHeartbeatWatcher, 500);
</script>
