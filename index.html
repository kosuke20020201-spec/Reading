<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>読書ノート</title>
<meta name="theme-color" content="#f59e0b">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #f59e0b; --orange: #f97316;
    --amber-light: #fef3c7; --amber-border: #fde68a;
    --stone-50: #fafaf9; --stone-200: #e7e5e4;
    --stone-400: #a8a29e; --stone-600: #57534e; --stone-800: #292524;
  }
  body { font-family: sans-serif; background: #fdfaf5; min-height: 100vh; color: var(--stone-800); padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
  .btn-add { padding: 0.6rem 1.1rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; border: none; cursor: pointer; }
  .card { background: white; border: 1px solid var(--stone-200); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 500px; }
  .field { margin-bottom: 1rem; }
  .field input, .field textarea { width: 100%; padding: 0.5rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 0.5rem 1rem; border-radius: 999px; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>読書ノート</h1>
    <button class="btn-add" onclick="openModal()">＋ 記録を追加</button>
  </header>
  <div id="cardsContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>記録を追加</h2>
    <div class="field"><input type="text" id="fBook" placeholder="タイトル"></div>
    <div class="field"><textarea id="fContent" placeholder="内容"></textarea></div>
    <button onclick="saveEntry()">保存して同期</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2irGnfMzmM6ibvG6V1pKF_nb2TG_djO8KI_g_OwrKnKm5Ur-X4-avuixIxgUZf_H5NQ/exec';
  let entries = [];

  // GASからデータを取得
  async function syncFromGAS() {
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      entries = data;
      render();
    } catch(e) { console.error("データ取得失敗:", e); }
  }

  // GASへデータを送信
  async function syncToGAS(data) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      showToast('スプレッドシートと同期しました');
    } catch(e) { showToast('同期失敗'); }
  }

  function render() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = entries.map(e => `
      <div class="card">
        <h3>${e.book || '無題'}</h3>
        <p>${e.content || ''}</p>
      </div>
    `).join('');
  }

  async function saveEntry() {
    const newEntry = {
      book: document.getElementById('fBook').value,
      content: document.getElementById('fContent').value,
      id: Date.now()
    };
    entries.unshift(newEntry);
    render();
    closeModal();
    await syncToGAS(entries);
  }

  function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // 初期化
  syncFromGAS();
</script>
</body>
</html>
