<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>読書ノート</title>
<style>
  /* ... (中略: 以前の美しいデザインのCSSをここにすべて含める) ... */
  /* CSSは省略せず、以前のコードブロックの<style>～</style>をそのまま入れてください */
</style>
</head>
<body>
<script>
(function() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2irGnfMzmM6ibvG6V1pKF_nb2TG_djO8KI_g_OwrKnKm5Ur-X4-avuixIxgUZf_H5NQ/exec';
  const STORAGE_KEY = 'reading_log_v1';
  let entries = [];

  // ★1. GASからデータを取り込む処理
  async function loadFromGAS() {
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (Array.isArray(data)) {
        entries = data;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render();
      }
    } catch(e) { 
      console.error("GAS読み込みエラー:", e);
      // 通信失敗時はローカルから読み込む
      const local = localStorage.getItem(STORAGE_KEY);
      if(local) { entries = JSON.parse(local); render(); }
    }
  }

  // ★2. GASへデータを送信する処理
  async function syncToGAS(data) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors', // 重要：GASがJSONを返す場合、cors設定が必要な場合があります
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      // 成功時、ローカルも更新
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) { console.error("GAS送信エラー:", e); }
  }

  // ... (その他の既存のJS関数はそのまま維持) ...

  // ★保存関数の修正
  async function saveEntry() {
    // ... (既存の保存ロジック) ...
    // 保存処理の最後に同期を追加
    await syncToGAS(entries); 
    render();
    closeModal();
    showToast('保存して同期しました');
  }

  // 初期化時の同期
  window.addEventListener('DOMContentLoaded', () => {
    loadFromGAS(); // 初回起動時にGASから取得
    render();
  });
})();
</script>
</body>
</html>
