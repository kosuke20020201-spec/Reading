<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>読書ノート</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="読書ノート">
<meta name="theme-color" content="#f59e0b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #f59e0b; --orange: #f97316;
    --amber-light: #fef3c7; --amber-border: #fde68a;
    --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
    --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
    --stone-600: #57534e; --stone-800: #292524;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(135deg, #fdf8f0 0%, #fef9ef 50%, #fdfaf5 100%); min-height: 100vh; color: var(--stone-800); }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at 20% 20%, #fde68a22 0%, transparent 50%), radial-gradient(circle at 80% 80%, #fed7aa22 0%, transparent 50%); }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  header { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: flex-end; gap: 0.75rem; }
  .header-left { align-self: stretch; }
  .header-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.25rem; }
  .header-title { font-family: 'Noto Serif JP', serif; font-size: 2rem; font-weight: 900; line-height: 1.2; }
  .header-meta { font-size: 0.8rem; color: var(--stone-400); margin-top: 0.25rem; }
  .header-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
  .header-btns-row { display: flex; gap: 0.4rem; }
  .btn-add { display: flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.1rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; font-weight: 600; border: none; cursor: pointer; font-size: 0.82rem; transition: filter 0.1s; font-family: inherit; }
  .btn-add:hover { filter: brightness(1.08); } .btn-add:active { transform: scale(0.97); }
  .btn-sub { display: flex; align-items: center; gap: 0.35rem; padding: 0.5rem 0.9rem; border-radius: 999px; background: white; border: 1px solid var(--stone-200); color: var(--stone-600); font-weight: 500; cursor: pointer; font-size: 0.77rem; transition: all 0.1s; font-family: inherit; white-space: nowrap; }
  .btn-sub:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }

  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-icon { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; }
  .search-input { width: 100%; padding: 0.75rem 2.5rem 0.75rem 2.25rem; border-radius: 1rem; border: 1px solid var(--stone-200); background: white; box-shadow: 0 1px 4px #00000008; font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color 0.1s; }
  .search-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b22; }
  .search-input::placeholder { color: var(--stone-300); }
  .search-clear { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--stone-300); font-size: 1rem; line-height: 1; display: none; }

  .filter-bar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tag-filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag-btn { font-size: 0.72rem; font-weight: 500; padding: 0.2rem 0.7rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tag-btn.active { background: var(--stone-800) !important; color: white !important; border-color: var(--stone-800) !important; }
  .sort-select { font-size: 0.72rem; color: var(--stone-500); background: white; border: 1px solid var(--stone-200); border-radius: 999px; padding: 0.25rem 0.75rem; cursor: pointer; font-family: inherit; outline: none; }
  .results-count { font-size: 0.75rem; color: var(--stone-400); margin-bottom: 0.75rem; }

  .bookshelf-main { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.75rem 0.55rem; padding: 0.6rem 0 1.4rem; border-bottom: 8px solid #d6a34c; }
  .book-group { display: flex; align-items: flex-start; gap: 0.75rem; margin: 0; order: 0; }
  .book-group.open { width: 100%; order: -1; }
  .book-spine { width: var(--spine-width, 4.6rem); height: 15.5rem; padding: 0.65rem 0.45rem; border-radius: 0.5rem 0.5rem 0.25rem 0.25rem; border: 1px solid #d97706; background: linear-gradient(180deg, #f59e0b 0%, #f97316 100%); color: white; box-shadow: inset -4px 0 8px #7c2d1225, 0 5px 12px #00000014; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.45rem; font-family: inherit; transition: transform 0.15s, box-shadow 0.15s, filter 0.15s; overflow: hidden; }
  .book-spine:hover { filter: brightness(1.04); transform: translateY(-2px); box-shadow: inset -4px 0 8px #7c2d1225, 0 8px 16px #00000018; }
  .book-group.open .book-spine { height: 18rem; }
  .book-spine-title { display: block; width: var(--title-width, 2.7rem); height: 11.6rem; font-family: 'Noto Serif JP', serif; font-weight: 900; font-size: var(--title-size, 0.84rem); line-height: 1.15; color: white; writing-mode: vertical-rl; text-orientation: mixed; word-break: normal; overflow-wrap: normal; overflow: visible; }
  .book-spine-author { display: block; width: min(var(--title-width, 2.7rem), 2.7rem); height: 2.4rem; font-size: 0.62rem; opacity: 0.86; line-height: 1.1; color: white; writing-mode: vertical-rl; text-orientation: mixed; word-break: normal; overflow-wrap: normal; overflow: hidden; }
  .spine-word-latin { white-space: nowrap; }
  .book-spine-meta { margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 0.25rem; width: 100%; }
  .book-group-count { font-size: 0.68rem; font-weight: 700; padding: 0.12rem 0.45rem; border-radius: 999px; background: rgba(255,255,255,0.22); color: white; white-space: nowrap; }
  .book-group-toggle { font-size: 0.78rem; transition: transform 0.2s; flex-shrink: 0; }
  .book-group.open .book-group-toggle { transform: rotate(90deg); }
  .book-group-cards { display: none; flex-direction: column; gap: 0.75rem; width: min(540px, calc(100vw - 6.6rem)); max-width: 540px; padding-left: 0.75rem; border-left: 2px solid var(--amber-border); }
  .book-group.open .book-group-cards { display: flex; }
  .record-view-controls { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; padding: 0.5rem 0; }
  .record-view-select { font-size: 0.72rem; color: var(--stone-600); background: white; border: 1px solid var(--stone-200); border-radius: 999px; padding: 0.3rem 0.75rem; cursor: pointer; font-family: inherit; outline: none; }
  .record-view-select:disabled { opacity: 0.5; cursor: not-allowed; }
  .record-empty { font-size: 0.78rem; color: var(--stone-400); padding: 0.8rem; border: 1px dashed var(--stone-200); border-radius: 0.75rem; background: white; }

  .card { position: relative; background: white; border-radius: 1rem; border: 1px solid var(--stone-200); box-shadow: 0 1px 4px #00000008; overflow: hidden; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 4px 16px #00000012; }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, var(--amber), var(--orange)); }
  .card-body { padding: 1rem 1rem 0.875rem 1.25rem; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
  .card-title-note { font-size: 0.88rem; font-weight: 700; color: var(--stone-700); margin-bottom: 0.1rem; }
  .card-page { font-size: 0.78rem; font-weight: 600; color: var(--stone-500); }
  .card-date { font-size: 0.7rem; color: var(--stone-300); margin-top: 0.1rem; }
  .card-actions { display: flex; gap: 0.2rem; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .card:hover .card-actions, .card-actions:focus-within { opacity: 1; }
  .card-action-btn { padding: 0.3rem; border-radius: 0.4rem; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: var(--stone-400); transition: all 0.1s; }
  .card-action-btn:hover { background: var(--stone-100); color: var(--stone-600); }
  .card-action-btn.delete:hover { background: #fff1f2; color: #f43f5e; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
  .tag-pill { font-size: 0.68rem; font-weight: 500; padding: 0.15rem 0.55rem; border-radius: 999px; }
  .card-sections { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .section-block { border-radius: 0.6rem; padding: 0.6rem 0.75rem; }
  .section-label { font-size: 0.65rem; font-weight: 700; color: var(--stone-400); margin-bottom: 0.2rem; }
  .section-text { font-size: 0.82rem; line-height: 1.65; white-space: pre-wrap; }
  .content-bg { background: var(--stone-50); } .content-bg .section-text { color: var(--stone-600); }
  .lesson-bg { background: var(--amber-light); } .lesson-bg .section-text { color: #78350f; }
  .supplement-bg { background: var(--stone-50); } .supplement-bg .section-text { color: var(--stone-600); }
  .ai-area { margin-top: 0.75rem; }
  .btn-ai { font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.9rem; border-radius: 999px; border: none; cursor: pointer; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; transition: filter 0.1s; font-family: inherit; }
  .btn-ai:hover { filter: brightness(1.08); } .btn-ai:disabled { opacity: 0.6; cursor: not-allowed; }
  .ai-result { margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.75rem; background: var(--amber-light); border: 1px solid var(--amber-border); font-size: 0.82rem; line-height: 1.7; color: #78350f; }

  /* スケッチ（カード内） */
  .sketch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-top: 0.5rem; }
  .sketch-grid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 0.4rem; border: 1px solid var(--stone-200); cursor: pointer; display: block; transition: opacity 0.1s; }
  .sketch-grid img:hover { opacity: 0.85; }

  /* スケッチサムネイル（フォーム内） */
  .drawing-gallery { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
  .drawing-thumb { position: relative; width: 80px; height: 60px; border: 1px solid var(--stone-200); border-radius: 0.6rem; overflow: hidden; cursor: pointer; transition: border-color 0.1s; }
  .drawing-thumb:hover { border-color: var(--amber); }
  .drawing-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .drawing-thumb-delete { position: absolute; top: 2px; right: 2px; background: rgba(244,63,94,0.9); border: none; border-radius: 4px; color: white; font-size: 0.7rem; padding: 1px 5px; cursor: pointer; display: none; line-height: 1.4; }
  .drawing-thumb:hover .drawing-thumb-delete { display: block; }
  .drawing-thumb-edit-badge { position: absolute; bottom: 2px; left: 2px; background: rgba(245,158,11,0.9); border-radius: 3px; color: white; font-size: 0.6rem; padding: 1px 4px; pointer-events: none; }

  .empty { text-align: center; padding: 4rem 0; color: var(--stone-300); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty p { font-size: 0.85rem; }

  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 1rem; background: rgba(28,22,15,0.5); backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 1.5rem; box-shadow: 0 20px 60px #00000022; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 1.25rem 1.5rem 0.875rem; border-bottom: 1px solid var(--stone-100); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-title { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 1.05rem; }
  .modal-close { background: none; border: none; cursor: pointer; padding: 0.4rem; border-radius: 999px; font-size: 1.1rem; color: var(--stone-400); line-height: 1; }
  .modal-close:hover { background: var(--stone-100); }
  .modal-body { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1rem; }
  .modal-footer { padding: 0.875rem 1.5rem 1.25rem; border-top: 1px solid var(--stone-100); display: flex; justify-content: flex-end; gap: 0.5rem; flex-shrink: 0; }
  .field label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--stone-500); margin-bottom: 0.3rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .field input, .field textarea { width: 100%; padding: 0.6rem 0.75rem; border-radius: 0.65rem; border: 1px solid var(--stone-200); background: var(--stone-50); font-size: 0.82rem; font-family: inherit; outline: none; transition: border-color 0.1s; resize: none; }
  .field input:focus, .field textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b1a; }
  .field input::placeholder, .field textarea::placeholder { color: var(--stone-300); }
  .lesson-field { background: var(--amber-light) !important; border-color: var(--amber-border) !important; }
  .btn-cancel { padding: 0.5rem 1.1rem; border-radius: 999px; background: none; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--stone-500); font-family: inherit; }
  .btn-cancel:hover { background: var(--stone-100); }
  .btn-save { padding: 0.5rem 1.25rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; font-family: inherit; }
  .btn-save:hover { filter: brightness(1.08); }
  .ai-key-note { font-size: 0.75rem; color: var(--stone-400); line-height: 1.6; }
  .ai-key-note a { color: var(--amber); }

  .suggest-wrap { position: relative; }
  .suggest-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--amber-border); border-radius: 0.75rem; box-shadow: 0 8px 24px #00000015; z-index: 200; overflow-y: auto; max-height: 200px; }
  .suggest-item { padding: 0.65rem 0.875rem; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--stone-100); }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover { background: var(--amber-light); }
  .suggest-title { font-size: 0.82rem; font-weight: 600; color: var(--stone-800); }
  .suggest-author { font-size: 0.7rem; color: var(--stone-400); margin-top: 0.1rem; }

  .bookshelf-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .bookshelf-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid var(--stone-200); cursor: pointer; transition: all 0.15s; background: white; }
  .bookshelf-item:hover { border-color: var(--amber); background: var(--amber-light); }
  .bookshelf-item-icon { font-size: 1.3rem; flex-shrink: 0; }
  .bookshelf-item-info { flex: 1; min-width: 0; }
  .bookshelf-item-title { font-weight: 700; font-size: 0.85rem; }
  .bookshelf-item-meta { font-size: 0.7rem; color: var(--stone-400); margin-top: 0.1rem; }
  .bookshelf-item-count { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.55rem; border-radius: 999px; background: var(--amber-light); color: #92400e; white-space: nowrap; }

  /* 描画モーダル */
  .drawing-tools { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .drawing-tool-btn { padding: 0.4rem 0.8rem; border-radius: 0.6rem; border: 1px solid var(--stone-200); background: white; cursor: pointer; font-size: 0.72rem; font-family: inherit; transition: all 0.1s; }
  .drawing-tool-btn:hover { border-color: var(--amber); }
  .drawing-tool-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
  #drawingCanvas { border: 2px solid var(--stone-200); border-radius: 0.8rem; background: white; display: block; width: 100%; touch-action: none; cursor: crosshair; }

  /* 画像ビューアー */
  .viewer-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 1rem; }
  .viewer-overlay.open { display: flex; }
  .viewer-img { max-width: 95vw; max-height: 90vh; border-radius: 0.75rem; display: block; }

  .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #292524; color: white; font-size: 0.8rem; font-weight: 500; padding: 0.6rem 1.2rem; border-radius: 999px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 固定タグ */
  .fixed-tag-chips { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:0.4rem; min-height:0.5rem; }
  .fixed-tag-chip { display:inline-flex; align-items:center; gap:0.2rem; font-size:0.7rem; font-weight:600; padding:0.2rem 0.5rem 0.2rem 0.6rem; border-radius:999px; background:var(--amber-light); color:#92400e; border:1px solid var(--amber-border); }
  .fixed-tag-chip button { background:none; border:none; cursor:pointer; color:#b45309; font-size:0.75rem; line-height:1; padding:0; }
  .fixed-tag-hint { font-size:0.68rem; color:var(--stone-400); margin-top:0.25rem; }
  .tag-pill-fixed { background:var(--amber-light); color:#92400e; border:1px solid var(--amber-border); }
  .tag-pill-free { }
  .bookshelf-item-tags { display:flex; flex-wrap:wrap; gap:0.25rem; margin-top:0.3rem; }
  .bookshelf-tag-chip { font-size:0.65rem; padding:0.1rem 0.5rem; border-radius:999px; background:var(--amber-light); color:#92400e; }

  .tc-0{background:#fef3c7;color:#92400e} .tc-1{background:#e0f2fe;color:#0c4a6e}
  .tc-2{background:#d1fae5;color:#065f46} .tc-3{background:#ffe4e6;color:#9f1239}
  .tc-4{background:#ede9fe;color:#4c1d95} .tc-5{background:#ffedd5;color:#7c2d12}

  @media (max-width: 480px) {
    .header-title { font-size: 1.6rem; }
    .field-row { grid-template-columns: 1fr; }
    .card-actions { opacity: 1; }
    .bookshelf-main { gap: 0.55rem 0.4rem; }
    .book-spine { width: var(--spine-width-mobile, var(--spine-width, 4.2rem)); height: 14rem; padding-inline: 0.35rem; }
    .book-group.open .book-spine { height: 16.5rem; }
    .book-spine-title { font-size: var(--title-size, 0.78rem); height: 10rem; width: var(--title-width-mobile, var(--title-width, 2.4rem)); }
    .book-spine-author { font-size: 0.58rem; height: 2.2rem; width: min(var(--title-width-mobile, var(--title-width, 2.4rem)), 2.4rem); }
    .book-group-cards { width: calc(100vw - 5.7rem); padding-left: 0.55rem; }
  }
</style>
</head>
<body>
<div class="bg-orbs"></div>

<div id="installBanner" style="display:none;position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 2rem);max-width:400px;background:white;border-radius:1rem;border:1px solid #fde68a;box-shadow:0 8px 24px #00000015;padding:1rem;align-items:center;gap:0.75rem">
  <span style="font-size:1.5rem;flex-shrink:0">📚</span>
  <div style="flex:1;min-width:0"><div style="font-size:0.82rem;font-weight:700;color:#292524">ホーム画面に追加</div><div style="font-size:0.72rem;color:#a8a29e;margin-top:0.1rem">オフラインでも使用可能</div></div>
  <button id="btnInstall" style="padding:0.4rem 0.9rem;border-radius:999px;background:linear-gradient(to right,#f59e0b,#f97316);color:white;border:none;cursor:pointer;font-size:0.78rem;font-weight:700;flex-shrink:0;font-family:inherit">追加</button>
  <button id="btnDismiss" style="background:none;border:none;cursor:pointer;color:#a8a29e;font-size:1.1rem;padding:0.2rem;line-height:1;flex-shrink:0">✕</button>
</div>

<div class="container">
  <header>
    <div class="header-left">
      <p class="header-eyebrow">Reading Journal <span style="background:#ef4444;color:white;font-size:0.55rem;padding:0.1rem 0.4rem;border-radius:4px;letter-spacing:0;text-transform:none">v3-FIXED</span></p>
      <h1 class="header-title">読書ノート</h1>
      <p class="header-meta" id="headerMeta"></p>
    </div>
    <div class="header-btns">
      <button class="btn-add" onclick="openModal()">＋ 記録を追加</button>
      <div class="header-btns-row">
        <button class="btn-sub" onclick="openBookshelf()">📚 本棚</button>
        <button class="btn-sub" onclick="exportData()">📤 エクスポート</button>
        <label class="btn-sub" style="cursor:pointer">📥 インポート<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
      </div>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>

<script>
const STORAGE_KEY   = 'reading_log_v1';
const DELETED_KEY   = 'reading_log_deleted';
const API_KEY_KEY   = 'reading_log_api_key';
const CLOUD_URL     = 'https://script.google.com/macros/s/AKfycbw2irGnfMzmM6ibvG6V1pKF_nb2TG_djO8KI_g_OwrKnKm5Ur-X4-avuixIxgUZf_H5NQ/exec';
const BOOK_META_KEY = 'reading_log_book_meta';

let entries = [], searchQuery = '', activeTag = '', editingId = null, pendingAiId = null;
let currentDrawings = [], editingDrawingIndex = null;
let currentFixedTags = [];
let fixedTagEditOnly = false;
let openBookKey = null;
let expandedRecordSort = 'new';
let expandedRecordScope = 'all';
let drawMode = 'draw', drawHistory = [], isDrawing = false, lastX = 0, lastY = 0;
let dCanvas = null, dCtx = null, dpiRatio = 1;

// ── 削除ID管理 ─────────────────────────────────────
function getDeletedIds() { try { return new Set(JSON.parse(localStorage.getItem(DELETED_KEY)||'[]')); } catch { return new Set(); } }
function addDeletedId(id) { const ids=getDeletedIds(); ids.add(String(id)); localStorage.setItem(DELETED_KEY,JSON.stringify([...ids])); }

// ── Book Meta (固定タグ) ──────────────────────────
function bookKey(book) {
  return (book || '').trim().replace(/\s+/g, ' ').toLocaleLowerCase('ja-JP');
}

function cleanTagList(tags) {
  const seen = new Set();
  const clean = [];
  (Array.isArray(tags) ? tags : []).forEach(function(tag) {
    const value = String(tag || '').trim();
    if (!value || seen.has(value)) return;
    seen.add(value);
    clean.push(value);
  });
  return clean;
}

function getBookMeta() {
  try {
    const stored = localStorage.getItem(BOOK_META_KEY);
    if (!stored) return {};
    const parsed = JSON.parse(stored);
    // 配列やnullなど壊れたデータは空オブジェクトで返す
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return {};
    return parsed;
  } catch(e) { return {}; }
}

// ── 固定タグ(book_meta)をクラウドに同期するための特殊エントリ ──
// 既存のスプレッドシート側のスキーマを変更せずに済むよう、
// 通常のエントリと同じ形（idとcontent列）に乗せて book_meta 全体を運ぶ。
const BOOK_META_SYNC_ID = '__book_meta__';

function buildBookMetaSyncEntry() {
  return {
    id: BOOK_META_SYNC_ID,
    book: '',
    title: '',
    content: JSON.stringify(getBookMeta()),
    tags: [],
    drawings: [],
    createdAt: '1970-01-01',
    isBookMeta: true
  };
}

// クラウドから取得した固定タグ情報をローカルのbook_metaへ統合する
// （クラウド側の値を優先しつつ、ローカルにしかないキーは保持する）
function mergeBookMetaFromCloud(cloudMetaEntry) {
  if (!cloudMetaEntry) return;
  let cloudMeta;
  try {
    cloudMeta = JSON.parse(cloudMetaEntry.content || '{}');
  } catch(e) { return; }
  if (!cloudMeta || typeof cloudMeta !== 'object' || Array.isArray(cloudMeta)) return;

  const localMeta = getBookMeta();
  const merged = {...localMeta};
  Object.keys(cloudMeta).forEach(function(key) {
    merged[key] = cleanTagList(cloudMeta[key]);
  });
  localStorage.setItem(BOOK_META_KEY, JSON.stringify(merged));
}

function getBookFixedTags(book) {
  const key = bookKey(book);
  if (!key) return [];
  const meta = getBookMeta();
  const storedTags = cleanTagList(meta[key]);
  if (storedTags.length) return storedTags;

  // v3-FIXED以前は本タイトルそのものをキーにしていたため、旧キーも拾う。
  const legacyKey = (book || '').trim();
  const legacyTags = cleanTagList(meta[legacyKey]);
  if (legacyTags.length) return legacyTags;

  const fromEntries = [];
  entries.forEach(function(entry) {
    if (bookKey(entry.book) === key) fromEntries.push(...cleanTagList(entry.fixedTags));
  });
  return cleanTagList(fromEntries);
}

function setBookFixedTags(book, tags) {
  const key = bookKey(book);
  if (!key) return;
  const meta = getBookMeta();
  const cleanTags = cleanTagList(tags);
  meta[key] = cleanTags;
  const legacyKey = (book || '').trim();
  if (legacyKey && legacyKey !== key) delete meta[legacyKey];
  localStorage.setItem(BOOK_META_KEY, JSON.stringify(meta));
  applyFixedTagsToEntries(book, cleanTags);
}

function applyFixedTagsToEntries(book, tags) {
  const key = bookKey(book);
  const cleanTags = cleanTagList(tags);
  if (!key) return;
  entries = entries.map(function(entry) {
    if (bookKey(entry.book) !== key) return entry;
    if (!cleanTags.length) {
      const clone = {...entry};
      delete clone.fixedTags;
      return clone;
    }
    return {...entry, fixedTags: [...cleanTags]};
  });
}

function syncEntryFixedTags() {
  entries = entries.map(function(entry) {
    const fixedTags = getBookFixedTags(entry.book);
    if (!fixedTags.length) {
      const clone = {...entry};
      delete clone.fixedTags;
      return clone;
    }
    return {...entry, fixedTags};
  });
}

// 旧形式（e.fixedTags）→ BOOK_META_KEY へ自動マイグレーション
function migrateOldFixedTags() {
  const meta = getBookMeta();
  let changed = false;

  Object.keys(meta).forEach(function(rawKey) {
    const normalizedKey = bookKey(rawKey);
    if (!normalizedKey || normalizedKey === rawKey) return;
    meta[normalizedKey] = cleanTagList([...(meta[normalizedKey] || []), ...(meta[rawKey] || [])]);
    delete meta[rawKey];
    changed = true;
  });

  entries.forEach(function(e) {
    const book = (e.book || '').trim();
    if (!book) return;
    const key = bookKey(book);
    const mergedTags = cleanTagList([...(meta[key] || []), ...(e.fixedTags || [])]);
    if (mergedTags.length && JSON.stringify(meta[key] || []) !== JSON.stringify(mergedTags)) {
      meta[key] = mergedTags;
      changed = true;
    }
  });
  if (changed) {
    localStorage.setItem(BOOK_META_KEY, JSON.stringify(meta));
  }
  syncEntryFixedTags();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

const SAMPLE = [
  { id:1, title:"グライダー型人間について", book:"思考の整理学", author:"外山滋比古", page:"pp.42–55",
    content:"グライダー型人間とエンジン型人間の違い。自力で飛べないか、自ら飛び立つか。",
    lesson:"受け身にならず、自ら問いを立てて考える習慣を持つ。",
    supplement:"ソクラテスの産婆術も同様の思想。", tags:["思考法","教育"], drawings:[], createdAt:"2024-11-15" },
  { id:2, book:"FACTFULNESS", author:"ハンス・ロスリング", page:"pp.18–30",
    content:"人間には10の本能的な思い込みがある。「ネガティブ本能」は世界が悪化していると信じさせる。",
    lesson:"感情ではなくデータで世界を見ること。",
    supplement:"メディアリテラシーとも関連。", tags:["統計","認知バイアス"], drawings:[], createdAt:"2024-12-03" }
];

// ── Persistence ────────────────────────────────────
function load() { try { const r=localStorage.getItem(STORAGE_KEY); entries=r?JSON.parse(r):SAMPLE; if(!Array.isArray(entries))entries=SAMPLE; } catch { entries=SAMPLE; } }

function persist() {
  syncEntryFixedTags();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  syncToCloud();
}

// ── Cloud Sync ─────────────────────────────────────
async function syncToCloud() {
  try {
    const payload = [...entries, buildBookMetaSyncEntry()];
    await fetch(CLOUD_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  } catch(e) { console.warn('Cloud sync failed:',e); }
}

async function loadFromCloud() {
  try {
    showSyncStatus('☁️ クラウドから同期中…');
    const r = await fetch(CLOUD_URL+'?t='+Date.now());
    const cloudRaw = await r.json();
    if (!Array.isArray(cloudRaw)||cloudRaw.length===0) { hideSyncStatus(); return; }

    // 固定タグ(book_meta)の同期用エントリを取り出してローカルへ統合
    const cloudMetaEntry = cloudRaw.find(e => e && String(e.id) === BOOK_META_SYNC_ID);
    mergeBookMetaFromCloud(cloudMetaEntry);
    const cloud = cloudRaw.filter(e => e && String(e.id) !== BOOK_META_SYNC_ID);

    const deletedIds = getDeletedIds();
    const filtered = cloud.filter(e=>!deletedIds.has(String(e.id))&&String(e.deleted)!=='TRUE');
    const localMap = Object.fromEntries(entries.map(e=>[String(e.id),e]));
    const cloudMap = Object.fromEntries(filtered.map(e=>[String(e.id),e]));
    const allIds = new Set([...Object.keys(localMap),...Object.keys(cloudMap)]);
    entries = [...allIds].filter(id=>!deletedIds.has(id)).map(id=>{
      const c=cloudMap[id], l=localMap[id];
      if(!c) return l;
      const drawings = (c.drawings&&c.drawings.length) ? c.drawings : ((l&&l.drawings)||[]);
      return {...c, drawings};
    });
    entries.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    migrateOldFixedTags();
    render();
    showSyncStatus('✅ 同期完了'); setTimeout(hideSyncStatus,2000);
  } catch(e) { console.warn('Cloud load failed:',e); hideSyncStatus(); }
}

function showSyncStatus(msg) {
  let el=document.getElementById('syncStatus');
  if(!el){el=document.createElement('div');el.id='syncStatus';document.body.appendChild(el);}
  el.textContent=msg; el.style.cssText='position:fixed;top:1rem;right:1rem;background:white;border:1px solid #fde68a;border-radius:999px;padding:0.4rem 0.9rem;font-size:0.75rem;font-weight:600;color:#78716c;z-index:999;box-shadow:0 2px 8px #00000015;';
}
function hideSyncStatus() { const el=document.getElementById('syncStatus'); if(el)el.remove(); }

function getApiKey() { return localStorage.getItem(API_KEY_KEY)||''; }
function setApiKey(k) { localStorage.setItem(API_KEY_KEY,k); }

// ── Helpers ────────────────────────────────────────
function tagClass(t) { let h=0; for(let i=0;i<t.length;i++) h=(h*31+t.charCodeAt(i))%6; return `tc-${h}`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function allTags() {
  const s = new Set();
  entries.forEach(e => {
    (e.tags||[]).forEach(t => s.add(t));
    // BUGFIX: 表示にはその本の固定タグをbook_metaから取得する
    getBookFixedTags(e.book).forEach(t => s.add(t));
  });
  return [...s];
}

function bookGroups() {
  const map = new Map();
  entries.forEach(e => {
    const k=bookKey(e.book);
    if(!map.has(k)) map.set(k,{book:e.book||'',author:e.author||'',entries:[]});
    map.get(k).entries.push(e);
  });
  return map;
}

function getFiltered() {
  const q=searchQuery.toLowerCase(),sort=document.getElementById('sortSelect').value;
  return entries.filter(e=>{
    if(activeTag && !entryHasTag(e, activeTag)) return false;
    return entryMatchesSearch(e, q);
  }).sort((a,b)=>sort==='book'?(a.book||'').localeCompare(b.book||'','ja'):(Number(b.id||0)-Number(a.id||0)));
}

function entryHasTag(entry, tag) {
  if (!tag) return true;
  return (entry.tags||[]).includes(tag) || getBookFixedTags(entry.book).includes(tag);
}

function entryMatchesSearch(entry, query) {
  if (!query) return true;
  const fixedTags = getBookFixedTags(entry.book);
  return [entry.title,entry.book,entry.author,entry.content,entry.lesson,entry.supplement,...(entry.tags||[]),...fixedTags]
    .some(s=>(s||'').toLowerCase().includes(query));
}

function entryPageValue(entry) {
  const match = String(entry.page || '').match(/\d+/);
  return match ? Number(match[0]) : Number.POSITIVE_INFINITY;
}

function sortExpandedRecords(list) {
  return list.slice().sort(function(a,b) {
    const pageDiff = entryPageValue(a) - entryPageValue(b);
    if (pageDiff !== 0) return expandedRecordSort === 'old' ? pageDiff : -pageDiff;
    return Number(a.id || 0) - Number(b.id || 0);
  });
}

function expandedRecordsForGroup(group) {
  const key = bookKey(group.book);
  const q = searchQuery.toLowerCase();
  let list = entries.filter(function(entry) {
    return bookKey(entry.book) === key && entryMatchesSearch(entry, q);
  });
  if (expandedRecordScope === 'activeTag' && activeTag) {
    list = list.filter(function(entry) { return entryHasTag(entry, activeTag); });
  }
  return sortExpandedRecords(list);
}

// ── Render ─────────────────────────────────────────
function render() {
  const tags=allTags(),groups=bookGroups();
  document.getElementById('headerMeta').textContent=`${entries.length}件の記録 · ${groups.size}冊 · ${tags.length}個のタグ`;

  const wrap=document.getElementById('tagFilters');
  wrap.innerHTML=`<button class="tag-btn${activeTag===''?' active':''}" onclick="setTag('')">すべて</button>`;
  tags.forEach(t=>{const b=document.createElement('button');b.className=`tag-btn ${tagClass(t)}${activeTag===t?' active':''}`;b.textContent=t;b.onclick=()=>setTag(t);wrap.appendChild(b);});

  const list=getFiltered(),container=document.getElementById('cardsContainer'),empty=document.getElementById('emptyState'),countEl=document.getElementById('resultsCount');
  if(searchQuery||activeTag){countEl.style.display='block';countEl.textContent=`${list.length}件 ヒット`;}else{countEl.style.display='none';}
  if(!list.length){container.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  const grouped=new Map();
  list.forEach(e=>{const k=bookKey(e.book)||'（タイトル未入力）';if(!grouped.has(k))grouped.set(k,{book:e.book||'',author:e.author||'',entries:[]});grouped.get(k).entries.push(e);});

  container.innerHTML=`<div class="bookshelf-main">${[...grouped.entries()].map(([k,g],gi)=>{
    const spineVars = spineStyle(g.book || 'タイトル未入力');
    const isOpen = openBookKey === k;
    return `
<div class="book-group${isOpen?' open':''}" id="grp-${gi}" data-book-key="${esc(k)}">
  <button type="button" class="book-spine" style="${spineVars}" onclick="toggleBookGroup(${gi})" data-book-title="${esc(g.book||'タイトル未入力')}" aria-expanded="${isOpen?'true':'false'}" aria-controls="grp-${gi}-cards" aria-label="${esc(g.book||'タイトル未入力')}の記録を${isOpen?'閉じる':'開く'}">
    <span class="book-spine-title">${formatSpineText(g.book||'タイトル未入力')}</span>
    ${g.author?`<span class="book-spine-author">${formatSpineText(g.author)}</span>`:''}
    <span class="book-spine-meta">
      <span class="book-group-count">${g.entries.length}件</span>
      <span class="book-group-toggle">▶</span>
    </span>
  </button>
  <div class="book-group-cards" id="grp-${gi}-cards">${expandedRecordsHTML(g)}</div>
</div>`;
  }).join('')}</div>`;
}

function expandedRecordsHTML(group) {
  const records = expandedRecordsForGroup(group);
  const scopeValue = activeTag ? expandedRecordScope : 'all';
  const activeTagLabel = activeTag ? `選択タグ「${esc(activeTag)}」のみ` : '選択タグのみ';
  return `
    <div class="record-view-controls">
      <select class="record-view-select" onchange="setExpandedRecordSort(this.value)">
        <option value="new"${expandedRecordSort==='new'?' selected':''}>新しい順（ページ大）</option>
        <option value="old"${expandedRecordSort==='old'?' selected':''}>古い順（ページ小）</option>
      </select>
      <select class="record-view-select" onchange="setExpandedRecordScope(this.value)" ${activeTag?'':'disabled'}>
        <option value="all"${scopeValue==='all'?' selected':''}>すべての記録</option>
        <option value="activeTag"${scopeValue==='activeTag'?' selected':''}>${activeTagLabel}</option>
      </select>
    </div>
    ${records.length ? records.map(e=>cardHTML(e)).join('') : '<div class="record-empty">該当する記録がありません</div>'}`;
}

function setExpandedRecordSort(value) {

function spineStyle(title) {
  const len = [...String(title || '')].length;
  const columns = Math.max(2, Math.ceil(len / 13));
  const titleWidth = Math.max(2.7, columns * 1.18);
  const spineWidth = titleWidth + 1.65;
  const titleWidthMobile = Math.max(2.35, columns * 1.02);
  const spineWidthMobile = titleWidthMobile + 1.3;
  const titleSize = len > 42 ? 0.74 : (len > 30 ? 0.78 : 0.84);
  return [
    `--title-width:${titleWidth.toFixed(2)}rem`,
    `--spine-width:${spineWidth.toFixed(2)}rem`,
    `--title-width-mobile:${titleWidthMobile.toFixed(2)}rem`,
    `--spine-width-mobile:${spineWidthMobile.toFixed(2)}rem`,
    `--title-size:${titleSize}rem`
  ].join(';');
}

function formatSpineText(text) {
  return String(text || '').split(/([A-Za-z0-9][A-Za-z0-9'’&.+-]*)/g).map(function(part) {
    if (!part) return '';
    if (/^[A-Za-z0-9]/.test(part)) return `<span class="spine-word-latin">${esc(part)}</span>`;
    return esc(part);
  }).join('');
}

function toggleBookGroup(index) {

  const shouldOpen = !group.classList.contains('open');

  openBookKey = nextOpenKey;

}

function onBookInput(val) {
  const list=document.getElementById('suggestList');
  if(!val.trim()){list.style.display='none';currentFixedTags=[];renderFixedTagChips();return;}
  const q=bookKey(val);
  const allGroups=[...bookGroups().values()];
  const exact=allGroups.find(g=>bookKey(g.book)===q);
  const newTags=getBookFixedTags(exact ? exact.book : val);
  if(JSON.stringify(newTags)!==JSON.stringify(currentFixedTags)){
    currentFixedTags=newTags;
    renderFixedTagChips();
  }
  const matches=allGroups.filter(g=>bookKey(g.book).includes(q)&&bookKey(g.book)!==q).slice(0,5);
  if(!matches.length){list.style.display='none';return;}
  list._matches = matches;
  list.innerHTML=matches.map((g,i)=>`<div class="suggest-item" onclick="selectSuggestion(${i})"><div class="suggest-title">${esc(g.book)}</div>${g.author?`<div class="suggest-author">${esc(g.author)}</div>`:''}</div>`).join('');
  list.style.display='block';
}

  ['fBook','fAuthor','fPage','fTitle','fContent','fLesson','fSupplement','fTags'].forEach(function(fid){ document.getElementById(fid).value=''; });

      document.getElementById('fBook').value       = e.book||'';
      document.getElementById('fAuthor').value     = e.author||'';
      document.getElementById('fPage').value       = e.page||'';
      document.getElementById('fTitle').value      = e.title||'';

  if (fixedTagEditOnly) {

    showToast('固定タグを保存しました');

  }

  // BUGFIX: その本専用の固定タグとして保存（他の本には影響しない）
  setBookFixedTags(bookName, currentFixedTags);

  const tags = document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const data = {

  else { entries.unshift({...data,id:Date.now(),createdAt:new Date().toISOString().slice(0,10)}); }

function openDrawingModal(editIndex) {
  editingDrawingIndex = (editIndex!==null&&editIndex!==undefined) ? editIndex : null;
  const isEdit = editingDrawingIndex!==null;
  document.getElementById('drawingModalTitle').textContent = isEdit ? '🎨 スケッチを編集' : '🎨 スケッチを描画';
  document.getElementById('drawingOverlay').classList.add('open');
  setTimeout(()=>{
    const old=document.getElementById('drawingCanvas');
    const neo=old.cloneNode(false);
    old.parentNode.replaceChild(neo,old);
    dCanvas=neo; dCtx=dCanvas.getContext('2d');
    const cssW=dCanvas.offsetWidth||460, cssH=360;
    dpiRatio=window.devicePixelRatio||1;
    dCanvas.width=cssW*dpiRatio; dCanvas.height=cssH*dpiRatio;
    dCanvas.style.width=cssW+'px'; dCanvas.style.height=cssH+'px';
    dCtx.scale(dpiRatio,dpiRatio);
    dCtx.fillStyle='white'; dCtx.fillRect(0,0,cssW,cssH);
    if(isEdit&&currentDrawings[editingDrawingIndex]){
      const img=new Image();
      img.onload=()=>{ dCtx.drawImage(img,0,0,cssW,cssH); saveDrawState(); };
      img.src=currentDrawings[editingDrawingIndex];
    } else { drawHistory=[]; saveDrawState(); }
    drawMode='draw';
    document.getElementById('toolDraw').classList.add('active');
    document.getElementById('toolErase').classList.remove('active');
    dCanvas.addEventListener('pointerdown',onPtrDown);
    dCanvas.addEventListener('pointermove',onPtrMove);
    dCanvas.addEventListener('pointerup',onPtrUp);
    dCanvas.addEventListener('pointercancel',onPtrUp);
    dCanvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
    dCanvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  },50);
}
function closeDrawingModal() { document.getElementById('drawingOverlay').classList.remove('open'); isDrawing=false; }

function setDrawingMode(mode,btn) {
  drawMode=mode;
  document.querySelectorAll('.drawing-tool-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function canvasPos(e) {
  const rect=dCanvas.getBoundingClientRect();
  const cx=e.clientX??e.touches?.[0]?.clientX??0;
  const cy=e.clientY??e.touches?.[0]?.clientY??0;
  return {x:cx-rect.left, y:cy-rect.top};
}

function onPtrDown(e) { e.preventDefault(); isDrawing=true; saveDrawState(); const p=canvasPos(e); lastX=p.x; lastY=p.y; }
function onPtrMove(e) {
  if(!isDrawing) return; e.preventDefault();
  const p=canvasPos(e);
  dCtx.lineCap='round'; dCtx.lineJoin='round';
  if(drawMode==='erase'){
    const sz=+document.getElementById('brushSize').value*4;
    dCtx.clearRect(p.x-sz/2,p.y-sz/2,sz,sz);
  } else {
    dCtx.strokeStyle=document.getElementById('brushColor').value;
    dCtx.lineWidth=+document.getElementById('brushSize').value;
    dCtx.beginPath(); dCtx.moveTo(lastX,lastY); dCtx.lineTo(p.x,p.y); dCtx.stroke();
  }
  lastX=p.x; lastY=p.y;
}
function onPtrUp() { isDrawing=false; }

function saveDrawState() {
  const tmp=document.createElement('canvas');
  const cssW=dCanvas.width/dpiRatio, cssH=dCanvas.height/dpiRatio;
  tmp.width=cssW; tmp.height=cssH;
  tmp.getContext('2d').drawImage(dCanvas,0,0,cssW,cssH);
  drawHistory.push(tmp.toDataURL());
  if(drawHistory.length>20) drawHistory.shift();
}

function undoDrawing() {
  if(drawHistory.length<=1) return;
  drawHistory.pop();
  const img=new Image();
  img.onload=()=>{
    const cssW=dCanvas.width/dpiRatio, cssH=dCanvas.height/dpiRatio;
    dCtx.clearRect(0,0,cssW,cssH);
    dCtx.drawImage(img,0,0,cssW,cssH);
  };
  img.src=drawHistory[drawHistory.length-1];
}

function clearDrawing() {
  const cssW=dCanvas.width/dpiRatio, cssH=dCanvas.height/dpiRatio;
  dCtx.fillStyle='white'; dCtx.fillRect(0,0,cssW,cssH);
  drawHistory=[]; saveDrawState();
}

function saveDrawing() {
  const full=document.createElement('canvas');
  const cssW=dCanvas.width/dpiRatio, cssH=dCanvas.height/dpiRatio;
  full.width=cssW; full.height=cssH;
  full.getContext('2d').drawImage(dCanvas,0,0,cssW,cssH);
  const sync=document.createElement('canvas');
  sync.width=250; sync.height=188;
  sync.getContext('2d').drawImage(full,0,0,250,188);
  const dataUrl=sync.toDataURL('image/jpeg',0.45);
  if(editingDrawingIndex!==null){
    currentDrawings[editingDrawingIndex]=dataUrl;
    showToast('✏️ スケッチを更新しました');
  } else {
    currentDrawings.push(dataUrl);
    showToast('🎨 スケッチを保存しました');
  }
  renderDrawingGallery();
  closeDrawingModal();
}

  await runAI(id,btn,key);
}

function confirmApiKey() {
  const k=document.getElementById('apiKeyInput').value.trim(); if(!k)return;
  setApiKey(k); closeAiModal();
  if(pendingAiId!==null){const btn=document.querySelector(`#card-${pendingAiId} .btn-ai`);runAI(pendingAiId,btn,k);pendingAiId=null;}
}
async function runAI(id,btn,key) {
  const e=entries.find(e=>e.id===id); if(!e) return;
  btn.disabled=true; btn.textContent='要約中…';
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`以下の読書ノートを3行以内で日本語要約してください。\n\n本:「${e.book}」著者:${e.author}\n内容:${e.content}\n教訓:${e.lesson}\n\n要点を箇条書きにせず流れるような文章でまとめてください。`}]})
    });
    const d=await r.json();
    e.aiSummary=d.content?.map(b=>b.text||'').join('')||'要約を取得できませんでした。';
    persist(); render(); showToast('✨ AI要約完了');
  } catch { showToast('エラーが発生しました。'); }
  finally { btn.disabled=false; btn.textContent=e.aiSummary?'✨ 再要約':'✨ AI要約'; }
}

function exportData() {
  syncEntryFixedTags();
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`reading-log-${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('📤 エクスポートしました');
}
function importData(ev) {
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const imp=JSON.parse(e.target.result); if(!Array.isArray(imp))throw new Error();
      const existIds=new Set(entries.map(e=>e.id));
      const newMap=Object.fromEntries(imp.map(e=>[e.id,e]));
      entries=[...entries.map(e=>newMap[e.id]?{...e,...newMap[e.id]}:e),...imp.filter(e=>!existIds.has(e.id))];
      migrateOldFixedTags();
      persist(); render(); showToast(`📥 ${imp.length}件をインポートしました`);
    } catch { showToast('❌ ファイルの形式が正しくありません'); }
    ev.target.value='';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}

// 過去のService Worker/キャッシュが原因で、ホーム画面のショートカットから開くと
// 古いバージョン（タイトル・イラスト未対応の初期版など）が表示されることがあった。
// そのため、初回のみ既存のService Workerとキャッシュを完全に削除してリロードし、
// その後はキャッシュを経由せず常に最新のsw.jsを取得・登録するようにする。
const SW_CLEANUP_FLAG = 'reading_log_sw_cleanup_v2';
if ('serviceWorker' in navigator) {
  (async () => {
    try {
      if (!localStorage.getItem(SW_CLEANUP_FLAG)) {
        const regs = await navigator.serviceWorker.getRegistrations();
        let hadOld = false;
        for (const reg of regs) { await reg.unregister(); hadOld = true; }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        localStorage.setItem(SW_CLEANUP_FLAG, '1');
        if (hadOld) { location.reload(); return; }
      }
      // updateViaCache:'none' により、sw.js自体はブラウザ/CDNのHTTPキャッシュを
      // 経由せず毎回取得され、新しいバージョンへの切り替えが確実に行われる。
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    } catch (err) {
      console.warn('Service worker cleanup failed:', err);
    }
  })();
}

let deferredPrompt=null;
const banner=document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;banner.style.display='flex';});
document.getElementById('btnInstall')?.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;banner.style.display='none';});
document.getElementById('btnDismiss')?.addEventListener('click',()=>{banner.style.display='none';});
window.addEventListener('appinstalled',()=>{banner.style.display='none';deferredPrompt=null;});

load(); migrateOldFixedTags(); render(); loadFromCloud();
</script>
