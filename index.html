<!DOCTYPE html>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #f59e0b; --orange: #f97316;
    --amber-light: #fef3c7; --amber-border: #fde68a;
    --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
    --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
    --stone-600: #57534e; --stone-800: #292524;
    --sticky-controls-offset: 0px;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(135deg, #fdf8f0 0%, #fef9ef 50%, #fdfaf5 100%); min-height: 100vh; color: var(--stone-800); }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at 20% 20%, #fde68a22 0%, transparent 50%), radial-gradient(circle at 80% 80%, #fed7aa22 0%, transparent 50%); }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  header { margin-bottom: 2rem; display: flex; flex-direction: column; align-items: flex-end; gap: 0.75rem; }
  .header-left { align-self: stretch; }
  .header-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.25em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.25rem; }
  .header-title { font-family: 'Noto Serif JP', serif; font-size: 2rem; font-weight: 900; line-height: 1.2; }
  .header-meta { font-size: 0.8rem; color: var(--stone-400); margin-top: 0.25rem; }
  .header-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
  .header-btns-row { display: flex; gap: 0.4rem; }
  .btn-add { display: flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.1rem; border-radius: 999px; background: linear-gradient(to right, var(--amber), var(--orange)); color: white; font-weight: 600; border: none; cursor: pointer; font-size: 0.82rem; transition: filter 0.1s; font-family: inherit; }
  .btn-add:hover { filter: brightness(1.08); } .btn-add:active { transform: scale(0.97); }
  .btn-sub { display: flex; align-items: center; gap: 0.35rem; padding: 0.5rem 0.9rem; border-radius: 999px; background: white; border: 1px solid var(--stone-200); color: var(--stone-600); font-weight: 500; cursor: pointer; font-size: 0.77rem; transition: all 0.1s; font-family: inherit; white-space: nowrap; }
  .btn-sub:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }
  .btn-sub.active { border-color: var(--stone-800); color: white; background: var(--stone-800); }
  .sync-strip { align-self: stretch; display: flex; justify-content: flex-end; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .sync-pill { display: inline-flex; align-items: center; gap: 0.45rem; min-height: 2rem; padding: 0.35rem 0.75rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; color: var(--stone-600); font: inherit; font-size: 0.72rem; font-weight: 600; cursor: pointer; box-shadow: 0 1px 4px #00000008; }
  .sync-pill:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }
  .sync-pill:disabled { opacity: 0.65; cursor: wait; }
  .sync-dot { width: 0.55rem; height: 0.55rem; border-radius: 999px; background: var(--stone-300); flex-shrink: 0; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.pending { background: #f59e0b; }
  .sync-dot.error { background: #ef4444; }
  .sync-dot.busy { background: #0ea5e9; animation: syncPulse 0.9s ease-in-out infinite alternate; }
  .sync-info-btn { width: 2rem; height: 2rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; color: var(--stone-500); font: inherit; font-size: 0.76rem; font-weight: 800; cursor: pointer; box-shadow: 0 1px 4px #00000008; }
  .sync-info-btn:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }
  .entry-sync-badge { display:inline-flex; align-items:center; gap:0.3rem; margin-top:0.35rem; padding:0.16rem 0.5rem; border-radius:999px; border:1px solid var(--stone-200); background:var(--stone-50); color:var(--stone-500); font-size:0.66rem; font-weight:800; }
  .entry-sync-badge.ok { border-color:#bbf7d0; background:#f0fdf4; color:#15803d; }
  .entry-sync-badge.pending { border-color:#fed7aa; background:#fff7ed; color:#9a3412; }
  .entry-sync-badge.error { border-color:#fecaca; background:#fef2f2; color:#b91c1c; }
  @keyframes syncPulse { from { opacity: 0.45; } to { opacity: 1; } }

  .sticky-controls { position: sticky; top: 0; z-index: 120; margin: 0 -0.45rem 1.25rem; padding: 0.5rem 0.45rem 0.65rem; background: linear-gradient(135deg, rgba(253,248,240,0.96) 0%, rgba(254,249,239,0.96) 50%, rgba(253,250,245,0.96) 100%); border-bottom: 1px solid rgba(231,229,228,0.82); backdrop-filter: blur(10px); }
  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-icon { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; }
  .search-input { width: 100%; padding: 0.75rem 2.5rem 0.75rem 2.25rem; border-radius: 1rem; border: 1px solid var(--stone-200); background: white; box-shadow: 0 1px 4px #00000008; font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color 0.1s; }
  .search-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b22; }
  .search-input::placeholder { color: var(--stone-300); }
  .search-clear { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--stone-300); font-size: 1rem; line-height: 1; display: none; }

  .filter-bar { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0; }
  .tag-filters { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag-btn { font-size: 0.72rem; font-weight: 500; padding: 0.2rem 0.7rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tag-btn.active { background: var(--stone-800) !important; color: white !important; border-color: var(--stone-800) !important; }
  .tag-folder-group { display: inline-flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; padding: 0.16rem 0.28rem; border-radius: 999px; background: #fff7ed; border: 1px solid #fed7aa; }
  .tag-folder-btn { font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 999px; border: 1px solid #fdba74; background: white; color: #9a3412; cursor: pointer; font-family: inherit; }
  .tag-folder-btn.active { background: #9a3412; border-color: #9a3412; color: white; }
  .tag-folder-inner-tags { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 0.28rem; }
  .tag-folder-child-row { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-left: calc(var(--depth, 0) * 0.9rem); }
  .tag-folder-child-btn { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.58rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; color: var(--stone-600); cursor: pointer; font-family: inherit; }
  .tag-folder-child-btn.active { background: var(--stone-800); border-color: var(--stone-800); color: white; }
  .tag-expanded-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; max-height: min(24vh, 9.5rem); overflow-y: auto; overscroll-behavior: contain; margin: 0.55rem 0 0; padding: 0.55rem 0.6rem; border: 1px solid var(--stone-200); border-radius: 0.9rem; background: rgba(255,255,255,0.76); box-shadow: inset 0 -12px 18px rgba(120,113,108,0.06); }
  .tag-expanded-tags:empty { display: none; }
  .tag-expanded-label { width: 100%; font-size: 0.68rem; font-weight: 800; color: var(--stone-400); }
  .filter-controls { display: flex; align-items: center; justify-content: flex-end; gap: 0.45rem; flex-wrap: wrap; margin-left: auto; }
  .view-mode-toggle { display: inline-flex; align-items: center; padding: 0.12rem; border: 1px solid var(--stone-200); border-radius: 999px; background: white; box-shadow: 0 1px 4px #00000008; }
  .view-mode-btn { min-height: 1.85rem; padding: 0.25rem 0.68rem; border: 0; border-radius: 999px; background: transparent; color: var(--stone-500); font: inherit; font-size: 0.72rem; font-weight: 800; cursor: pointer; }
  .view-mode-btn.active { background: var(--stone-800); color: white; }
  .sort-select { font-size: 0.72rem; color: var(--stone-500); background: white; border: 1px solid var(--stone-200); border-radius: 999px; padding: 0.25rem 0.75rem; cursor: pointer; font-family: inherit; outline: none; }
  .theme-select { color: #5f4b32; border-color: #d6c4a7; background: #fffaf0; min-width: 8.2rem; }
  .results-count { font-size: 0.75rem; color: var(--stone-400); margin-bottom: 0.75rem; }

  .bookshelf-main { position: relative; display: flex; flex-wrap: wrap; align-items: flex-end; align-content: flex-start; gap: 1.15rem 0.72rem; padding: 1.15rem 0.8rem 2.25rem; border: 1px solid #a16207; border-bottom: 14px solid #7c4a21; border-radius: 0.95rem 0.95rem 0.5rem 0.5rem; background-color: #f3dfbd; background-image: linear-gradient(180deg, rgba(255,255,255,0.52), rgba(255,255,255,0.08) 42%, rgba(92,64,51,0.12) 100%), linear-gradient(90deg, rgba(92,64,51,0.2) 0 0.5rem, transparent 0.5rem calc(100% - 0.5rem), rgba(92,64,51,0.2) calc(100% - 0.5rem)), repeating-linear-gradient(90deg, rgba(120,53,15,0.055) 0 1px, transparent 1px 8px); box-shadow: inset 0 0 0 4px rgba(255,255,255,0.18), inset 12px 0 18px rgba(120,53,15,0.12), inset -12px 0 18px rgba(41,37,36,0.1), inset 0 -8px 0 rgba(87,53,24,0.2), 0 8px 18px rgba(41,37,36,0.08); overflow: hidden; }
  .bookshelf-main::before { content: ""; position: absolute; inset: 0.5rem 0.5rem 0.72rem; pointer-events: none; border-radius: 0.7rem 0.7rem 0.3rem 0.3rem; border-left: 0.32rem solid rgba(92,64,51,0.22); border-right: 0.32rem solid rgba(92,64,51,0.2); background: linear-gradient(90deg, rgba(87,53,24,0.12), transparent 1.6rem, transparent calc(100% - 1.6rem), rgba(87,53,24,0.12)), radial-gradient(circle at 18% 10%, rgba(255,255,255,0.38), transparent 26%); box-shadow: inset 0 1.2rem 1.8rem rgba(255,255,255,0.22), inset 0 -1.2rem 1.6rem rgba(92,64,51,0.12); }
  .bookshelf-main::after { content: ""; position: absolute; left: 0.42rem; right: 0.42rem; bottom: 0.45rem; height: 0.5rem; border-radius: 999px; background: linear-gradient(90deg, rgba(92,64,51,0.32), rgba(255,255,255,0.36), rgba(92,64,51,0.34)); box-shadow: 0 -0.15rem 0 rgba(255,255,255,0.22), 0 0.35rem 0.55rem rgba(41,37,36,0.18); pointer-events: none; }
  .bookshelf-main.theme-library { border-color: #79512d; border-bottom-color: #5b3f24; background-color: #ead7b8; background-image: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.06) 42%, rgba(41,37,36,0.1) 100%), linear-gradient(90deg, rgba(41,37,36,0.16) 0 0.5rem, transparent 0.5rem calc(100% - 0.5rem), rgba(41,37,36,0.16) calc(100% - 0.5rem)), repeating-linear-gradient(90deg, rgba(41,37,36,0.06) 0 1px, transparent 1px 8px); }
  .bookshelf-main.theme-quiet { border-color: #78716c; border-bottom-color: #3f3f46; background-color: #e9e4da; background-image: linear-gradient(180deg, rgba(255,255,255,0.48), rgba(255,255,255,0.08) 42%, rgba(28,25,23,0.08) 100%), linear-gradient(90deg, rgba(28,25,23,0.1) 0 0.5rem, transparent 0.5rem calc(100% - 0.5rem), rgba(28,25,23,0.1) calc(100% - 0.5rem)), repeating-linear-gradient(90deg, rgba(28,25,23,0.045) 0 1px, transparent 1px 8px); }
  .book-group { position: relative; z-index: 1; display: flex; align-items: flex-end; gap: 0.75rem; min-height: 17.35rem; margin: 0; order: 0; }
  .book-shell { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 0.38rem; min-height: 17.15rem; padding: 0 0.22rem 0.86rem; }
  .book-shell::before { content: ""; position: absolute; z-index: 0; left: -0.3rem; right: -0.3rem; bottom: 0.55rem; height: 15.7rem; border-radius: 0.5rem 0.5rem 0.2rem 0.2rem; background: linear-gradient(90deg, rgba(92,64,51,0.16), rgba(255,255,255,0.12) 45%, rgba(41,37,36,0.12)); box-shadow: inset 0 0 0 1px rgba(92,64,51,0.1), inset 0 -1.1rem 1.1rem rgba(92,64,51,0.12); pointer-events: none; }
  .book-shell::after { content: ""; position: absolute; z-index: 0; left: -0.52rem; right: -0.52rem; bottom: 0; height: 0.78rem; border-radius: 0.18rem 0.18rem 0.45rem 0.45rem; background: linear-gradient(180deg, #b77935 0%, #8a5a2b 48%, #5f3518 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), inset 0 -2px 0 rgba(41,37,36,0.22), 0 0.34rem 0.55rem rgba(41,37,36,0.2); pointer-events: none; }
  .book-group.open { display: grid; grid-template-columns: auto minmax(0, 1fr); width: 100%; min-height: auto; align-items: flex-start; gap: 0.62rem; order: -1; }
  .book-group.open .book-shell { flex-shrink: 0; }
  .bookshelf-main.book-reorder-mode .book-spine { cursor: pointer; }
  .book-group.reorder-selected .book-spine { outline: 3px solid var(--amber); outline-offset: 3px; filter: brightness(1.08) saturate(1.05); }
  .book-move-actions { position: relative; z-index: 2; display: none; flex-wrap: wrap; justify-content: center; gap: 0.25rem; max-width: var(--spine-width, 4.6rem); }
  .bookshelf-main.book-reorder-mode .book-move-actions { display: flex; }
  .book-move-btn { min-height: 1.75rem; padding: 0.2rem 0.48rem; border-radius: 999px; border: 1px solid var(--stone-200); background: white; color: var(--stone-700); box-shadow: 0 2px 8px #0000000d; font: inherit; font-size: 0.64rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
  .book-move-btn:hover { border-color: var(--amber); color: var(--amber); background: #fffbeb; }
  .book-move-btn.active { background: var(--amber); border-color: var(--amber); color: white; }
  .book-move-status { display: none; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.45rem; margin: -0.25rem 0 0.75rem; padding: 0.55rem 0.75rem; border-radius: 0.75rem; border: 1px solid var(--amber-border); background: #fffbeb; color: #92400e; font-size: 0.75rem; font-weight: 800; }
  .book-move-status.show { display: flex; }
  .book-move-status-actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .book-move-status .book-move-btn { min-height: 1.7rem; font-size: 0.68rem; }
  .book-insert-slot { display: none; }
  .book-insert-btn { min-height: 2rem; padding: 0.25rem 0.55rem; border-radius: 999px; border: 1px dashed var(--amber); background: #fffbeb; color: #92400e; font: inherit; font-size: 0.66rem; font-weight: 900; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 8px #0000000d; }
  .book-insert-btn:hover { background: var(--amber-light); border-style: solid; }
  .book-group.dragging { opacity: 0.45; }
  .book-group.drop-before .book-spine { box-shadow: -0.5rem 0 0 var(--amber), inset 4px 0 6px rgba(255,255,255,0.18), inset -8px 0 12px rgba(0,0,0,0.34), inset 0 5px 0 rgba(255,255,255,0.12), inset 0 -7px 0 rgba(0,0,0,0.24), 0 8px 16px rgba(41,37,36,0.22); }
  .book-group.drop-after .book-spine { box-shadow: 0.5rem 0 0 var(--amber), inset 4px 0 6px rgba(255,255,255,0.18), inset -8px 0 12px rgba(0,0,0,0.34), inset 0 5px 0 rgba(255,255,255,0.12), inset 0 -7px 0 rgba(0,0,0,0.24), 0 8px 16px rgba(41,37,36,0.22); }
  .book-order-list { display: flex; flex-direction: column; gap: 0.45rem; }
  .book-order-row { display: grid; grid-template-columns: auto minmax(0,1fr) auto; align-items: center; gap: 0.75rem; padding: 0.7rem 0.8rem; border: 1px solid var(--stone-200); border-radius: 0.85rem; background: white; cursor: grab; transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s; }
  .book-order-row:active { cursor: grabbing; }
  .book-order-row.dragging { opacity: 0.42; transform: scale(0.99); }
  .book-order-row.drop-before { border-top: 3px solid var(--amber); }
  .book-order-row.drop-after { border-bottom: 3px solid var(--amber); }
  .book-order-row.selected { border-color: var(--amber); box-shadow: 0 0 0 3px #f59e0b22; }
  .book-order-grip { width: 2rem; height: 2rem; border: none; border-radius: 0.6rem; background: var(--stone-100); color: var(--stone-500); font: inherit; font-size: 1.05rem; font-weight: 900; cursor: grab; line-height: 1; }
  .book-order-title { font-size: 0.84rem; font-weight: 800; color: var(--stone-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-order-meta { font-size: 0.68rem; color: var(--stone-400); margin-top: 0.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-order-count { font-size: 0.7rem; font-weight: 800; color: #92400e; background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: 999px; padding: 0.14rem 0.55rem; white-space: nowrap; }
  .book-spine { position: relative; z-index: 1; width: var(--spine-width, 4.6rem); height: 15.5rem; padding: 0.82rem 0.48rem 0.74rem; border-radius: 0.62rem 0.48rem 0.24rem 0.24rem; border: 1px solid var(--spine-edge, #4b2e21); border-left-color: var(--spine-light, #8a6a4b); border-right-color: var(--spine-shadow, #2f1f18); background: linear-gradient(90deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.16) 9%, rgba(255,255,255,0.03) 31%, rgba(0,0,0,0.08) 58%, rgba(0,0,0,0.26) 84%, rgba(0,0,0,0.44) 100%), linear-gradient(180deg, rgba(255,255,255,0.22) 0, rgba(255,255,255,0.06) 0.32rem, transparent 0.62rem, transparent calc(100% - 0.72rem), rgba(0,0,0,0.22) calc(100% - 0.34rem), rgba(0,0,0,0.36) 100%), repeating-linear-gradient(90deg, rgba(255,255,255,0.055) 0 1px, transparent 1px 5px), repeating-linear-gradient(0deg, rgba(0,0,0,0.045) 0 1px, transparent 1px 6px), linear-gradient(180deg, var(--spine-top, #79513a) 0%, var(--spine-base, #5b3927) 48%, var(--spine-bottom, #2f1f18) 100%); color: var(--spine-ink, #fff4d6); box-shadow: inset 4px 0 6px rgba(255,255,255,0.18), inset -8px 0 12px rgba(0,0,0,0.34), inset 0 5px 0 rgba(255,255,255,0.12), inset 0 -7px 0 rgba(0,0,0,0.24), 0 8px 16px rgba(41,37,36,0.22); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.45rem; font-family: inherit; transition: transform 0.15s, box-shadow 0.15s, filter 0.15s; overflow: hidden; transform-origin: bottom center; }
  .book-spine::before { content: ""; position: absolute; inset: 0.5rem 0.32rem 0.58rem; border-radius: 0.46rem 0.36rem 0.16rem 0.16rem; background: linear-gradient(90deg, rgba(255,255,255,0.18) 0 0.28rem, rgba(0,0,0,0.12) 0.36rem 0.46rem, transparent 0.68rem calc(100% - 0.46rem), rgba(0,0,0,0.18) calc(100% - 0.34rem) 100%), linear-gradient(180deg, transparent 0 13%, rgba(255,255,255,0.18) 13% 14.2%, rgba(0,0,0,0.25) 14.2% 16.3%, transparent 16.3% 36%, rgba(255,255,255,0.16) 36% 37.2%, rgba(0,0,0,0.23) 37.2% 39.4%, transparent 39.4% 61%, rgba(255,255,255,0.15) 61% 62.2%, rgba(0,0,0,0.22) 62.2% 64.4%, transparent 64.4% 100%); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), inset 0 6px 7px rgba(255,255,255,0.08), inset 0 -10px 12px rgba(0,0,0,0.16); opacity: 0.95; pointer-events: none; }
  .book-spine::after { content: ""; position: absolute; left: 0.6rem; right: 0.58rem; top: 0.72rem; height: 2.35rem; border-radius: 0.34rem; border-top: 1px solid rgba(255,255,255,0.34); border-bottom: 1px solid rgba(0,0,0,0.22); background: linear-gradient(180deg, var(--spine-label, #f3e5c0), rgba(255,255,255,0.04)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.12), 0 1px 3px rgba(0,0,0,0.12); opacity: var(--spine-label-opacity, 0.16); pointer-events: none; }
  .book-spine > * { position: relative; z-index: 1; }
  .book-spine:hover { filter: brightness(1.04) saturate(1.02); transform: translateY(-2px); box-shadow: inset 4px 0 6px rgba(255,255,255,0.2), inset -9px 0 13px rgba(0,0,0,0.38), inset 0 5px 0 rgba(255,255,255,0.14), inset 0 -7px 0 rgba(0,0,0,0.27), 0 11px 20px rgba(41,37,36,0.28); }
  .book-spine { user-select: none; }

<div class="bg-orbs"></div>

<div id="installBanner" style="display:none;position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 2rem);max-width:400px;background:white;border-radius:1rem;border:1px solid #fde68a;box-shadow:0 8px 24px #00000015;padding:1rem;align-items:center;gap:0.75rem">

</div>

<div class="container">
  <header>

      <p class="header-meta" id="headerMeta"></p>
    </div>
    <div class="header-btns">

        <button class="btn-sub" onclick="openBookshelf()">📚 本棚</button>

      <div class="sync-strip">
        <button class="sync-pill" id="btnManualSync" onclick="manualSync()" type="button">

          <span id="syncPanelText">Sync now</span>

      </div>
    </div>
  </header>

  <div class="sticky-controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="本・著者・内容・教訓・タグで検索…" autocomplete="off" oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <div class="filter-bar">

      <div class="view-mode-toggle" role="group" aria-label="表示モード">

      </div>
      <select class="sort-select theme-select" id="shelfThemeSelect" onchange="setShelfTheme(this.value)" aria-label="本棚の着せ替え">

        <option value="library">本棚：図書館</option>
        <option value="quiet">本棚：モノクロ</option>
      </select>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="date">新しい順</option>
        <option value="book">書名順</option>
      </select>

      <button class="btn-sub" onclick="openTagFolders()" type="button">🏷 タグ整理</button>
    </div>
  </div>
  <div class="tag-expanded-tags" id="tagExpandedTags"></div>
  </div>

  <p class="results-count" id="resultsCount" style="display:none"></p>

  <div id="cardsContainer"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">📭</div>

  </div>
</div>

<div class="modal-overlay" id="modalOverlay">

    </div>

      </div>
      <div class="field"><label>📝 記録タイトル</label><input type="text" id="fTitle" placeholder="例: グライダー型人間について"></div>

// ── 削除ID管理 ─────────────────────────────────────
function getDeletedIds() { try { return new Set(JSON.parse(localStorage.getItem(DELETED_KEY)||'[]')); } catch { return new Set(); } }
function sortedDeletedIds(ids) { return [...ids].map(String).sort(); }
function setDeletedIds(ids) { localStorage.setItem(DELETED_KEY, JSON.stringify(sortedDeletedIds(ids))); }
function hashString(value) {
  let hash = 2166136261;
  for (let i = 0; i < value.length; i++) {
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(16);
}
function deletedIdsHash(ids) { return hashString(JSON.stringify(sortedDeletedIds(ids))); }
function markDeletedIdsSynced(ids) { localStorage.setItem(DELETED_SYNC_HASH_KEY, deletedIdsHash(ids || getDeletedIds())); }
function hasUnsyncedDeletedIds(ids) { return deletedIdsHash(ids || getDeletedIds()) !== localStorage.getItem(DELETED_SYNC_HASH_KEY); }
function addDeletedId(id) {
  const ids=getDeletedIds();
  const before=deletedIdsHash(ids);
  ids.add(String(id));
  setDeletedIds(ids);
  if (deletedIdsHash(ids) !== before) localStorage.removeItem(DELETED_SYNC_HASH_KEY);
}
function isDeletedEntry(entry) {
  if (!entry) return false;
  const value = entry.deleted;
  return value === true || value === 1 || String(value).toLowerCase() === 'true' || String(value) === '1' || !!entry.deletedAt;
}
function normalizeTombstone(entry) {
  const now = new Date().toISOString();
  const clone = {...(entry || {})};
  clone.id = String(clone.id || Date.now());
  clone.book = clone.book || '';
  clone.author = clone.author || '';
  clone.page = clone.page || '';
  clone.content = clone.content || '';
  clone.lesson = clone.lesson || '';
  clone.supplement = clone.supplement || '';
  clone.title = clone.title || '';
  clone.tags = Array.isArray(clone.tags) ? clone.tags : [];
  clone.drawings = Array.isArray(clone.drawings) ? clone.drawings : [];
  clone.images = [];
  clone.createdAt = clone.createdAt || now.slice(0, 10);
  clone.deleted = true;
  return clone;
}
function getTombstones() {
  try {
    const parsed = JSON.parse(localStorage.getItem(TOMBSTONES_KEY) || '[]');
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(e => e && e.id != null).map(normalizeTombstone);
  } catch {
    return [];
  }
}
function setTombstones(tombstones) {
  const byId = new Map();
  (Array.isArray(tombstones) ? tombstones : []).forEach(function(entry) {
    if (!entry || entry.id == null) return;
    byId.set(String(entry.id), normalizeTombstone(entry));
  });
  const deletedIds = getDeletedIds();
  const clean = [...byId.values()].filter(entry => deletedIds.has(String(entry.id)));
  clean.sort((a,b)=>String(a.id).localeCompare(String(b.id)));
  localStorage.setItem(TOMBSTONES_KEY, JSON.stringify(clean));
}
function addTombstone(entry) {
  const tombstones = getTombstones();
  tombstones.push(normalizeTombstone(entry));
  setTombstones(tombstones);
}
function getSyncTombstones() {
  const tombstones = getTombstones();
  const known = new Set(tombstones.map(entry => String(entry.id)));
  sortedDeletedIds(getDeletedIds()).forEach(function(id) {
    if (!known.has(id)) tombstones.push(normalizeTombstone({id}));
  });
  return tombstones;
}

// ── Book Meta (固定タグ) ──────────────────────────
function bookKey(book) {
  return (book || '').trim().replace(/\s+/g, ' ').toLocaleLowerCase('ja-JP');
}

function cleanTagList(tags) {
  const seen = new Set();
  const clean = [];
  (Array.isArray(tags) ? tags : []).forEach(function(tag) {
    const value = String(tag || '').trim();
    if (!value || seen.has(value)) return;
    seen.add(value);
    clean.push(value);
  });
  return clean;
}

function getBookMeta() {
  try {
    const stored = localStorage.getItem(BOOK_META_KEY);
    if (!stored) return {};
    const parsed = JSON.parse(stored);
    // 配列やnullなど壊れたデータは空オブジェクトで返す
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return {};
    return parsed;
  } catch(e) { return {}; }
}

// ── 固定タグ(book_meta)をクラウドに同期するための特殊エントリ ──
// 既存のスプレッドシート側のスキーマを変更せずに済むよう、
// 通常のエントリと同じ形（idとcontent列）に乗せて book_meta 全体を運ぶ。
const BOOK_META_SYNC_ID = '__book_meta__';
const TAG_FOLDER_SYNC_ID = '__tag_folders__';

function isSyncMetaEntry(entry) {
  const id = String(entry && entry.id || '');
  return id === BOOK_META_SYNC_ID || id === TAG_FOLDER_SYNC_ID;
}

function buildBookMetaSyncEntry() {

    updatedAt: new Date().toISOString(),
    isBookMeta: true
  };
}

function getTagFolders() {
  try {
    const stored = localStorage.getItem(TAG_FOLDERS_KEY);
    if (!stored) return {};
    if (stored !== tagFolderCacheText || !tagFolderCacheValue) {
      tagFolderCacheValue = inheritTagFolders(cleanTagFolders(JSON.parse(stored)));
      tagFolderCacheText = stored;
      invalidateTagFolderDerivedCaches();
    }
    return cloneTagFolders(tagFolderCacheValue);
  } catch(e) { return {}; }
}

function getTagFolderOrder() {
  try {
    const stored = localStorage.getItem(TAG_FOLDER_ORDER_KEY) || '[]';
    if (stored !== tagFolderOrderCacheText || !tagFolderOrderCacheValue) {
      const parsed = JSON.parse(stored);
      tagFolderOrderCacheValue = Array.isArray(parsed) ? parsed.map(normalizeFolderPath).filter(Boolean) : [];
      tagFolderOrderCacheText = stored;
      invalidateTagFolderDerivedCaches();
    }
    return tagFolderOrderCacheValue.slice();
  } catch(e) { return []; }
}

function cloneTagFolders(folders) {
  const copy = {};
  Object.keys(folders || {}).forEach(key => { copy[key] = cleanTagList(folders[key]); });
  return copy;
}

function invalidateTagFolderDerivedCaches() {
  tagFolderNamesCacheKey = '';
  assignedTagsCacheKey = '';
  folderTagsCacheKey = '';
  folderTagsCache = new Map();
}

function cleanTagFolderOrder(order, folders) {
  const paths = folderTreePathsRaw(folders || getTagFolders());
  const pathSet = new Set(paths);
  const clean = [];
  (Array.isArray(order) ? order : []).forEach(function(path) {
    path = normalizeFolderPath(path);
    if (path && pathSet.has(path) && !clean.includes(path)) clean.push(path);
  });
  paths.forEach(path => { if (!clean.includes(path)) clean.push(path); });
  return clean;
}

function setTagFolderOrder(order, options) {
  const clean = cleanTagFolderOrder(order);
  const text = JSON.stringify(clean);
  localStorage.setItem(TAG_FOLDER_ORDER_KEY, text);
  tagFolderOrderCacheText = text;
  tagFolderOrderCacheValue = clean.slice();
  invalidateTagFolderDerivedCaches();
  if (!options || options.sync !== false) {
    markSyncPending(true);
    scheduleCloudSync(0);
  }
}

function setTagFolders(folders, options) {
  const clean = inheritTagFolders(cleanTagFolders(folders));
  const text = JSON.stringify(clean);
  localStorage.setItem(TAG_FOLDERS_KEY, text);
  tagFolderCacheText = text;
  tagFolderCacheValue = cloneTagFolders(clean);
  const order = cleanTagFolderOrder(getTagFolderOrder(), clean);
  const orderText = JSON.stringify(order);
  localStorage.setItem(TAG_FOLDER_ORDER_KEY, orderText);
  tagFolderOrderCacheText = orderText;
  tagFolderOrderCacheValue = order.slice();
  invalidateTagFolderDerivedCaches();
  if (!options || options.sync !== false) {
    markSyncPending(true);
    scheduleCloudSync(0);
  }
}

function normalizeFolderPath(path) {
  return cleanTagList(String(path || '').split(/[\\/＞>›]+/)).join('/');
}

function folderParts(path) {
  return normalizeFolderPath(path).split('/').filter(Boolean);
}

function folderDepth(path) {
  return Math.max(0, folderParts(path).length - 1);
}

function folderDisplayName(path) {
  return folderParts(path).join(' › ');
}

function folderLeafName(path) {
  const parts = folderParts(path);
  return parts[parts.length - 1] || '';
}

function folderParentPath(path) {
  const parts = folderParts(path);
  parts.pop();
  return parts.join('/');
}

function isFolderDescendantOrSelf(path, ancestor) {
  path = normalizeFolderPath(path);
  ancestor = normalizeFolderPath(ancestor);
  return path === ancestor || (!!ancestor && path.startsWith(ancestor + '/'));
}

function folderPathSortRaw(a,b) {
  const left = folderParts(a);
  const right = folderParts(b);
  for (let i = 0; i < Math.min(left.length, right.length); i++) {
    const diff = left[i].localeCompare(right[i], 'ja');
    if (diff) return diff;
  }
  return left.length - right.length;
}

function folderTreePathsRaw(folders) {
  const paths = new Set();
  Object.keys(folders || {}).forEach(function(path) {
    const parts = folderParts(path);
    for (let i = 1; i <= parts.length; i++) paths.add(parts.slice(0, i).join('/'));
  });
  return [...paths].sort(folderPathSortRaw);
}

function folderPathSortWithOrder(a,b,order) {
  a = normalizeFolderPath(a);
  b = normalizeFolderPath(b);
  if (a === b) return 0;
  if (isFolderDescendantOrSelf(b, a)) return -1;
  if (isFolderDescendantOrSelf(a, b)) return 1;
  const ai = order.indexOf(a);
  const bi = order.indexOf(b);
  if (ai >= 0 && bi >= 0 && ai !== bi) return ai - bi;
  return folderPathSortRaw(a,b);
}

function folderPathSort(a,b) {
  return folderPathSortWithOrder(a,b,cleanTagFolderOrder(getTagFolderOrder()));
}

function folderTreePaths(folders) {
  const clean = folders || getTagFolders();
  const order = cleanTagFolderOrder(getTagFolderOrder(), clean);
  return folderTreePathsRaw(clean).sort((a,b)=>folderPathSortWithOrder(a,b,order));
}

function cleanTagFolders(folders) {
  const clean = {};
  if (!folders || typeof folders !== 'object' || Array.isArray(folders)) return clean;
  Object.keys(folders).forEach(function(name) {
    const folderName = normalizeFolderPath(name);
    const tags = cleanTagList(folders[name]);
    if (folderName && tags.length) clean[folderName] = tags;
  });
  return clean;
}

function inheritTagFolders(folders) {
  const clean = cleanTagFolders(folders);
  Object.keys(clean).forEach(function(path) {
    const tags = cleanTagList(clean[path]);
    let parent = folderParentPath(path);
    while (parent) {
      clean[parent] = cleanTagList([...(clean[parent] || []), ...tags]);
      parent = folderParentPath(parent);
    }
  });
  return clean;
}

function buildTagFolderSyncEntry() {
  return {
    id: TAG_FOLDER_SYNC_ID,
    book: '',
    title: '',
    content: JSON.stringify({folders:getTagFolders(), order:getTagFolderOrder()}),
    tags: [],
    drawings: [],
    images: [],
    createdAt: '1970-01-01',
    updatedAt: new Date().toISOString(),
    isTagFolders: true
  };
}

function parseTagFolderPayload(value) {
  let parsed;
  try {
    parsed = JSON.parse(value || '{}');
  } catch(e) {
    parsed = {};
  }
  if (parsed && typeof parsed === 'object' && !Array.isArray(parsed) && parsed.folders) {
    return {
      folders: inheritTagFolders(parsed.folders),
      order: Array.isArray(parsed.order) ? parsed.order : []
    };
  }
  return {folders: inheritTagFolders(parsed), order: []};
}

function mergeTagFoldersFromCloud(cloudEntry, preferLocal) {
  if (!cloudEntry) return;
  const payload = parseTagFolderPayload(cloudEntry.content || '{}');
  const cloud = payload.folders;
  const local = getTagFolders();
  const merged = {};
  Object.keys(cloud).forEach(function(name) {
    merged[name] = cleanTagList(cloud[name]);
  });
  Object.keys(local).forEach(function(name) {
    if (preferLocal || !Object.prototype.hasOwnProperty.call(merged, name)) {
      merged[name] = cleanTagList(local[name]);
    } else {
      merged[name] = cleanTagList([...(merged[name] || []), ...(local[name] || [])]);
    }
  });
  const localOrder = getTagFolderOrder();
  const mergedOrder = cleanTagFolderOrder(preferLocal ? [...localOrder, ...payload.order] : [...payload.order, ...localOrder], merged);
  setTagFolders(merged, {sync:false});
  setTagFolderOrder(mergedOrder, {sync:false});
}

// クラウドから取得した固定タグ情報をローカルのbook_metaへ統合する
// （クラウド側の値を優先しつつ、ローカルにしかないキーは保持する）
function mergeBookMetaFromCloud(cloudMetaEntry, preferLocal) {
  if (!cloudMetaEntry) return;
  let cloudMeta;
  try {
    cloudMeta = JSON.parse(cloudMetaEntry.content || '{}');
  } catch(e) { return; }
  if (!cloudMeta || typeof cloudMeta !== 'object' || Array.isArray(cloudMeta)) return;

  const localMeta = getBookMeta();
  const merged = {};
  Object.keys(cloudMeta).forEach(function(key) {
    merged[key] = cleanTagList(cloudMeta[key]);
  });
  Object.keys(localMeta).forEach(function(key) {
    if (preferLocal || !Object.prototype.hasOwnProperty.call(merged, key)) {
      merged[key] = cleanTagList(localMeta[key]);
    }
  });
  localStorage.setItem(BOOK_META_KEY, JSON.stringify(merged));
}

function getBookFixedTags(book) {
  const key = bookKey(book);
  if (!key) return [];
  const meta = getBookMeta();
  const storedTags = cleanTagList(meta[key]);
  if (storedTags.length) return storedTags;

  // v3-FIXED以前は本タイトルそのものをキーにしていたため、旧キーも拾う。
  const legacyKey = (book || '').trim();
  const legacyTags = cleanTagList(meta[legacyKey]);
  if (legacyTags.length) return legacyTags;

  const fromEntries = [];
  entries.forEach(function(entry) {
    if (bookKey(entry.book) === key) fromEntries.push(...cleanTagList(entry.fixedTags));
  });
  return cleanTagList(fromEntries);
}

function setBookFixedTags(book, tags) {
  const key = bookKey(book);
  if (!key) return;
  const meta = getBookMeta();
  const cleanTags = cleanTagList(tags);
  meta[key] = cleanTags;
  const legacyKey = (book || '').trim();
  if (legacyKey && legacyKey !== key) delete meta[legacyKey];
  localStorage.setItem(BOOK_META_KEY, JSON.stringify(meta));
  applyFixedTagsToEntries(book, cleanTags);
}

function applyFixedTagsToEntries(book, tags) {
  const key = bookKey(book);
  const cleanTags = cleanTagList(tags);
  if (!key) return;
  entries = entries.map(function(entry) {
    if (bookKey(entry.book) !== key) return entry;
    if (!cleanTags.length) {
      const clone = {...entry};
      delete clone.fixedTags;
      return clone;
    }
    return {...entry, fixedTags: [...cleanTags]};
  });
}

function syncEntryFixedTags() {
  entries = entries.map(function(entry) {
    const fixedTags = getBookFixedTags(entry.book);
    if (!fixedTags.length) {
      const clone = {...entry};
      delete clone.fixedTags;
      return clone;
    }
    return {...entry, fixedTags};
  });
}

// 旧形式（e.fixedTags）→ BOOK_META_KEY へ自動マイグレーション
function migrateOldFixedTags() {
  const meta = getBookMeta();
  let changed = false;

  Object.keys(meta).forEach(function(rawKey) {
    const normalizedKey = bookKey(rawKey);
    if (!normalizedKey || normalizedKey === rawKey) return;
    meta[normalizedKey] = cleanTagList([...(meta[normalizedKey] || []), ...(meta[rawKey] || [])]);
    delete meta[rawKey];
    changed = true;
  });

  entries.forEach(function(e) {
    const book = (e.book || '').trim();
    if (!book) return;
    const key = bookKey(book);
    const mergedTags = cleanTagList([...(meta[key] || []), ...(e.fixedTags || [])]);
    if (mergedTags.length && JSON.stringify(meta[key] || []) !== JSON.stringify(mergedTags)) {
      meta[key] = mergedTags;
      changed = true;
    }
  });
  if (changed) {
    localStorage.setItem(BOOK_META_KEY, JSON.stringify(meta));
  }
  syncEntryFixedTags();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
