// ── Persistence ────────────────────────────────────
// 過去の不具合により id が空のまま保存された記録があると、
// カード上の編集/削除ボタン（onclick="deleteEntry(${e.id})" 等）が
// 引数なしの呼び出しになってしまい、削除も編集も効かなくなる。
// そのため id が無い・重複している記録には、毎回新しいユニークなidを割り当て直す。
function repairMissingIds(list) {
  const seen = new Set();
  let changed = false;
  const repaired = (Array.isArray(list) ? list : []).map(function(entry, idx) {
    if (!entry) return entry;
    const idStr = (entry.id === undefined || entry.id === null) ? '' : String(entry.id);
    if (!idStr || seen.has(idStr)) {
      changed = true;
      const newId = Date.now() + idx;
      seen.add(String(newId));
      return {...entry, id: newId};
    }
    seen.add(idStr);
    return entry;
  });
  return {list: repaired, changed: changed};
}

function load() {
  try {
    const r=localStorage.getItem(STORAGE_KEY);
    entries=r?JSON.parse(r):SAMPLE;
    if(!Array.isArray(entries))entries=SAMPLE;
  } catch {
    entries=SAMPLE;
  }
  const deletedIds = getDeletedIds();
  const tombstoneCandidates = [];
  entries.forEach(function(entry) {
    if (isDeletedEntry(entry)) {
      deletedIds.add(String(entry.id));
      tombstoneCandidates.push(entry);
    }
  });
  setDeletedIds(deletedIds);
  setTombstones([...getTombstones(), ...tombstoneCandidates]);
  entries = entries.filter(e => e && !isSyncMetaEntry(e) && !deletedIds.has(String(e.id)) && !isDeletedEntry(e));
  const idRepair = repairMissingIds(entries);
  entries = idRepair.list;
  const mediaMigrated = migrateImagesIntoDrawings();
  if (idRepair.changed || mediaMigrated) persist();
}

function persist() {
  migrateImagesIntoDrawings();
  syncEntryFixedTags();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  markSyncPending(true);
  scheduleCloudSync(0);
}

// ── Cloud Sync ─────────────────────────────────────
function hasPendingSync() {
  return localStorage.getItem(SYNC_PENDING_KEY) === '1';
}

function markSyncPending(pending) {
  if (pending) localStorage.setItem(SYNC_PENDING_KEY, '1');
  else localStorage.removeItem(SYNC_PENDING_KEY);
  updateSyncPanel();
}

function syncTimeLabel(iso) {
  if (!iso) return '';
  const time = Date.parse(iso);
  if (!time) return '';
  const diff = Date.now() - time;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' min ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' hr ago';
  return new Date(time).toLocaleDateString();
}

function setSyncUiBusy(busy) {
  const btn = document.getElementById('btnManualSync');
  if (btn) btn.disabled = !!busy;
  updateSyncPanel(busy ? 'busy' : null);
}

function recordSyncAttempt() {
  localStorage.setItem(SYNC_LAST_ATTEMPT_KEY, new Date().toISOString());
  localStorage.removeItem(SYNC_LAST_ERROR_KEY);
  updateSyncPanel('busy');
}

function recordSyncSuccess() {
  localStorage.setItem(SYNC_LAST_OK_KEY, new Date().toISOString());
  localStorage.removeItem(SYNC_LAST_ERROR_KEY);
  updateSyncPanel();
}

function recordSyncError(error) {
  const message = error && error.message ? error.message : String(error || 'Sync failed');
  localStorage.setItem(SYNC_LAST_ERROR_KEY, message);
  updateSyncPanel('error');
}

function updateSyncPanel(forceState) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncPanelText');
  if (!dot || !text) return;
  const pending = hasPendingSync();
  const lastOk = localStorage.getItem(SYNC_LAST_OK_KEY);
  const lastError = localStorage.getItem(SYNC_LAST_ERROR_KEY);
  let state = forceState || (lastError ? 'error' : (pending ? 'pending' : (lastOk ? 'ok' : 'idle')));
  dot.className = 'sync-dot ' + (state === 'idle' ? '' : state);
  if (state === 'busy') text.textContent = '同期中';
  else if (state === 'error') text.textContent = '同期失敗';
  else if (pending) text.textContent = '端末のみ';
  else if (lastOk) text.textContent = 'クラウド済み';
  else text.textContent = '同期する';
}

function entrySyncBadge(entry) {
  const lastOk = Date.parse(localStorage.getItem(SYNC_LAST_OK_KEY) || '') || 0;
  const lastError = localStorage.getItem(SYNC_LAST_ERROR_KEY);
  const pending = hasPendingSync();
  const updated = entryTime(entry);
  let cls = '';
  let label = '端末保存';
  if (lastError && (!lastOk || updated >= lastOk)) {
    cls = ' error';
    label = '同期失敗';
  } else if (pending && (!lastOk || updated >= lastOk)) {
    cls = ' pending';
    label = '端末のみ';
  } else if (lastOk) {
    cls = ' ok';
    label = 'クラウド済み';
  }
  return `<div class="entry-sync-badge${cls}">${label}</div>`;
}

async function manualSync() {
  setSyncUiBusy(true);
  try {
    await loadFromCloud({quiet:true});
    await syncToCloud({manual:true});
    await loadFromCloud({quiet:true});
  } finally {
    setSyncUiBusy(false);
  }
}

async function showSyncDiagnostics() {
  const localDeleted = sortedDeletedIds(getDeletedIds());
  const localMedia = mediaSummary(entries);
  const lastOk = localStorage.getItem(SYNC_LAST_OK_KEY);
  const lastAttempt = localStorage.getItem(SYNC_LAST_ATTEMPT_KEY);
  const lastError = localStorage.getItem(SYNC_LAST_ERROR_KEY);
  let cloudLine = '';
  let cloudMediaLine = 'Cloud media: could not check.';
  let cloudMediaSizeLine = 'Largest cloud image: unknown';
  let mediaMatchLine = '';
  try {
    showSyncStatus('Checking cloud...');
    const cloud = await fetchCloudEntries();
    const active = cloud.filter(e => e && !isSyncMetaEntry(e) && !isDeletedEntry(e)).length;
    const deleted = cloud.filter(isDeletedEntry).length;
    const cloudMedia = mediaSummary(cloud);
    cloudLine = 'Cloud has ' + active + ' notes. Deleted notes remembered: ' + deleted + '.';
    cloudMediaLine = 'Cloud media: ' + cloudMedia.mediaItems + ' images in ' + cloudMedia.entriesWithMedia + ' notes.';
    cloudMediaSizeLine = 'Largest cloud image: ' + formatMediaSize(cloudMedia.maxMediaChars);
    mediaMatchLine = 'Image sync: ' + (cloudMedia.mediaItems >= localMedia.mediaItems ? 'looks caught up.' : 'cloud is missing images.');
  } catch(e) {
    cloudLine = 'Could not check the cloud right now.';
  }
  hideSyncStatus();
  const pending = hasPendingSync();
  let statusLine = 'Status: saved on this device only.';
  let nextStep = 'Tap "Sync now" while online.';
  if (lastError) {
    statusLine = 'Status: sync has a problem.';
    nextStep = 'Tap "Sync now". If it still fails, export a backup before editing more.';
  } else if (pending) {
    statusLine = 'Status: not uploaded yet.';
    nextStep = 'Tap "Sync now", then open the app on your other device.';
  } else if (lastOk) {
    statusLine = 'Status: saved to cloud.';
    nextStep = 'Open or refresh the app on your other device.';
  }
  alert([
    'Sync help',
    'App version: ' + APP_VERSION,
    statusLine,
    nextStep,
    '',
    'Last saved to cloud: ' + (lastOk ? syncTimeLabel(lastOk) : 'not yet'),
    cloudLine,
    'This device media: ' + localMedia.mediaItems + ' images in ' + localMedia.entriesWithMedia + ' notes.',
    'Largest image here: ' + formatMediaSize(localMedia.maxMediaChars),
    cloudMediaLine,
    cloudMediaSizeLine,
    mediaMatchLine,
    '',
    'Details:',
    'This device: ' + entries.length + ' notes',
    'Deleted notes remembered: ' + localDeleted.length,
    'Last try: ' + (lastAttempt ? syncTimeLabel(lastAttempt) : 'not yet'),
    'Problem: ' + (lastError || 'none')
  ].join('\n'));
  updateSyncPanel();
}

function buildCloudPayloadBody() {
  migrateImagesIntoDrawings();
  const deletedIds = getDeletedIds();
  const activeEntries = entries.filter(e => e && !isSyncMetaEntry(e) && !deletedIds.has(String(e.id)) && !isDeletedEntry(e));
  return JSON.stringify([...activeEntries, ...getSyncTombstones(), buildBookMetaSyncEntry(), buildTagFolderSyncEntry()]);
}

function scheduleCloudSync(delay) {
  if (syncRetryTimer) clearTimeout(syncRetryTimer);
  syncRetryTimer = setTimeout(function() { syncToCloud({manual:false}); }, delay);
}

function entryTime(entry) {
  if (!entry) return 0;
  return Date.parse(entry.updatedAt || entry.modifiedAt || entry.createdAt || '') || 0;
}

function chooseEntryVersion(cloudEntry, localEntry, preferLocal) {
  if (!cloudEntry) return localEntry;
  if (!localEntry) return cloudEntry;
  const cloudTime = entryTime(cloudEntry);
  const localTime = entryTime(localEntry);
  if (cloudTime && localTime && cloudTime !== localTime) {
    return cloudTime > localTime ? cloudEntry : localEntry;
  }
  return preferLocal ? localEntry : cloudEntry;
}
function mergedMediaList(chosen, localEntry, key) {
  if (chosen && Object.prototype.hasOwnProperty.call(chosen, key)) {
    return Array.isArray(chosen[key]) ? chosen[key] : [];
  }
  return localEntry && Array.isArray(localEntry[key]) ? localEntry[key] : [];
}

function mediaList(value) {
  if (Array.isArray(value)) return value.filter(Boolean);
  if (typeof value !== 'string') return [];
  const trimmed = value.trim();
  if (!trimmed) return [];
  if (trimmed.startsWith('data:image/')) return [trimmed];
  try {
    const parsed = JSON.parse(trimmed);
    if (Array.isArray(parsed)) return parsed.filter(Boolean);
    if (typeof parsed === 'string' && parsed.startsWith('data:image/')) return [parsed];
  } catch {}
  return [];
}

function entryMedia(entry) {
  const drawings = mediaList(entry&&entry.drawings);
  const images = mediaList(entry&&entry.images);
  const merged = drawings.slice();
  images.forEach(src=>{ if(!merged.includes(src)) merged.push(src); });
  return merged;
}

function normalizeMediaKind(kind) {
  return kind === 'image' || kind === 'images' ? 'image' : 'sketch';
}

function mediaKindList(entry) {
  const media = entryMedia(entry);
  const rawKinds = Array.isArray(entry&&entry.mediaKinds) ? entry.mediaKinds : [];
  const drawings = mediaList(entry&&entry.drawings);
  const images = mediaList(entry&&entry.images);
  return media.map(function(src, i) {
    if (rawKinds[i]) return normalizeMediaKind(rawKinds[i]);
    if (images.includes(src) && !drawings.includes(src)) return 'image';
    return 'sketch';
  });
}

function normalizeCurrentMediaKinds() {
  currentMediaKinds = currentDrawings.map((_, i)=>normalizeMediaKind(currentMediaKinds[i]));
  return currentMediaKinds;
}

function mediaSummary(list) {
  const summary = {entriesWithMedia:0, mediaItems:0, maxMediaChars:0};
  (Array.isArray(list) ? list : []).forEach(function(entry) {
    if (!entry || isSyncMetaEntry(entry) || isDeletedEntry(entry)) return;
    const media = entryMedia(entry);
    if (!media.length) return;
    summary.entriesWithMedia += 1;
    summary.mediaItems += media.length;
    media.forEach(function(src) {
      if (typeof src === 'string') summary.maxMediaChars = Math.max(summary.maxMediaChars, src.length);
    });
  });
  return summary;
}

function formatMediaSize(chars) {
  if (!chars) return 'none';
  return Math.max(1, Math.round(chars / 1024)) + ' KB';
}

function mediaTime(entry) {
  return Date.parse((entry&&entry.mediaUpdatedAt)||'') || 0;
}

function mergeEntryMedia(cloudEntry, localEntry) {
  const cloudMedia = entryMedia(cloudEntry);
  const localMedia = entryMedia(localEntry);
  const cloudMediaTime = mediaTime(cloudEntry);
  const localMediaTime = mediaTime(localEntry);
  if (cloudMediaTime || localMediaTime) {
    if (cloudMediaTime !== localMediaTime) return cloudMediaTime > localMediaTime ? cloudMedia : localMedia;
  }
  if (!cloudMedia.length) return localMedia;
  if (!localMedia.length) return cloudMedia;
  const merged = localMedia.slice();
  cloudMedia.forEach(src=>{ if(!merged.includes(src)) merged.push(src); });
  return merged;
}

function mergeEntryMediaKinds(cloudEntry, localEntry, mergedMedia) {
  const cloudMedia = entryMedia(cloudEntry);
  const localMedia = entryMedia(localEntry);
  const cloudKinds = mediaKindList(cloudEntry);
  const localKinds = mediaKindList(localEntry);
  return (mergedMedia || []).map(function(src) {
    const localIndex = localMedia.indexOf(src);
    if (localIndex >= 0) return normalizeMediaKind(localKinds[localIndex]);
    const cloudIndex = cloudMedia.indexOf(src);
    if (cloudIndex >= 0) return normalizeMediaKind(cloudKinds[cloudIndex]);
    return 'sketch';
  });
}

function migrateImagesIntoDrawings() {
  let changed = false;
  entries = entries.map(function(entry) {
    if (!entry) return entry;
    const merged = entryMedia(entry);
    const images = mediaList(entry.images);
    const kinds = mediaKindList(entry);
    if (!images.length && merged.length === mediaList(entry.drawings).length && Array.isArray(entry.drawings) && Array.isArray(entry.mediaKinds) && entry.mediaKinds.length === merged.length) return entry;
    changed = true;
    return {...entry, drawings: merged, images: [], mediaKinds: merged.map((_, i)=>normalizeMediaKind(kinds[i])), mediaUpdatedAt: entry.mediaUpdatedAt || entry.updatedAt || new Date().toISOString()};
  });
  if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  return changed;
}

function imageToCompressedDataUrl(img, maxSide, quality, maxChars) {
  const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  if(!w||!h) throw new Error('Invalid image');
  let side=maxSide, q=quality, dataUrl='';
  for(let attempt=0; attempt<7; attempt++) {
    const scale=Math.min(1,side/Math.max(w,h));
    const cw=Math.max(1,Math.round(w*scale));
    const ch=Math.max(1,Math.round(h*scale));
    const canvas=document.createElement('canvas');
    canvas.width=cw; canvas.height=ch;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='white'; ctx.fillRect(0,0,cw,ch);
    ctx.drawImage(img,0,0,cw,ch);
    dataUrl=canvas.toDataURL('image/jpeg',q);
    if(!maxChars || dataUrl.length<=maxChars) return dataUrl;
    side=Math.max(260,Math.floor(side*0.82));
    q=Math.max(0.5,q-0.04);
  }
  return dataUrl;
}

function imageToSketchDataUrl(img) {
  const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  if(!w||!h) throw new Error('Invalid image');
  const canvas=document.createElement('canvas');
  canvas.width=w;
  canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='white';
  ctx.fillRect(0,0,w,h);
  ctx.drawImage(img,0,0,w,h);
  return canvasToSketchDataUrl(canvas, MEDIA_SKETCH_MAX_SIDE, MEDIA_SKETCH_QUALITY, MEDIA_SKETCH_MAX_CHARS);
}

function recompressDataUrl(src, mediaKind) {
  return new Promise(function(resolve,reject) {
    const img=new Image();
    img.onerror=()=>reject(new Error('Image load failed'));
    img.onload=()=>{
      try {
        resolve(mediaKind === 'sketch'
          ? imageToSketchDataUrl(img)
          : imageToCompressedDataUrl(img, MEDIA_IMAGE_MAX_SIDE, MEDIA_IMAGE_QUALITY, MEDIA_IMAGE_MAX_CHARS));
      }
      catch(e) { reject(e); }
    };
    img.src=src;
  });
}

async function shrinkOversizedMedia() {
  let changed = migrateImagesIntoDrawings();
  for (const entry of entries) {
    if (!entry) continue;
    const media = entryMedia(entry);
    const kinds = mediaKindList(entry);
    const next = [];
    for (let i=0; i<media.length; i++) {
      const src = media[i];
      const kind = normalizeMediaKind(kinds[i]);
      const maxChars = kind === 'sketch' ? MEDIA_SKETCH_MAX_CHARS : MEDIA_IMAGE_MAX_CHARS;
      if (typeof src === 'string' && src.startsWith('data:image/') && src.length > maxChars) {
        try {
          next.push(await recompressDataUrl(src, kind));
          changed = true;
        } catch {
          next.push(src);
        }
      } else {
        next.push(src);
      }
    }
    entry.drawings = next;
    entry.images = [];
    entry.mediaKinds = next.map((_, i)=>normalizeMediaKind(kinds[i]));
  }
  if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  return changed;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function fetchCloudEntries() {
  const r = await fetch(CLOUD_URL+'?t='+Date.now(), {cache:'no-store'});
  if (!r.ok) throw new Error('Cloud load returned HTTP ' + r.status);
  const cloudRaw = await r.json();
  return Array.isArray(cloudRaw) ? cloudRaw : [];
}

function mergeCloudDeletedEntries(cloudEntries) {
  const deletedIds = getDeletedIds();
  const cloudDeletedIds = new Set();
  const tombstones = [];
  (Array.isArray(cloudEntries) ? cloudEntries : []).forEach(function(entry) {
    if (!isDeletedEntry(entry)) return;
    deletedIds.add(String(entry.id));
    cloudDeletedIds.add(String(entry.id));
    tombstones.push(entry);
  });
  entries.forEach(function(entry) {
    if (!isDeletedEntry(entry)) return;
    deletedIds.add(String(entry.id));
    tombstones.push(entry);
  });
  setDeletedIds(deletedIds);
  setTombstones([...getTombstones(), ...tombstones]);
  entries = entries.filter(e => e && !isSyncMetaEntry(e) && !deletedIds.has(String(e.id)) && !isDeletedEntry(e));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  return {deletedIds, cloudDeletedIds};
}

async function refreshDeletesFromCloud() {
  const cloudRaw = await fetchCloudEntries();
  return {cloudRaw, ...mergeCloudDeletedEntries(cloudRaw)};
}

async function verifyCloudDeletedIds(expectedIds) {
  const ids = sortedDeletedIds(expectedIds || getDeletedIds());
  if (!ids.length) return true;
  for (let attempt = 0; attempt < 3; attempt++) {
    const cloudRaw = await fetchCloudEntries();
    const cloudDeletedIds = new Set();
    cloudRaw.forEach(function(entry) {
      if (isDeletedEntry(entry)) cloudDeletedIds.add(String(entry.id));
    });
    if (ids.every(id => cloudDeletedIds.has(id))) return true;
    await delay(1200);
  }
  throw new Error('Cloud did not confirm deleted rows');
}

function mediaArraysEqual(a,b) {
  const left = Array.isArray(a) ? a : [];
  const right = Array.isArray(b) ? b : [];
  if (left.length !== right.length) return false;
  return left.every((item,idx)=>item===right[idx]);
}

async function verifyCloudMedia(expectedEntries) {
  const expected = (Array.isArray(expectedEntries) ? expectedEntries : []).filter(entry=>entryMedia(entry).length || mediaTime(entry));
  if (!expected.length) return true;
  for (let attempt = 0; attempt < 3; attempt++) {
    const cloudRaw = await fetchCloudEntries();
    const cloudMap = Object.fromEntries(cloudRaw.filter(e=>e&&e.id!=null).map(e=>[String(e.id),e]));
    const ok = expected.every(function(entry) {
      const cloudEntry = cloudMap[String(entry.id)];
      return cloudEntry && mediaArraysEqual(entryMedia(entry), entryMedia(cloudEntry));
    });
    if (ok) return true;
    await delay(1200);
  }
  throw new Error('Cloud did not save images');
}

async function postCloudPayload(body, mode) {
  const response = await fetch(CLOUD_URL, {
    method: 'POST',
    mode,
    headers: {'Content-Type': 'text/plain'},
    body
  });
  if (response.type !== 'opaque' && !response.ok) {
    throw new Error('Cloud sync returned HTTP ' + response.status);
  }
  return response;
}

async function syncToCloud(options) {
  const manual = !options || options.manual !== false;
  if (syncInFlight) return false;
  if (typeof navigator !== 'undefined' && !navigator.onLine) {
    markSyncPending(true);
    recordSyncError(new Error('Offline'));
    if (manual || hasPendingSync()) showSyncStatus('Offline - saved here only');
    scheduleCloudSync(SYNC_RETRY_MS);
    return false;
  }

  syncInFlight = true;
  recordSyncAttempt();
  if (manual || hasPendingSync()) showSyncStatus('Checking cloud...');

  try {
    await refreshDeletesFromCloud();
    if (await shrinkOversizedMedia()) render();
    const deletedIds = getDeletedIds();
    const body = buildCloudPayloadBody();
    const expectedEntries = entries.filter(e => e && !isSyncMetaEntry(e) && !deletedIds.has(String(e.id)) && !isDeletedEntry(e));
    if (manual || hasPendingSync()) showSyncStatus('Saving to cloud...');
    try {
      await postCloudPayload(body, 'cors');
    } catch (corsError) {
      await postCloudPayload(body, 'no-cors');
    }
    await verifyCloudMedia(expectedEntries);
    await verifyCloudDeletedIds(deletedIds);
    markSyncPending(false);
    markDeletedIdsSynced(deletedIds);
    recordSyncSuccess();
    render();
    showSyncStatus('Saved to cloud');
    setTimeout(hideSyncStatus, 1800);
    return true;
  } catch(e) {
    markSyncPending(true);
    recordSyncError(e);
    render();
    console.warn('Cloud sync failed:', e);
    showSyncStatus('Sync problem - will retry');
    scheduleCloudSync(SYNC_RETRY_MS);
    return false;
  } finally {
    syncInFlight = false;
  }
}

async function loadFromCloud(options) {
  const quiet = options && options.quiet;
  try {
    showSyncStatus('☁️ クラウドから同期中…');
    const cloudRaw = await fetchCloudEntries();
    if (!Array.isArray(cloudRaw)||cloudRaw.length===0) { hideSyncStatus(); return; }

    // 固定タグ(book_meta)の同期用エントリを取り出してローカルへ統合
    const preferLocal = hasPendingSync();
    const cloudMetaEntry = cloudRaw.find(e => e && String(e.id) === BOOK_META_SYNC_ID);
    const cloudTagFolderEntry = cloudRaw.find(e => e && String(e.id) === TAG_FOLDER_SYNC_ID);
    mergeBookMetaFromCloud(cloudMetaEntry, preferLocal);
    mergeTagFoldersFromCloud(cloudTagFolderEntry, preferLocal);
    const cloud = cloudRaw.filter(e => e && !isSyncMetaEntry(e));

    const {deletedIds, cloudDeletedIds} = mergeCloudDeletedEntries(cloud);
    const filtered = cloud.filter(e=>!deletedIds.has(String(e.id))&&!isDeletedEntry(e));
    const localEntries = entries.filter(e => e && !isSyncMetaEntry(e) && !deletedIds.has(String(e.id)) && !isDeletedEntry(e));
    const hadStraySentinel = localEntries.length !== entries.length;
    const localMap = Object.fromEntries(localEntries.map(e=>[String(e.id),e]));
    const cloudMap = Object.fromEntries(filtered.map(e=>[String(e.id),e]));
    const allIds = new Set([...Object.keys(localMap),...Object.keys(cloudMap)]);
    entries = [...allIds].filter(id=>!deletedIds.has(id)).map(id=>{
      const c=cloudMap[id], l=localMap[id];
      const chosen = chooseEntryVersion(c, l, preferLocal);
      const drawings = mergeEntryMedia(c, l);
      const mediaKinds = mergeEntryMediaKinds(c, l, drawings);
      const mediaUpdatedAt = mediaTime(c) > mediaTime(l) ? c.mediaUpdatedAt : ((l&&l.mediaUpdatedAt) || (c&&c.mediaUpdatedAt) || '');
      return {...chosen, drawings, images: [], mediaKinds, mediaUpdatedAt};
    });
    entries.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const idRepair = repairMissingIds(entries);
    entries = idRepair.list;
    migrateOldFixedTags();
    render();
    // 過去に固定タグ同期用エントリが通常データとして紛れ込んでいた場合、クラウド側も整理する
    if (hadStraySentinel || preferLocal || idRepair.changed) { persist(); }
    const cloudHasAllDeletedIds = sortedDeletedIds(deletedIds).every(id => cloudDeletedIds.has(id));
    if (cloudHasAllDeletedIds) markDeletedIdsSynced(deletedIds);
    if (!cloudHasAllDeletedIds || (deletedIds.size && hasUnsyncedDeletedIds(deletedIds))) {
      markSyncPending(true);
      scheduleCloudSync(0);
    }
    showSyncStatus('✅ 同期完了'); setTimeout(hideSyncStatus,2000);
  } catch(e) {
    console.warn('Cloud load failed:',e);
    recordSyncError(e);
    showSyncStatus('Cloud load failed');
    setTimeout(hideSyncStatus,3000);
  }
}

function showSyncStatus(msg) {
  let el=document.getElementById('syncStatus');
  if(!el){el=document.createElement('div');el.id='syncStatus';document.body.appendChild(el);}
  el.textContent=msg; el.style.cssText='position:fixed;top:1rem;right:1rem;background:white;border:1px solid #fde68a;border-radius:999px;padding:0.4rem 0.9rem;font-size:0.75rem;font-weight:600;color:#78716c;z-index:999;box-shadow:0 2px 8px #00000015;';
}
function hideSyncStatus() { const el=document.getElementById('syncStatus'); if(el)el.remove(); }

function getApiKey() { return localStorage.getItem(API_KEY_KEY)||''; }
function setApiKey(k) { localStorage.setItem(API_KEY_KEY,k); }

// ── Helpers ────────────────────────────────────────
function tagClass(t) { let h=0; for(let i=0;i<t.length;i++) h=(h*31+t.charCodeAt(i))%6; return `tc-${h}`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function allTags() {
  const s = new Set();
  entries.forEach(e => {
    (e.tags||[]).forEach(t => s.add(t));
    // BUGFIX: 表示にはその本の固定タグをbook_metaから取得する
    getBookFixedTags(e.book).forEach(t => s.add(t));
  });
  return [...s];
}

function allTagSet() {
  return new Set(allTags());
}

function tagFolderNames() {
  const key = (localStorage.getItem(TAG_FOLDERS_KEY) || '') + '\n' + (localStorage.getItem(TAG_FOLDER_ORDER_KEY) || '');
  if (key !== tagFolderNamesCacheKey) {
    tagFolderNamesCacheValue = folderTreePaths(getTagFolders());
    tagFolderNamesCacheKey = key;
  }
  return tagFolderNamesCacheValue.slice();
}

function assignedFolderTags() {
  const key = localStorage.getItem(TAG_FOLDERS_KEY) || '';
  if (key === assignedTagsCacheKey) return new Set(assignedTagsCacheValue);
  const s = new Set();
  const folders = getTagFolders();
  Object.keys(folders).forEach(name => folders[name].forEach(tag => s.add(tag)));
  assignedTagsCacheKey = key;
  assignedTagsCacheValue = [...s];
  return new Set(assignedTagsCacheValue);
}

function activeFolderTags() {
  if (!activeTagFolder) return [];
  const tags = allTagSet();
  return folderTagsForPath(activeTagFolder).filter(tag => tags.has(tag));
}

function entryMatchesActiveTagFilter(entry) {
  if (activeTag) return entryHasTag(entry, activeTag);
  const folderTags = activeFolderTags();
  if (folderTags.length) return folderTags.some(tag => entryHasTag(entry, tag));
  return true;
}

function activeTagFilterLabel() {
  if (activeTag) return `選択タグ「${esc(activeTag)}」のみ`;
  if (activeTagFolder) return `フォルダ「${esc(folderDisplayName(activeTagFolder))}」のみ`;
  return '選択タグのみ';
}

function folderTagsForPath(path) {
  path = normalizeFolderPath(path);
  const key = localStorage.getItem(TAG_FOLDERS_KEY) || '';
  if (key !== folderTagsCacheKey) {
    folderTagsCacheKey = key;
    folderTagsCache = new Map();
  }
  if (folderTagsCache.has(path)) return folderTagsCache.get(path).slice();
  const folders = getTagFolders();
  const merged = [];
  Object.keys(folders).forEach(function(name) {
    if (isFolderDescendantOrSelf(name, path)) merged.push(...cleanTagList(folders[name]));
  });
  const clean = cleanTagList(merged);
  folderTagsCache.set(path, clean);
  return clean.slice();
}

function directFolderTags(path) {
  return cleanTagList(getTagFolders()[normalizeFolderPath(path)] || []);
}

function childFolderPaths(path) {
  const current = normalizeFolderPath(path);
  return tagFolderNames().filter(function(name) {
    return folderParentPath(name) === current;
  });
}

function topFolderPaths() {
  return tagFolderNames().filter(name => folderDepth(name) === 0);
}

function visibleFolderExplorerPaths(root) {
  root = normalizeFolderPath(root);
  const active = activeTagFolder && isFolderDescendantOrSelf(activeTagFolder, root) ? activeTagFolder : root;
  const visible = [];
  let current = root;
  while (current) {
    const children = childFolderPaths(current);
    children.forEach(function(path) {
      if (!visible.includes(path)) visible.push(path);
    });
    if (!active || current === active) break;
    const next = children.find(path => active === path || isFolderDescendantOrSelf(active, path));
    if (!next) break;
    current = next;
  }
  return visible;
}

function folderExplorerLabel(path, root) {
  const rootParts = folderParts(root);
  return folderParts(path).slice(rootParts.length).join(' > ');
}

function folderRootPath(path) {
  const parts = folderParts(path);
  return parts[0] || normalizeFolderPath(path);
}

function folderPathTrail(root, path) {
  root = normalizeFolderPath(root);
  path = normalizeFolderPath(path);
  if (!path || path === root || !isFolderDescendantOrSelf(path, root)) return [];
  const rootParts = folderParts(root);
  const parts = folderParts(path);
  const trail = [];
  for (let i = rootParts.length + 1; i <= parts.length; i++) {
    trail.push(parts.slice(0, i).join('/'));
  }
  return trail;
}

function appendFolderButtonRow(paths, host, tagSet, depth) {
  paths = paths.filter(path => folderTagsForPath(path).some(tag => tagSet.has(tag)));
  if (!paths.length) return;
  const row = document.createElement('span');
  row.className = 'tag-folder-child-row';
  row.style.setProperty('--depth', depth);
  paths.forEach(function(path) {
    const subTags = folderTagsForPath(path).filter(tag => tagSet.has(tag));
    const b = document.createElement('button');
    b.className = 'tag-folder-child-btn' + (activeTagFolder===path?' active':'');
    b.type = 'button';
    b.textContent = folderLeafName(path) + ' ' + subTags.length;
    b.onclick = () => setTagFolder(path);
    row.appendChild(b);
  });
  host.appendChild(row);
}

function appendActiveFolderRows(root, host, tagSet) {
  const active = activeTagFolder && isFolderDescendantOrSelf(activeTagFolder, root) ? activeTagFolder : root;
  const trail = folderPathTrail(root, active);
  trail.forEach(function(path, index) {
    appendFolderButtonRow([path], host, tagSet, index);
  });
  appendFolderButtonRow(childFolderPaths(active), host, tagSet, trail.length);
}

function appendFolderChildRows(parent, host, tagSet, depth) {
  const children = childFolderPaths(parent).filter(path => folderTagsForPath(path).some(tag => tagSet.has(tag)));
  if (!children.length) return;
  const row = document.createElement('span');
  row.className = 'tag-folder-child-row';
  row.style.setProperty('--depth', depth);
  children.forEach(function(path) {
    const subTags = folderTagsForPath(path).filter(tag => tagSet.has(tag));
    const b = document.createElement('button');
    b.className = 'tag-folder-child-btn' + (activeTagFolder===path?' active':'');
    b.type = 'button';
    b.textContent = folderLeafName(path) + ' ' + subTags.length;
    b.onclick = () => setTagFolder(path);
    row.appendChild(b);
  });
  host.appendChild(row);
  children.forEach(function(path) {
    if (activeTagFolder && (activeTagFolder === path || isFolderDescendantOrSelf(activeTagFolder, path))) {
      appendFolderChildRows(path, host, tagSet, depth + 1);
    }
  });
}

function unfiledTags() {
  const assigned = assignedFolderTags();
  return allTags().filter(tag => !assigned.has(tag)).sort((a,b)=>a.localeCompare(b,'ja'));
}

function currentBookKeys() {
  const keys = [];
  entries.forEach(function(entry) {
    const key = bookKey(entry.book);
    if (!keys.includes(key)) keys.push(key);
  });
  return keys;
}

function getBookOrder() {
  try {
    const parsed = JSON.parse(localStorage.getItem(BOOK_ORDER_KEY) || '[]');
    return Array.isArray(parsed) ? parsed.map(String) : [];
  } catch {
    return [];
  }
}

function normalizeBookOrder(order, keys) {
  const keySet = new Set(keys);
  const clean = [];
  (Array.isArray(order) ? order : []).forEach(function(key) {
    key = String(key || '');
    if (keySet.has(key) && !clean.includes(key)) clean.push(key);
  });
  keys.forEach(function(key) {
    if (!clean.includes(key)) clean.push(key);
  });
  return clean;
}

function setBookOrder(order) {
  localStorage.setItem(BOOK_ORDER_KEY, JSON.stringify(normalizeBookOrder(order, currentBookKeys())));
}

function orderGroupedBooks(grouped) {
  const ordered = new Map();
  normalizeBookOrder(getBookOrder(), [...grouped.keys()]).forEach(function(key) {
    if (grouped.has(key)) ordered.set(key, grouped.get(key));
  });
  return ordered;
}

function moveBookOrder(key, direction) {
  key = String(key || '');
  const visibleKeys = currentRenderedBookKeys.length ? currentRenderedBookKeys : currentBookKeys();
  const visibleIndex = visibleKeys.indexOf(key);
  const visibleNext = visibleIndex + (direction < 0 ? -1 : 1);
  if (visibleIndex < 0 || visibleNext < 0 || visibleNext >= visibleKeys.length) return;
  const targetKey = visibleKeys[visibleNext];
  const order = normalizeBookOrder(getBookOrder(), currentBookKeys());
  const index = order.indexOf(key);
  const next = order.indexOf(targetKey);
  if (index < 0 || next < 0) return;
  order[index] = targetKey;
  order[next] = key;
  setBookOrder(order);
  render();
}

function reorderBookOrder(dragKey, targetKey, position) {
  dragKey = String(dragKey || '');
  targetKey = String(targetKey || '');
  if (!dragKey || !targetKey || dragKey === targetKey) return;
  const order = normalizeBookOrder(getBookOrder(), currentBookKeys());
  const from = order.indexOf(dragKey);
  let to = order.indexOf(targetKey);
  if (from < 0 || to < 0) return;
  order.splice(from, 1);
  if (from < to) to -= 1;
  if (position === 'after') to += 1;
  order.splice(Math.max(0, Math.min(to, order.length)), 0, dragKey);
  setBookOrder(order);
  shelfReorderSelectedKey = '';
  render();
  renderBookOrderList();
}

function swapBookOrder(firstKey, secondKey) {
  firstKey = String(firstKey || '');
  secondKey = String(secondKey || '');
  if (!firstKey || !secondKey || firstKey === secondKey) {
    shelfReorderSelectedKey = '';
    render();
    return;
  }
  const order = normalizeBookOrder(getBookOrder(), currentBookKeys());
  const firstIndex = order.indexOf(firstKey);
  const secondIndex = order.indexOf(secondKey);
  if (firstIndex < 0 || secondIndex < 0) return;
  order[firstIndex] = secondKey;
  order[secondIndex] = firstKey;
  setBookOrder(order);
  shelfReorderSelectedKey = '';
  render();
  showToast('本を入れ替えました');
}

function clearBookOrderDropState() {
  document.querySelectorAll('.book-order-row.drop-before,.book-order-row.drop-after').forEach(function(row) {
    row.classList.remove('drop-before','drop-after');
    delete row.dataset.dropPosition;
  });
}

function onBookOrderDragStart(event, key) {
  bookOrderDragKey = String(key || '');
  bookOrderSelectedKey = '';
  event.currentTarget.classList.add('dragging');
  if (event.dataTransfer) {
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', bookOrderDragKey);
  }
}

function onBookOrderDragOver(event, key) {
  if (!bookOrderDragKey || bookOrderDragKey === String(key || '')) return;
  event.preventDefault();
  const row = event.currentTarget;
  const rect = row.getBoundingClientRect();
  const position = event.clientY > rect.top + rect.height / 2 ? 'after' : 'before';
  clearBookOrderDropState();
  row.dataset.dropPosition = position;
  row.classList.add(position === 'after' ? 'drop-after' : 'drop-before');
  if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
}

function onBookOrderDrop(event, key) {
  event.preventDefault();
  const row = event.currentTarget;
  const dragKey = bookOrderDragKey || (event.dataTransfer && event.dataTransfer.getData('text/plain')) || '';
  const position = row.dataset.dropPosition || 'before';
  clearBookOrderDropState();
  bookOrderDragKey = '';
  reorderBookOrder(dragKey, key, position);
}

function onBookOrderDragEnd(event) {
  event.currentTarget.classList.remove('dragging');
  bookOrderDragKey = '';
  clearBookOrderDropState();
}

function clearShelfBookDropState() {
  document.querySelectorAll('.book-group.drop-before,.book-group.drop-after').forEach(function(group) {
    group.classList.remove('drop-before','drop-after');
    delete group.dataset.dropPosition;
  });
}

function onShelfBookDragStart(event, key) {
  bookOrderDragKey = String(key || '');
  bookOrderSelectedKey = '';
  bookOrderJustDragged = true;
  event.currentTarget.classList.add('dragging');
  if (event.dataTransfer) {
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', bookOrderDragKey);
  }
}

function onShelfBookDragOver(event, key) {
  if (!bookOrderDragKey || bookOrderDragKey === String(key || '')) return;
  event.preventDefault();
  const group = event.currentTarget;
  const rect = group.getBoundingClientRect();
  const position = event.clientX > rect.left + rect.width / 2 ? 'after' : 'before';
  clearShelfBookDropState();
  group.dataset.dropPosition = position;
  group.classList.add(position === 'after' ? 'drop-after' : 'drop-before');
  if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
}

function onShelfBookDrop(event, key) {
  event.preventDefault();
  const group = event.currentTarget;
  const dragKey = bookOrderDragKey || (event.dataTransfer && event.dataTransfer.getData('text/plain')) || '';
  const position = group.dataset.dropPosition || 'before';
  clearShelfBookDropState();
  bookOrderDragKey = '';
  reorderBookOrder(dragKey, key, position);
}

function onShelfBookDragEnd(event) {
  event.currentTarget.classList.remove('dragging');
  bookOrderDragKey = '';
  clearShelfBookDropState();
  setTimeout(function(){ bookOrderJustDragged = false; }, 80);
}

function shelfGroupFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  return el && el.closest ? el.closest('.book-group') : null;
}

function finishShelfPointerDrag() {
  if (shelfPointerDrag && shelfPointerDrag.source) shelfPointerDrag.source.classList.remove('dragging');
  shelfPointerDrag = null;
  bookOrderDragKey = '';
  clearShelfBookDropState();
  setTimeout(function(){ bookOrderJustDragged = false; }, 100);
}

function onShelfBookPointerDown(event, key) {
  if (shelfReorderMode) return;
  if (event.button !== undefined && event.button !== 0) return;
  const source = event.currentTarget.closest('.book-group');
  if (!source) return;
  shelfPointerDrag = {
    active: true,
    dragging: false,
    key: String(key || ''),
    pointerId: event.pointerId,
    source,
    targetKey: '',
    position: 'before',
    startX: event.clientX,
    startY: event.clientY
  };
  try { event.currentTarget.setPointerCapture(event.pointerId); } catch {}
}

function onShelfBookPointerMove(event) {
  if (!shelfPointerDrag || !shelfPointerDrag.active || shelfPointerDrag.pointerId !== event.pointerId) return;
  const dx = event.clientX - shelfPointerDrag.startX;
  const dy = event.clientY - shelfPointerDrag.startY;
  if (!shelfPointerDrag.dragging && Math.hypot(dx, dy) < 10) return;
  if (!shelfPointerDrag.dragging) {
    shelfPointerDrag.dragging = true;
    bookOrderDragKey = shelfPointerDrag.key;
    bookOrderJustDragged = true;
    shelfPointerDrag.source.classList.add('dragging');
  }
  event.preventDefault();
  const target = shelfGroupFromPoint(event.clientX, event.clientY);
  if (!target || target === shelfPointerDrag.source) {
    shelfPointerDrag.targetKey = '';
    clearShelfBookDropState();
    return;
  }
  const rect = target.getBoundingClientRect();
  const position = event.clientX > rect.left + rect.width / 2 ? 'after' : 'before';
  clearShelfBookDropState();
  target.dataset.dropPosition = position;
  target.classList.add(position === 'after' ? 'drop-after' : 'drop-before');
  shelfPointerDrag.targetKey = target.dataset.bookKey || '';
  shelfPointerDrag.position = position;
}

function onShelfBookPointerUp(event) {
  if (!shelfPointerDrag || shelfPointerDrag.pointerId !== event.pointerId) return;
  const drag = shelfPointerDrag;
  if (drag.dragging) {
    event.preventDefault();
    if (drag.targetKey) reorderBookOrder(drag.key, drag.targetKey, drag.position);
  }
  finishShelfPointerDrag();
}

function onShelfBookPointerCancel(event) {
  if (!shelfPointerDrag || shelfPointerDrag.pointerId !== event.pointerId) return;
  finishShelfPointerDrag();
}

function selectBookOrderRow(key) {
  key = String(key || '');
  if (!bookOrderSelectedKey) {
    bookOrderSelectedKey = key;
    renderBookOrderList();
    return;
  }
  if (bookOrderSelectedKey === key) {
    bookOrderSelectedKey = '';
    renderBookOrderList();
    return;
  }
  const moving = bookOrderSelectedKey;
  bookOrderSelectedKey = '';
  reorderBookOrder(moving, key, 'before');
}

function toggleShelfReorderMode() {
  shelfReorderMode = !shelfReorderMode;
  shelfReorderSelectedKey = '';
  bookOrderSelectedKey = '';
  openBookKey = null;
  render();
  showToast(shelfReorderMode ? '本移動モード' : '本移動を終了');
}

function moveShelfBookByTap(key) {
  key = String(key || '');
  if (!shelfReorderSelectedKey) {
    shelfReorderSelectedKey = key;
    render();
    return;
  }
  if (shelfReorderSelectedKey === key) {
    shelfReorderSelectedKey = '';
    render();
    return;
  }
  const moving = shelfReorderSelectedKey;
  shelfReorderSelectedKey = '';
  reorderBookOrder(moving, key, 'before');
  showToast('本を移動しました');
}

function chooseShelfMoveSource(event, key) {
  if (event) event.stopPropagation();
  shelfReorderSelectedKey = String(key || '');
  render();
}

function clearShelfMoveSource(event) {
  if (event) event.stopPropagation();
  shelfReorderSelectedKey = '';
  render();
}

function placeShelfMoveTarget(event, key, position) {
  if (event) event.stopPropagation();
  key = String(key || '');
  if (!shelfReorderSelectedKey || shelfReorderSelectedKey === key) {
    shelfReorderSelectedKey = '';
    render();
    return;
  }
  const moving = shelfReorderSelectedKey;
  shelfReorderSelectedKey = '';
  reorderBookOrder(moving, key, position === 'after' ? 'after' : 'before');
  showToast('本を移動しました');
}

function insertShelfMoveAtIndex(event, index) {
  if (event) event.stopPropagation();
  if (!shelfReorderSelectedKey) return;
  const moving = shelfReorderSelectedKey;
  const visible = currentRenderedBookKeys.slice();
  let insertIndex = Math.max(0, Math.min(Number(index) || 0, visible.length));
  const oldIndex = visible.indexOf(moving);
  const withoutMoving = visible.filter(key => key !== moving);
  if (oldIndex >= 0 && oldIndex < insertIndex) insertIndex -= 1;
  insertIndex = Math.max(0, Math.min(insertIndex, withoutMoving.length));
  shelfReorderSelectedKey = '';
  if (!withoutMoving.length) {
    render();
    return;
  }
  if (insertIndex >= withoutMoving.length) {
    reorderBookOrder(moving, withoutMoving[withoutMoving.length - 1], 'after');
  } else {
    reorderBookOrder(moving, withoutMoving[insertIndex], 'before');
  }
  showToast('本を挿入しました');
}

function bookMoveActionsHTML(key) {
  key = String(key || '');
  if (!shelfReorderMode) return '';
  if (!shelfReorderSelectedKey) {
    return `<div class="book-move-actions"><button type="button" class="book-move-btn" data-book-move-action="source" data-book-key="${esc(key)}">これを移動</button></div>`;
  }
  if (shelfReorderSelectedKey === key) {
    return `<div class="book-move-actions"><button type="button" class="book-move-btn active" data-book-move-action="clear" data-book-key="${esc(key)}">取り出し中</button></div>`;
  }
  return '';
}

function handleShelfMoveButtonClick(event) {
  const btn = event.target.closest && event.target.closest('[data-book-move-action]');
  if (!btn) {
    if (shelfReorderMode && shelfReorderSelectedKey) {
      const group = event.target.closest && event.target.closest('.book-group');
      const key = group ? (group.dataset.bookKey || '') : '';
      if (key && key !== shelfReorderSelectedKey) {
        event.preventDefault();
        event.stopPropagation();
        placeShelfMoveTarget(null, key, 'before');
        return true;
      }
    }
    return false;
  }
  event.preventDefault();
  event.stopPropagation();
  const key = btn.dataset.bookKey || '';
  const action = btn.dataset.bookMoveAction || '';
  if (action === 'source') {
    chooseShelfMoveSource(null, key);
    showToast('移動する本を選びました');
    return true;
  }
  if (action === 'clear') {
    clearShelfMoveSource(null);
    showToast('選択を解除しました');
    return true;
  }
  if (action === 'before' || action === 'after') {
    placeShelfMoveTarget(null, key, action);
    return true;
  }
  if (action === 'insert') {
    insertShelfMoveAtIndex(null, btn.dataset.insertIndex || 0);
    return true;
  }
  if (action === 'end') {
    insertShelfMoveAtIndex(null, currentRenderedBookKeys.length);
    return true;
  }
  return false;
}

function onShelfBookTap(index, key) {
  if (shelfReorderMode) {
    return;
  }
  toggleBookGroup(index);
}

function handleShelfClick(event) {
  const addBtn = event.target.closest && event.target.closest('[data-record-add-book]');
  if (addBtn) {
    event.preventDefault();
    event.stopPropagation();
    openEntryForBook(addBtn.dataset.recordAddBook || '', addBtn.dataset.recordAddAuthor || '');
    return true;
  }

  const btn = event.target.closest && event.target.closest('[data-book-move-action]');
  if (btn) {
    event.preventDefault();
    event.stopPropagation();
    const key = btn.dataset.bookKey || '';
    const action = btn.dataset.bookMoveAction || '';
    if (action === 'source') {
      chooseShelfMoveSource(null, key);
      showToast('Swap source selected');
      return true;
    }
    if (action === 'clear') {
      clearShelfMoveSource(null);
      showToast('Selection cleared');
      return true;
    }
    return false;
  }

  const spine = event.target.closest && event.target.closest('.book-spine');
  if (!spine) return false;
  event.preventDefault();
  event.stopPropagation();
  const key = spine.dataset.bookKey || '';
  const index = Number(spine.dataset.bookIndex || 0);
  if (shelfReorderMode) {
    if (!shelfReorderSelectedKey && key) {
      chooseShelfMoveSource(null, key);
      showToast('Swap source selected');
    } else if (shelfReorderSelectedKey && key && key !== shelfReorderSelectedKey) {
      swapBookOrder(shelfReorderSelectedKey, key);
    }
    return true;
  }
  toggleBookGroup(index);
  return true;
}

function bookGroups() {
  const map = new Map();
  entries.forEach(e => {
    const k=bookKey(e.book);
    if(!map.has(k)) map.set(k,{book:e.book||'',author:e.author||'',entries:[]});
    map.get(k).entries.push(e);
  });
  return orderGroupedBooks(map);
}

function getFiltered() {
  const q=searchQuery.toLowerCase(),sort=document.getElementById('sortSelect').value;
  return entries.filter(e=>{
    if(!entryMatchesActiveTagFilter(e)) return false;
    return entryMatchesSearch(e, q);
  }).sort((a,b)=>sort==='book'?(a.book||'').localeCompare(b.book||'','ja'):(Number(b.id||0)-Number(a.id||0)));
}

function entryHasTag(entry, tag) {
  if (!tag) return true;
  return (entry.tags||[]).includes(tag) || getBookFixedTags(entry.book).includes(tag);
}

function entryMatchesSearch(entry, query) {
  if (!query) return true;
  const fixedTags = getBookFixedTags(entry.book);
  return [entry.title,entry.book,entry.author,entry.content,entry.lesson,entry.supplement,...(entry.tags||[]),...fixedTags]
    .some(s=>(s||'').toLowerCase().includes(query));
}

function entryPageRange(entry) {
  const nums = String(entry.page || '').match(/\d+/g) || [];
  if (!nums.length) return null;
  const start = Number(nums[0]);
  const end = Number(nums[nums.length - 1]);
  return { start, end: Number.isFinite(end) ? end : start };
}

function sortExpandedRecords(list) {
  return list.slice().sort(function(a,b) {
    const pageA = entryPageRange(a);
    const pageB = entryPageRange(b);
    if (!pageA && pageB) return 1;
    if (pageA && !pageB) return -1;
    if (pageA && pageB) {
      const startDiff = pageA.start - pageB.start;
      if (startDiff !== 0) return expandedRecordSort === 'old' ? startDiff : -startDiff;
      const endDiff = pageA.end - pageB.end;
      if (endDiff !== 0) return expandedRecordSort === 'old' ? endDiff : -endDiff;
    }
    return Number(a.id || 0) - Number(b.id || 0);
  });
}

function entryTimeValue(entry) {
  return Date.parse(entry.updatedAt || entry.modifiedAt || entry.createdAt || '') || Number(entry.id || 0) || 0;
}

function bookLatestLabel(group) {
  const latest = (group.entries || []).slice().sort((a,b)=>entryTimeValue(b)-entryTimeValue(a))[0];
  const raw = latest ? (latest.updatedAt || latest.modifiedAt || latest.createdAt || '') : '';
  if (!raw) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  return String(raw).slice(0,10);
}

function bookTagSummary(group, limit) {
  const counts = new Map();
  getBookFixedTags(group.book).forEach(tag => counts.set(tag, (counts.get(tag)||0) + 1000));
  (group.entries || []).forEach(entry => {
    (entry.tags || []).forEach(tag => counts.set(tag, (counts.get(tag)||0) + 1));
  });
  return [...counts.entries()]
    .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0], 'ja'))
    .slice(0, limit || 3)
    .map(([tag]) => tag);
}

function bookPrimaryTag(group) {
  return bookTagSummary(group, 1)[0] || '';
}

function compactBookTitle(title) {
  const text = String(title || 'タイトル未入力').trim();
  return [...text].slice(0, 6).join('');
}

function bookAuthorLabel(group) {
  return group.author ? group.author : '著者未入力';
}

function expandedRecordsForGroup(group) {
  const key = bookKey(group.book);
  const q = searchQuery.toLowerCase();
  let list = entries.filter(function(entry) {
    return bookKey(entry.book) === key && entryMatchesSearch(entry, q);
  });
  if (expandedRecordScope === 'activeTag' && (activeTag || activeTagFolder)) {
    list = list.filter(entryMatchesActiveTagFilter);
  }
  return sortExpandedRecords(list);
}

// ── Render ─────────────────────────────────────────
function render() {
  const tags=allTags(),groups=bookGroups();
  const folders = getTagFolders();
  if (displayMode === 'list' && shelfReorderMode) {
    shelfReorderMode = false;
    shelfReorderSelectedKey = '';
  }
  if (activeTag && !tags.includes(activeTag)) activeTag = '';
  if (activeTagFolder && !folderTagsForPath(activeTagFolder).some(tag => tags.includes(tag))) activeTagFolder = '';
  const folderCount = tagFolderNames().length;
  document.getElementById('headerMeta').textContent=`${entries.length}件の記録 · ${groups.size}冊 · ${tags.length}個のタグ${folderCount ? ` · ${folderCount}フォルダ` : ''}`;
  const themeSelect = document.getElementById('shelfThemeSelect');
  if (themeSelect) {
    themeSelect.value = shelfTheme;
    themeSelect.style.display = displayMode === 'shelf' ? '' : 'none';
  }
  const shelfModeBtn = document.getElementById('viewModeShelfBtn');
  const listModeBtn = document.getElementById('viewModeListBtn');
  if (shelfModeBtn) shelfModeBtn.classList.toggle('active', displayMode === 'shelf');
  if (listModeBtn) listModeBtn.classList.toggle('active', displayMode === 'list');
  const reorderBtn = document.getElementById('shelfReorderBtn');
  if (reorderBtn) {
    reorderBtn.style.display = displayMode === 'shelf' ? '' : 'none';
    reorderBtn.classList.toggle('active', shelfReorderMode);
    reorderBtn.textContent = shelfReorderMode ? '✓ 移動中' : '↔ 本移動';
  }
  const moveStatus = document.getElementById('bookMoveStatus');
  if (moveStatus) {
    moveStatus.classList.toggle('show', shelfReorderMode);
    if (!shelfReorderMode) moveStatus.innerHTML = '';
    else if (shelfReorderSelectedKey) {
      moveStatus.innerHTML = '<span>入れ替えたい相手の本をタップしてください。</span><span class="book-move-status-actions"><button type="button" class="book-move-btn" data-book-move-action="clear">キャンセル</button></span>';
    } else {
      moveStatus.innerHTML = '<span>動かしたい本の「これを移動」を押してください。</span>';
    }
  }

  const wrap=document.getElementById('tagFilters');
  const expandedWrap=document.getElementById('tagExpandedTags');
  wrap.innerHTML=`<button class="tag-btn${activeTag===''&&activeTagFolder===''?' active':''}" onclick="setTag('')">すべて</button>`;
  if (expandedWrap) expandedWrap.innerHTML='';
  const tagSet = new Set(tags);
  let visibleTopFolders = activeTagFolder ? topFolderPaths().filter(name => isFolderDescendantOrSelf(activeTagFolder, name)) : topFolderPaths();
  if (activeTagFolder && !visibleTopFolders.length) visibleTopFolders = [folderRootPath(activeTagFolder)];
  visibleTopFolders.forEach(function(name) {
    const folderTags = folderTagsForPath(name).filter(tag => tagSet.has(tag));
    if (!folderTags.length) return;
    const group = document.createElement('span');
    group.className = 'tag-folder-group';
    const folderBtn = document.createElement('button');
    const folderActive = activeTagFolder === name || (activeTagFolder && isFolderDescendantOrSelf(activeTagFolder, name));
    folderBtn.className = 'tag-folder-btn' + (folderActive ? ' active' : '');
    folderBtn.type = 'button';
    folderBtn.textContent = '📁 ' + folderLeafName(name) + ' ' + folderTags.length;
    folderBtn.onclick = () => setTagFolder(name);
    group.appendChild(folderBtn);
    if (folderActive) {
      const inner = document.createElement('span');
      inner.className = 'tag-folder-inner-tags';
      appendActiveFolderRows(name, inner, tagSet);
      group.appendChild(inner);
    }
    wrap.appendChild(group);
  });
  if (expandedWrap && activeTagFolder) {

function hashString(text) {
  let hash = 0;
  const s = String(text || '');
  for (let i = 0; i < s.length; i++) hash = ((hash * 31) + s.charCodeAt(i)) >>> 0;
  return hash;
}

function spinePalette(title, index) {
  const theme = SPINE_THEMES[shelfTheme] || SPINE_THEMES.classic;
  return theme[(hashString(title) + index) % theme.length];
}

function spineStyle(title, index) {
  const len = [...String(title || '')].length;
  const columns = Math.max(2, Math.ceil(len / 13));
  const titleWidth = Math.max(2.7, columns * 1.18);
  const spineWidth = titleWidth + 1.65;
  const titleWidthMobile = Math.max(2.35, columns * 1.02);
  const spineWidthMobile = titleWidthMobile + 1.3;
  const titleSize = len > 42 ? 0.74 : (len > 30 ? 0.78 : 0.84);
  const palette = spinePalette(title, index || 0);
  return [
    `--title-width:${titleWidth.toFixed(2)}rem`,
    `--spine-width:${spineWidth.toFixed(2)}rem`,
    `--title-width-mobile:${titleWidthMobile.toFixed(2)}rem`,
    `--spine-width-mobile:${spineWidthMobile.toFixed(2)}rem`,
    `--title-size:${titleSize}rem`,
    `--spine-base:${palette.base}`,
    `--spine-top:${palette.top}`,
    `--spine-bottom:${palette.bottom}`,
    `--spine-edge:${palette.edge}`,
    `--spine-light:${palette.light}`,
    `--spine-shadow:${palette.shadow}`,
    `--spine-ink:${palette.ink}`,
    `--spine-label:${palette.label}`,
    `--spine-label-opacity:${palette.labelOpacity}`,
    `--spine-badge-bg:${palette.badgeBg}`,
    `--spine-badge-ink:${palette.badgeInk}`,
    `--spine-badge-border:${palette.badgeBorder}`,
    `--spine-text-shadow:${palette.textShadow}`
  ].join(';');
}

function formatSpineText(text) {
  return String(text || '').split(/([A-Za-z0-9][A-Za-z0-9'’&.+-]*)/g).map(function(part) {
    if (!part) return '';
    if (/^[A-Za-z0-9]/.test(part)) return `<span class="spine-word-latin">${esc(part)}</span>`;
    return esc(part);
  }).join('');
}

function moveTagFolderOrder(name, direction) {
  name = normalizeFolderPath(name);
  const folders = getTagFolders();
  const siblings = tagFolderNames().filter(path => folderParentPath(path) === folderParentPath(name));
  const index = siblings.indexOf(name);
  const nextIndex = index + (direction < 0 ? -1 : 1);
  if (index < 0 || nextIndex < 0 || nextIndex >= siblings.length) return;
  const nextSiblings = siblings.slice();
  const tmp = nextSiblings[index];
  nextSiblings[index] = nextSiblings[nextIndex];
  nextSiblings[nextIndex] = tmp;
  const currentOrder = cleanTagFolderOrder(getTagFolderOrder(), folders);
  const siblingIndexes = siblings.map(path => currentOrder.indexOf(path)).filter(i => i >= 0);
  const firstSiblingIndex = siblingIndexes.length ? Math.min(...siblingIndexes) : currentOrder.length;
  const rest = currentOrder.filter(path => !siblings.includes(path));
  rest.splice(firstSiblingIndex, 0, ...nextSiblings);
  setTagFolderOrder(rest);
  renderTagFolderManager();
  render();
}

function removeTagFromFolder(name, tag) {
  const folders = getTagFolders();
  folders[name] = cleanTagList(folders[name]).filter(item => item !== tag);
  if (!folders[name].length) delete folders[name];
  if (activeTagFolder === name && !folders[name]) activeTagFolder = '';
  if (activeTag === tag) activeTag = '';
  setTagFolders(folders);
  renderTagFolderManager();
  render();
}

function deleteTagFolder(name) {
  name = normalizeFolderPath(name);
  const folders = getTagFolders();
  Object.keys(folders).forEach(function(path) {
    if (isFolderDescendantOrSelf(path, name)) delete folders[path];
  });
  if (activeTagFolder === name || isFolderDescendantOrSelf(activeTagFolder, name)) activeTagFolder = '';
  setTagFolders(folders);
  renderTagFolderManager();
  render();
}

function onBookInput(val) {
  const list=document.getElementById('suggestList');
  if(!val.trim()){list.style.display='none';currentFixedTags=[];renderFixedTagChips();return;}
  const q=bookKey(val);
  const allGroups=[...bookGroups().values()];
  const exact=allGroups.find(g=>bookKey(g.book)===q);
  const newTags=getBookFixedTags(exact ? exact.book : val);
  if(JSON.stringify(newTags)!==JSON.stringify(currentFixedTags)){
    currentFixedTags=newTags;
    renderFixedTagChips();
  }
  const matches=allGroups.filter(g=>bookKey(g.book).includes(q)&&bookKey(g.book)!==q).slice(0,5);
  if(!matches.length){list.style.display='none';return;}
  list._matches = matches;
  list.innerHTML=matches.map((g,i)=>`<div class="suggest-item" onclick="selectSuggestion(${i})"><div class="suggest-title">${esc(g.book)}</div>${g.author?`<div class="suggest-author">${esc(g.author)}</div>`:''}</div>`).join('');
  list.style.display='block';
}

function onTagsInput(val) {
  const list = document.getElementById('tagSuggestList');
  const parts = val.split(',');
  const query = parts[parts.length-1].trim();
  if (!query) { list.style.display='none'; return; }

  const used = new Set(parts.slice(0,-1).map(t=>t.trim().toLocaleLowerCase('ja-JP')).filter(Boolean));
  currentFixedTags.forEach(t => used.add(t.toLocaleLowerCase('ja-JP')));

  const q = query.toLocaleLowerCase('ja-JP');
  const matches = allTags().filter(function(t) {
    const lower = t.toLocaleLowerCase('ja-JP');
    return lower.includes(q) && lower !== q && !used.has(lower);
  }).slice(0,8);

  if (!matches.length) { list.style.display='none'; return; }
  list._matches = matches;
  list.innerHTML = matches.map((t,i)=>`<div class="suggest-item" onclick="selectTagSuggestion(${i})"><div class="suggest-title">${esc(t)}</div></div>`).join('');
  list.style.display='block';

async function saveEntry() {
  normalizePageField();
  if(mediaProcessingCount>0){ alert('画像を処理中です。数秒待ってから保存してください。'); return; }
  const bookName = document.getElementById('fBook').value.trim();
  if(!bookName){ alert('本タイトルを入力してください'); return; }
  currentFixedTags = cleanTagList(currentFixedTags);

  if (fixedTagEditOnly) {
    setBookFixedTags(bookName, currentFixedTags);
    persist();
    clearEntryDraft();
    closeModal(true);
    render();
    showToast('固定タグを保存しました');
    return;
  }

  // BUGFIX: その本専用の固定タグとして保存（他の本には影響しない）
  setBookFixedTags(bookName, currentFixedTags);

  const tags = document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const existingEntry = editingId ? entries.find(e=>String(e.id)===String(editingId)) : null;
  const nowIso = new Date().toISOString();
  const shouldVerifyMedia = mediaDirty || currentDrawings.length > 0;
  const data = {
    book:       bookName,
    author:     document.getElementById('fAuthor').value,
    page:       formatPageValue(document.getElementById('fPage').value),
    title:      document.getElementById('fTitle').value,
    content:    document.getElementById('fContent').value,
    lesson:     document.getElementById('fLesson').value,
    supplement: document.getElementById('fSupplement').value,
    tags,
    drawings:   currentDrawings,
    images:     [],
    mediaKinds: normalizeCurrentMediaKinds(),
    fixedTags:  [...currentFixedTags],
    mediaUpdatedAt: mediaDirty ? nowIso : ((existingEntry&&existingEntry.mediaUpdatedAt)||''),
    updatedAt:  nowIso,
  };

  if(editingId){ entries=entries.map(e=>e.id===editingId?{...e,...data}:e); }
  else { entries.unshift({...data,id:Date.now(),createdAt:new Date().toISOString().slice(0,10)}); }

  persist(); clearEntryDraft(); closeModal(true); render(); showToast('保存しました');
  if(shouldVerifyMedia) {
    const synced = await syncMediaNow();
    showToast(synced ? 'Saved to cloud' : 'Saved on this device. Sync pending.');
  }
}

function formatPageValue(value) {
  const nums = String(value || '').match(/\d+/g) || [];
  if (!nums.length) return String(value || '').trim();
  const start = Number(nums[0]);
  const end = Number(nums[nums.length - 1]);
  if (!Number.isFinite(start)) return String(value || '').trim();
  if (nums.length === 1 || !Number.isFinite(end) || end === start) return 'p. ' + start;
  return 'pp. ' + start + '-' + end;
}

function normalizePageField() {
  const el = document.getElementById('fPage');
  if (!el) return;
  const next = formatPageValue(el.value);
  if (next !== el.value) {
    el.value = next;
    queueEntryDraftSave();
  }
}

async function syncMediaNow() {
  if (syncRetryTimer) clearTimeout(syncRetryTimer);

    markSyncPending(true);
    recordSyncError(new Error('Offline'));
    showSyncStatus('Offline - saved here only');
    scheduleCloudSync(SYNC_RETRY_MS);
    return false;
  }
  if (syncInFlight) {
    markSyncPending(true);
    showSyncStatus('Sync already running');
    scheduleCloudSync(1200);
    return false;
  }
  return await syncToCloud({manual:true});
}

function compressImageFile(file) {
  return new Promise(function(resolve,reject) {
    if(!file||!file.type||!file.type.startsWith('image/')) { reject(new Error('Not an image')); return; }
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Image read failed'));
    reader.onload=function() {
      const img=new Image();
      img.onerror=()=>reject(new Error('Image load failed'));
      img.onload=function() {
        const maxSide=MEDIA_IMAGE_MAX_SIDE;
        const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(!w||!h) { reject(new Error('Invalid image')); return; }
        const scale=Math.min(1,maxSide/Math.max(w,h));
        const cw=Math.max(1,Math.round(w*scale));
        const ch=Math.max(1,Math.round(h*scale));
        const canvas=document.createElement('canvas');
        canvas.width=cw; canvas.height=ch;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='white'; ctx.fillRect(0,0,cw,ch);
        ctx.drawImage(img,0,0,cw,ch);
        resolve(canvasToJpeg(canvas,MEDIA_IMAGE_MAX_SIDE,MEDIA_IMAGE_QUALITY,MEDIA_IMAGE_MAX_CHARS));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addImageAttachment(ev) {
  const input=ev.target;
  const file=input.files&&input.files[0];
  input.value='';
  if(!file)return;
  mediaProcessingCount++;
  try {
    const dataUrl=await compressImageFile(file);
    currentDrawings.push(dataUrl);
    currentMediaKinds.push('image');
    mediaDirty=true;
    renderDrawingGallery();
    if(editingId!==null&&editingId!==undefined) {
      const synced = await persistEditingMedia();
      showToast(synced ? 'Image saved to cloud' : 'Image saved here. Sync pending.');
      return;
    }
    showToast('Image added. Save the note next.');
    return;
    if(persistEditingMedia()) showToast('🖼 画像を保存して同期中です');
    else showToast('🖼 画像を追加しました。最後に保存してください');
  } catch(e) {
    console.warn('Image attachment failed:',e);
    showToast('画像を追加できませんでした');
  } finally {
    mediaProcessingCount=Math.max(0,mediaProcessingCount-1);
  }
}

    const neo=old.cloneNode(false);
    old.parentNode.replaceChild(neo,old);
    dCanvas=neo; dCtx=dCanvas.getContext('2d');
    const sourceList = currentDrawings;
    const source = isEdit ? sourceList[editingDrawingIndex] : '';
    if(source){
      drawingBaseImageUrl = source;
      loadCanvasImage(source, isImage, maybeRestoreDrawingDraft);
    } else {
      setupDrawingCanvas(500,375);
      drawHistory=[]; saveDrawState();
      maybeRestoreDrawingDraft();
    }
    drawMode='draw';
    document.getElementById('toolDraw').classList.add('active');
    document.getElementById('toolErase').classList.remove('active');
    dCanvas.addEventListener('pointerdown',onPtrDown);
    dCanvas.addEventListener('pointermove',onPtrMove);
    dCanvas.addEventListener('pointerup',onPtrUp);
    dCanvas.addEventListener('pointercancel',onPtrUp);
    dCanvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
    dCanvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  },50);
}
function closeDrawingModal(force) {
  if (!force && drawingDirty && !confirm('保存していない描画があります。閉じますか？')) return false;
  clearDrawingDraft();
  document.getElementById('drawingOverlay').classList.remove('open');
  isDrawing=false;
  return true;
}

function setupDrawingCanvas(w,h) {
  const maxSide = editingMediaKind === 'images' ? 900 : 500;
  const scale = Math.min(1, maxSide / Math.max(w,h));
  const cw = Math.max(1, Math.round(w * scale));
  const ch = Math.max(1, Math.round(h * scale));
  dCanvas.width = cw;
  dCanvas.height = ch;
  dCanvas.style.width = '100%';
  dCanvas.style.height = Math.round((dCanvas.offsetWidth || cw) * ch / cw) + 'px';
  dCtx = dCanvas.getContext('2d');
  dCtx.fillStyle='white'; dCtx.fillRect(0,0,cw,ch);
}

function loadCanvasImage(src, keepAsBase, afterLoad) {
  const img=new Image();
  img.onload=()=>{
    const w=img.naturalWidth||img.width||500;
    const h=img.naturalHeight||img.height||375;
    setupDrawingCanvas(w,h);
    if(keepAsBase) drawingBaseImage = img;
    dCtx.drawImage(img,0,0,dCanvas.width,dCanvas.height);
    drawHistory=[]; saveDrawState();
    if (typeof afterLoad === 'function') afterLoad();
  };
  img.src=src;
}

function setDrawingMode(mode,btn) {
  drawMode=mode;
  document.querySelectorAll('.drawing-tool-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function canvasPos(e) {
  const rect=dCanvas.getBoundingClientRect();
  const cx=e.clientX??e.touches?.[0]?.clientX??0;
  const cy=e.clientY??e.touches?.[0]?.clientY??0;
  return {
    x:(cx-rect.left)*(dCanvas.width/rect.width),
    y:(cy-rect.top)*(dCanvas.height/rect.height)
  };
}

function onPtrDown(e) {
  e.preventDefault();
  isDrawing=true;
  if (dCanvas.setPointerCapture && e.pointerId!==undefined) {
    try { dCanvas.setPointerCapture(e.pointerId); } catch {}
  }
  saveDrawState();
  const p=canvasPos(e); lastX=p.x; lastY=p.y;
}
function onPtrMove(e) {
  if(!isDrawing) return; e.preventDefault();
  const p=canvasPos(e);
  dCtx.lineCap='round'; dCtx.lineJoin='round';
  const rect=dCanvas.getBoundingClientRect();
  const brushScale=((dCanvas.width/rect.width)+(dCanvas.height/rect.height))/2;
  if(drawMode==='erase'){
    const sz=+document.getElementById('brushSize').value*4*brushScale;
    if(editingMediaKind==='images'&&drawingBaseImage){
      dCtx.save();
      dCtx.beginPath();
      dCtx.rect(p.x-sz/2,p.y-sz/2,sz,sz);
      dCtx.clip();
      dCtx.drawImage(drawingBaseImage,0,0,dCanvas.width,dCanvas.height);
      dCtx.restore();
    } else {
      dCtx.clearRect(p.x-sz/2,p.y-sz/2,sz,sz);
    }
  } else {
    dCtx.strokeStyle=document.getElementById('brushColor').value;
    dCtx.lineWidth=+document.getElementById('brushSize').value*brushScale;
    dCtx.beginPath(); dCtx.moveTo(lastX,lastY); dCtx.lineTo(p.x,p.y); dCtx.stroke();
  }
  lastX=p.x; lastY=p.y;
  queueDrawingDraftSave();
}
function onPtrUp() {
  if (!isDrawing) return;
  isDrawing=false;
  queueDrawingDraftSave();
}

function saveDrawState() {
  drawHistory.push(dCanvas.toDataURL('image/png'));
  const maxHistory = editingMediaKind === 'images' ? 8 : 20;
  if(drawHistory.length>maxHistory) drawHistory.shift();
}

function undoDrawing() {
  if(drawHistory.length<=1) return;
  drawHistory.pop();
  const img=new Image();
  img.onload=()=>{
    dCtx.clearRect(0,0,dCanvas.width,dCanvas.height);
    dCtx.fillStyle='white'; dCtx.fillRect(0,0,dCanvas.width,dCanvas.height);
    dCtx.drawImage(img,0,0,dCanvas.width,dCanvas.height);
    queueDrawingDraftSave();
  };
  img.src=drawHistory[drawHistory.length-1];
}

function rotateCanvasSource(sourceCanvas) {
  const rotated=document.createElement('canvas');
  rotated.width=sourceCanvas.height;
  rotated.height=sourceCanvas.width;
  const rCtx=rotated.getContext('2d');
  rCtx.fillStyle='white';
  rCtx.fillRect(0,0,rotated.width,rotated.height);
  rCtx.translate(rotated.width,0);
  rCtx.rotate(Math.PI/2);
  rCtx.drawImage(sourceCanvas,0,0);
  return rotated;
}

function rotateDrawingCanvas() {
  if(!dCanvas||!dCtx) return;
  saveDrawState();
  const snapshot=document.createElement('canvas');
  snapshot.width=dCanvas.width;
  snapshot.height=dCanvas.height;
  snapshot.getContext('2d').drawImage(dCanvas,0,0);

  let rotatedBaseUrl='';
  if(editingMediaKind==='images'&&drawingBaseImage){
    const base=document.createElement('canvas');
    base.width=dCanvas.width;
    base.height=dCanvas.height;
    const bCtx=base.getContext('2d');
    bCtx.fillStyle='white';
    bCtx.fillRect(0,0,base.width,base.height);
    bCtx.drawImage(drawingBaseImage,0,0,base.width,base.height);
    rotatedBaseUrl=rotateCanvasSource(base).toDataURL('image/png');
  }

  const rotated=rotateCanvasSource(snapshot);
  dCanvas.width=rotated.width;
  dCanvas.height=rotated.height;
  dCanvas.style.width='100%';
  dCanvas.style.height=Math.round((dCanvas.offsetWidth || rotated.width) * rotated.height / rotated.width) + 'px';
  dCtx=dCanvas.getContext('2d');
  dCtx.drawImage(rotated,0,0);

  if(rotatedBaseUrl){
    const img=new Image();
    img.onload=()=>{ drawingBaseImage=img; drawingBaseImageUrl=rotatedBaseUrl; };
    img.src=rotatedBaseUrl;
  }

  saveDrawState();
  queueDrawingDraftSave();
  showToast('Rotated');
}

function clearDrawing() {
  if(editingMediaKind==='images' && drawingBaseImageUrl){
    loadCanvasImage(drawingBaseImageUrl,true,queueDrawingDraftSave);
    return;
  }
  resetDrawingToBlank();
}

function resetDrawingToBlank() {
  dCtx.fillStyle='white'; dCtx.fillRect(0,0,dCanvas.width,dCanvas.height);
  drawHistory=[]; saveDrawState();
  queueDrawingDraftSave();
}

function canvasToJpeg(sourceCanvas, maxSide, quality, maxChars) {
  let side=maxSide, q=quality, dataUrl='';
  for(let attempt=0; attempt<7; attempt++) {
    const scale=Math.min(1,side/Math.max(sourceCanvas.width,sourceCanvas.height));
    const out=document.createElement('canvas');
    out.width=Math.max(1,Math.round(sourceCanvas.width*scale));
    out.height=Math.max(1,Math.round(sourceCanvas.height*scale));
    const ctx=out.getContext('2d');
    ctx.fillStyle='white'; ctx.fillRect(0,0,out.width,out.height);
    ctx.drawImage(sourceCanvas,0,0,out.width,out.height);
    dataUrl=out.toDataURL('image/jpeg',q);
    if(!maxChars || dataUrl.length<=maxChars) return dataUrl;
    side=Math.max(260,Math.floor(side*0.82));
    q=Math.max(0.5,q-0.04);
  }
  return dataUrl;
}

function canvasToSketchDataUrl(sourceCanvas, maxSide, quality, maxChars) {
  let side=maxSide, q=quality, best='';
  for(let attempt=0; attempt<9; attempt++) {
    const scale=Math.min(1,side/Math.max(sourceCanvas.width,sourceCanvas.height));
    const out=document.createElement('canvas');
    out.width=Math.max(1,Math.round(sourceCanvas.width*scale));
    out.height=Math.max(1,Math.round(sourceCanvas.height*scale));
    const ctx=out.getContext('2d');
    ctx.fillStyle='white';
    ctx.fillRect(0,0,out.width,out.height);
    ctx.drawImage(sourceCanvas,0,0,out.width,out.height);

    const png=out.toDataURL('image/png');
    if(!maxChars || png.length<=maxChars) return png;

    const jpeg=out.toDataURL('image/jpeg',q);
    best=jpeg;
    if(!maxChars || jpeg.length<=maxChars) return jpeg;

    side=Math.max(320,Math.floor(side*0.86));
    q=Math.max(0.62,q-0.035);
  }
  return best;
}

async function saveDrawing() {
  const isImage = editingMediaKind === 'images';
  const dataUrl=isImage ? canvasToJpeg(dCanvas,MEDIA_IMAGE_MAX_SIDE,MEDIA_IMAGE_QUALITY,MEDIA_IMAGE_MAX_CHARS) : canvasToSketchDataUrl(dCanvas,MEDIA_SKETCH_MAX_SIDE,MEDIA_SKETCH_QUALITY,MEDIA_SKETCH_MAX_CHARS);
  mediaDirty=true;
  if(isImage){
    if(editingDrawingIndex!==null) {
      currentDrawings[editingDrawingIndex]=dataUrl;
      currentMediaKinds[editingDrawingIndex]='image';
    } else {
      currentDrawings.push(dataUrl);
      currentMediaKinds.push('image');
      editingDrawingIndex=currentDrawings.length-1;
    }
    showToast('🖼 画像を更新しました');
  } else if(editingDrawingIndex!==null){
    currentDrawings[editingDrawingIndex]=dataUrl;
    currentMediaKinds[editingDrawingIndex]='sketch';
    showToast('✏️ スケッチを更新しました');
  } else {
    currentDrawings.push(dataUrl);
    currentMediaKinds.push('sketch');
    editingDrawingIndex=currentDrawings.length-1;
    showToast('🎨 スケッチを保存しました');
  }
  if(editingId!==null&&editingId!==undefined) {
    const synced = await persistEditingMedia();
    showToast(synced ? 'Image saved to cloud' : 'Image saved here. Sync pending.');
  }
  renderDrawingGallery();
  clearDrawingDraft();
  setDrawingSaveStatus('保存済み ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
}

async function handleAI(id,btn) {
  const key=getApiKey();
  if(!key){pendingAiId=id;document.getElementById('apiKeyInput').value='';document.getElementById('aiKeyOverlay').classList.add('open');return;}
  await runAI(id,btn,key);
}
function closeAiModal() { document.getElementById('aiKeyOverlay').classList.remove('open'); }
function confirmApiKey() {
  const k=document.getElementById('apiKeyInput').value.trim(); if(!k)return;
  setApiKey(k); closeAiModal();
  if(pendingAiId!==null){const btn=document.querySelector(`#card-${pendingAiId} .btn-ai`);runAI(pendingAiId,btn,k);pendingAiId=null;}
}
async function runAI(id,btn,key) {
  const e=entries.find(e=>e.id===id); if(!e) return;
  btn.disabled=true; btn.textContent='要約中…';
  try {
    const prompt=`以下の読書ノートを3行以内で日本語要約してください。\n\n本:「${e.book}」著者:${e.author}\n内容:${e.content}\n教訓:${e.lesson}\n\n要点を箇条書きにせず流れるような文章でまとめてください。`;
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-goog-api-key':key},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1000}})
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.error?.message||'Gemini API error');
    e.aiSummary=d.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('').trim()||'要約を取得できませんでした。';
    persist(); render(); showToast('✨ AI要約完了');
  } catch { showToast('エラーが発生しました。'); }
  finally { btn.disabled=false; btn.textContent=e.aiSummary?'✨ 再要約':'✨ AI要約'; }
}

function exportData() {
  syncEntryFixedTags();
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`reading-log-${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('📤 エクスポートしました');
}
function importData(ev) {
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const imp=JSON.parse(e.target.result); if(!Array.isArray(imp))throw new Error();
      const existIds=new Set(entries.map(e=>e.id));
      const newMap=Object.fromEntries(imp.map(e=>[e.id,e]));
      entries=[...entries.map(e=>newMap[e.id]?{...e,...newMap[e.id]}:e),...imp.filter(e=>!existIds.has(e.id))];
      migrateOldFixedTags();
      persist(); render(); showToast(`📥 ${imp.length}件をインポートしました`);
    } catch { showToast('❌ ファイルの形式が正しくありません'); }
    ev.target.value='';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}

function updateScrollTopButton() {
  const btn = document.getElementById('scrollTopBtn');
  if (!btn) return;
  btn.classList.toggle('show', window.scrollY > 500);
}

function updateStickyControlsOffset() {
  const controls = document.querySelector('.sticky-controls');
  const height = controls ? Math.ceil(controls.getBoundingClientRect().height) : 0;
  document.documentElement.style.setProperty('--sticky-controls-offset', height + 'px');
}

function scheduleStickyControlsOffsetUpdate() {
  requestAnimationFrame(updateStickyControlsOffset);
}

function scrollToTop() {
  window.scrollTo({top:0, behavior:'smooth'});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('drawingOverlay').classList.contains('open')) {
      closeDrawingModal();

    }

});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('aiKeyOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAiModal();});
document.getElementById('bookshelfOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeBookshelf();});
document.getElementById('tagFolderOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTagFolders();});
document.getElementById('drawingOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)showToast('Use cancel or save to close drawing');});
document.getElementById('cardsContainer').addEventListener('click', handleShelfClick, true);
document.addEventListener('click',e=>{

});
entryFieldIds().forEach(function(id) {

});

// 過去のService Worker/キャッシュが原因で、ホーム画面のショートカットから開くと
// 古いバージョン（タイトル・イラスト未対応の初期版など）が表示されることがあった。
// そのため、初回のみ既存のService Workerとキャッシュを完全に削除してリロードし、
// その後はキャッシュを経由せず常に最新のsw.jsを取得・登録するようにする。
const SW_CLEANUP_FLAG = 'reading_log_sw_cleanup_v63';
if ('serviceWorker' in navigator) {
  (async () => {
    try {
      if (!localStorage.getItem(SW_CLEANUP_FLAG)) {
        const regs = await navigator.serviceWorker.getRegistrations();
        let hadOld = false;
        for (const reg of regs) { await reg.unregister(); hadOld = true; }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        localStorage.setItem(SW_CLEANUP_FLAG, '1');
        if (hadOld) { location.reload(); return; }
      }
      // updateViaCache:'none' により、sw.js自体はブラウザ/CDNのHTTPキャッシュを
      // 経由せず毎回取得され、新しいバージョンへの切り替えが確実に行われる。
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    } catch (err) {
      console.warn('Service worker cleanup failed:', err);
    }
  })();
}

let deferredPrompt=null;
const banner=document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;banner.style.display='flex';});
document.getElementById('btnInstall')?.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;banner.style.display='none';});
document.getElementById('btnDismiss')?.addEventListener('click',()=>{banner.style.display='none';});
window.addEventListener('appinstalled',()=>{banner.style.display='none';deferredPrompt=null;});
window.addEventListener('beforeunload',e=>{

  e.returnValue='';
});
window.addEventListener('online',()=>{ if (hasPendingSync()) scheduleCloudSync(0); });
window.addEventListener('focus',()=>{ if (hasPendingSync()) scheduleCloudSync(0); });
document.addEventListener('visibilitychange',()=>{ if (!document.hidden && hasPendingSync()) scheduleCloudSync(0); });
window.addEventListener('scroll', updateScrollTopButton, {passive:true});
window.addEventListener('resize', scheduleStickyControlsOffsetUpdate, {passive:true});

document.getElementById('appVersionBadge').textContent = APP_VERSION;
load(); migrateOldFixedTags(); render(); updateSyncPanel(); updateScrollTopButton(); scheduleStickyControlsOffsetUpdate(); loadFromCloud();
